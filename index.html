function holesEditor(c, scope){
  const nums=(a,b)=>{let s="";for(let i=a;i<=b;i++)s+=`<th>${i}</th>`;return s;}
  const cell=(i,fld)=>`<td><input type="number" data-hole="${i}" data-hf="${fld}" data-scope="${scope}" value="${c.holes[i][fld]}"></td>`;
  const valid = validStrokeIndex(c);
  return `<div class="holes-editor">
    <div class="sc-scroll"><table class="holes-table">
      <tr><th>Hole</th>${nums(1,9)}</tr>
      <tr><th>Par</th>${c.holes.slice(0,9).map((h,i)=>cell(i,"par")).join("")}</tr>
      <tr><th>SI</th>${c.holes.slice(0,9).map((h,i)=>cell(i,"si")).join("")}</tr>
    </table></div>
    <div class="sc-scroll" style="margin-top:6px"><table class="holes-table">
      <tr><th>Hole</th>${nums(10,18)}</tr>
      <tr><th>Par</th>${c.holes.slice(9).map((h,i)=>cell(i+9,"par")).join("")}</tr>
      <tr><th>SI</th>${c.holes.slice(9).map((h,i)=>cell(i+9,"si")).join("")}</tr>
    </table></div>
    ${valid?"":`<div class="warn">⚠ Stroke index must be a complete 1–18 set with no duplicates.</div>`}
  </div>`;
}

function validStrokeIndex(c){
  const seen=new Set();
  for(const h of c.holes){ const si=Number(h.si); if(si<1||si>18||seen.has(si)) return false; seen.add(si); }
  return seen.size===18;
}

/* Resolve a course-editor scope to the object being edited. */
function scopeCourse(scope){ return scope==="master" ? state.course : state.rounds.find(r=>r.id===scope); }

/* ============================================================
   Course lookup  (GolfCourseAPI — https://golfcourseapi.com)
   Fills CR / Slope / Par and, when available, per-hole par &
   stroke index from a chosen tee. Writes through scopeCourse()
   + saveState() + renderSetup() exactly like the manual editor,
   so no scoring logic changes. The API key lives in localStorage
   only (never in state, never synced, never exported).
   ============================================================ */
const GCA_BASE = "https://api.golfcourseapi.com/v1";
const GCA_KEY_STORE = "cc_gca_key";
function gcaKey(){ try{ return localStorage.getItem(GCA_KEY_STORE)||""; }catch(e){ return ""; } }
function setGcaKey(k){ try{ k?localStorage.setItem(GCA_KEY_STORE,k):localStorage.removeItem(GCA_KEY_STORE); }catch(e){} }

async function gcaFetch(path){
  const res = await fetch(GCA_BASE+path, { headers:{ "Authorization":"Key "+gcaKey() } });
  if(res.status===401 || res.status===403) throw new Error("auth");
  if(!res.ok) throw new Error("http"+res.status);
  return res.json();
}
function gcaLocLine(c){
  const l=(c&&c.location)||{};
  return [l.city,l.state,l.country].filter(Boolean).join(", ");
}
// Normalize one GolfCourseAPI tee into the app's shape. Per-hole `handicap`
// is the stroke index; `par_total` is course par (fallback: sum of hole pars).
function gcaNormalizeTee(t, gender){
  const raw = Array.isArray(t.holes) ? t.holes : [];
  let holes = null;
  if(raw.length===18) holes = raw.map(h=>({ par:Number(h.par)||0, si:Number(h.handicap)||0 }));
  let par = Number(t.par_total);
  if(!isFinite(par) && holes) par = holes.reduce((s,h)=>s+h.par,0);
  return { name:(t.tee_name||"Tee"), gender, cr:Number(t.course_rating), slope:Number(t.slope_rating), par:isFinite(par)?par:null, holes };
}
function gcaTeesOf(course){
  const out=[], tt=(course&&course.tees)||{};
  (tt.male||[]).forEach(t=>out.push(gcaNormalizeTee(t,"M")));
  (tt.female||[]).forEach(t=>out.push(gcaNormalizeTee(t,"F")));
  return out;
}
// Write a chosen tee into the scoped course (reusing the manual edit path).
function applyLookupTee(scope, course, tee){
  const c=scopeCourse(scope); if(!c) return;
  const club=course.club_name, name=course.course_name;
  c.courseName = (club&&name&&club!==name) ? (club+" — "+name) : (name||club||c.courseName);
  c.tees = tee.gender ? (tee.name+" ("+tee.gender+")") : tee.name;
  if(isFinite(tee.cr)    && tee.cr>50    && tee.cr<90)     c.cr=tee.cr;
  if(isFinite(tee.slope) && tee.slope>=55&& tee.slope<=155) c.slope=tee.slope;
  if(tee.par!=null && isFinite(tee.par) && tee.par>=27 && tee.par<=80) c.par=tee.par;
  if(tee.holes && tee.holes.length===18){
    const seen=new Set(); let siOK=true;
    for(const h of tee.holes){ const si=h.si; if(si<1||si>18||seen.has(si)){ siOK=false; break; } seen.add(si); }
    siOK = siOK && seen.size===18;
    c.holes = tee.holes.map((h,i)=>({
      par: (h.par>=3 && h.par<=6) ? h.par : (c.holes[i]?c.holes[i].par:4),
      si:  siOK ? h.si : (c.holes[i]?c.holes[i].si:(i+1))
    }));
  }
  saveState();
  if(state.sameCourseAll) renderHeader();
  renderSetup();
}

function openCourseLookup(scope){
  courseLookup = { scope, view: gcaKey()?"search":"key", query:"", results:[], course:null, tees:[], msg:"", err:false, busy:false };
  renderCourseLookup();
}
function closeCourseLookup(){
  courseLookup=null;
  const o=document.getElementById("clOverlay"); if(o) o.remove();
}
async function doCourseSearch(){
  const L=courseLookup; if(!L) return;
  const q=(L.query||"").trim();
  if(!q){ L.view="search"; L.err=true; L.msg="Type a course or club name."; renderCourseLookup(); return; }
  L.busy=true; L.err=false; L.msg="Searching…"; L.view="search"; renderCourseLookup();
  try{
    const data=await gcaFetch("/search?search_query="+encodeURIComponent(q));
    L.results=Array.isArray(data.courses)?data.courses:[];
    L.busy=false; L.view="results"; L.msg=""; L.err=false;
    renderCourseLookup();
  }catch(err){
    L.busy=false; L.err=true;
    if(err.message==="auth"){ L.view="key"; L.msg="That key was rejected — check it and save again."; }
    else { L.view="search"; L.msg="Couldn't reach GolfCourseAPI. Check your connection, or enter the course manually."; }
    renderCourseLookup();
  }
}
async function pickCourse(idx){
  const L=courseLookup; if(!L) return;
  const hit=L.results[idx]; if(!hit) return;
  let course=hit, tees=gcaTeesOf(hit);
  if(!tees.length && hit.id!=null){
    L.busy=true; L.msg="Loading tees…"; renderCourseLookup();
    try{
      const data=await gcaFetch("/courses/"+encodeURIComponent(hit.id));
      course=data.course||data;
      tees=gcaTeesOf(course);
    }catch(err){
      L.busy=false; L.err=true;
      L.msg = err.message==="auth" ? "Key rejected — re-enter it via Course lookup." : "Couldn't load that course. Try another.";
      renderCourseLookup(); return;
    }
  }
  course.club_name   = course.club_name   || hit.club_name;
  course.course_name = course.course_name || hit.course_name;
  L.busy=false; L.err=false; L.msg=""; L.course=course; L.tees=tees; L.view="tees";
  renderCourseLookup();
}
function renderCourseLookup(){
  if(!courseLookup) return;
  let o=document.getElementById("clOverlay");
  if(!o){ o=document.createElement("div"); o.id="clOverlay"; o.className="cl-ov"; document.body.appendChild(o); }
  const L=courseLookup;
  let body="";

  if(L.view==="key"){
    body = `
      <div class="cl-msg">Enter your free GolfCourseAPI key to look up courses. Get one at <a href="https://golfcourseapi.com" target="_blank" rel="noopener">golfcourseapi.com</a>. It's stored only on this device.</div>
      ${L.msg?`<div class="cl-msg ${L.err?"err":""}">${escapeHtml(L.msg)}</div>`:""}

      : `<div class="cl-msg">No tee data published for this course.</div>`;

  o.innerHTML = `<div class="cl-box">
    <div class="cl-head"><div class="cl-title">Course lookup</div><button class="cl-x" id="clClose" aria-label="Close">×</button></div>
    ${body}
  </div>`;

  o.querySelector("#clClose").addEventListener("click", closeCourseLookup);
  o.addEventListener("click", e=>{ if(e.target===o) closeCourseLookup(); });

  if(L.view==="key"){
    o.querySelector("#clKeyCancel").addEventListener("click", closeCourseLookup);
    o.querySelector("#clKeySave").addEventListener("click", ()=>{

    o.querySelector("#clSearch").addEventListener("click", doCourseSearch);
    o.querySelectorAll("[data-pick-course]").forEach(b=>b.addEventListener("click",()=>pickCourse(Number(b.dataset.pickCourse))));

  if(L.view==="tees"){

      applyLookupTee(L.scope, L.course, L.tees[Number(b.dataset.pickTee)]);
      closeCourseLookup();
    }));
  }
}

function playerOptions(team, selected, round){
  const used=new Set();
  if(round) round.matches.forEach(m=>{
    (m.red||[]).forEach(id=>{ if(id) used.add(id); });
    (m.blue||[]).forEach(id=>{ if(id) used.add(id); });
  });
  // show players on this team not yet used in the round (always keep this slot's own pick)
  const list=Object.values(state.players).filter(p=>p.team===team && (p.id===selected || !used.has(p.id)));
  let opts=`<option value="">— select —</option>`;
  list.forEach(p=> opts+=`<option value="${p.id}" ${p.id===selected?"selected":""}>${escapeHtml(p.name)}</option>`);
  return opts;
}

function pairingsSection(r){
  const singles = r.fmt==="Singles";
  const perSide = singles?1:2;
  const maxMatches = expectedRoundPoints(r);
  let html=`<div class="divider"></div><div class="row" style="justify-content:space-between"><strong style="font-size:13px">${singles?"Singles order":"Pairings"} <span style="color:var(--faint);font-weight:400">(${r.matches.length}/${maxMatches})</span></strong>`;
  if(r.matches.length<maxMatches)
    html+=`<button class="btn sm gold" data-addmatch="${r.id}">+ ${singles?"Match":"Pairing"}</button>`;
  html+=`</div>`;

  if(!r.matches.length) html+=`<div class="empty">No ${singles?"matches":"pairings"} yet.</div>`;

  r.matches.forEach((m,mi)=>{
    const redSel = team => (m.red||[]).map((id,i)=>selBox(r,m,"red",i,team)).join("");
    const blueSel = team => (m.blue||[]).map((id,i)=>selBox(r,m,"blue",i,team)).join("");
    html+=`<div class="pair-row" data-rid="${r.id}" data-mid="${m.id}">
      <div class="pair-side">${(m.red||[]).map((id,i)=>selBox(r,m,"red",i,"R")).join("")}</div>
      <div class="pair-side">${(m.blue||[]).map((id,i)=>selBox(r,m,"blue",i,"B")).join("")}</div>
      <button class="x" data-delmatch="${r.id}" data-mid="${m.id}" style="background:none;border:none;color:var(--faint);font-size:18px">×</button>
    </div>`;
    const dupWarn = pairingReused(r,m);
    if(dupWarn) html+=`<div class="warn">⚠ This 2-man pairing is already used in ${dupWarn}.</div>`;
  });
  return html;
}

function selBox(r,m,side,i,team){
  const id=m[side][i]||"";
  return `<select data-rid="${r.id}" data-mid="${m.id}" data-side="${side}" data-slot="${i}">${playerOptions(team,id,r)}</select>`;
}

function playerInUse(pid){
  return state.rounds.some(r=> r.matches.some(m=> (m.red||[]).includes(pid)||(m.blue||[]).includes(pid)));
}

// Detect reused 2-man pairing across team rounds 1-4 (warning only).
function pairingReused(round, match){
  if(round.fmt==="Singles") return null;
  const key = ids => ids.filter(Boolean).slice().sort().join("|");
  const teamRounds = activeRounds().filter(r=>r.fmt!=="Singles");
  for(const side of ["red","blue"]){
    const k=key(match[side]||[]);
    if((match[side]||[]).filter(Boolean).length<2) continue;
    for(const r of teamRounds){
      for(const m of r.matches){
        if(r.id===round.id && m.id===match.id) continue;
        if(key(m.red||[])===k || key(m.blue||[])===k) return "Round "+r.n;
      }
    }
  }
  return null;
}

/* ----- Setup events ----- */
function bindSetup(){
  const $=id=>document.getElementById(id);

  bindInput($("tName"),"input",e=>{state.name=e.target.value;saveState();renderHeader();});

  // Number of rounds
  $("numRoundsSel").addEventListener("change",e=>{
    state.numRounds=Number(e.target.value); saveState(); render();
  });
  $("curRound").addEventListener("input",e=>{
    const v=parseInt(e.target.value,10);
    state.currentRound = (Number.isNaN(v)) ? null : Math.max(1, Math.min(state.numRounds, v));
    saveState();
  });

  // Defending champion checkboxes — only one team may be defending.
  $("defR").addEventListener("change",e=>{
    state.defending = e.target.checked ? "R" : null; saveState(); renderSetup(); renderHeader();
  });
  $("defB").addEventListener("change",e=>{
    state.defending = e.target.checked ? "B" : null; saveState(); renderSetup(); renderHeader();
  });

  // Same course for all rounds
  $("sameCourse").addEventListener("change",e=>{
    state.sameCourseAll = e.target.checked; saveState(); renderSetup(); renderHeader();
  });

  ["rName","bName","rLetter","bLetter"].forEach(idn=>{
    $(idn).addEventListener("input",e=>{
      const v=e.target.value;
      if(idn==="rName")state.teamNames.R=v;
      if(idn==="bName")state.teamNames.B=v;
      if(idn==="rLetter")state.teamLetters.R=v.toUpperCase();
      if(idn==="bLetter")state.teamLetters.B=v.toUpperCase();
      // Live-update the Red/Blue buttons beside the "Add player" field.
      const seg=$("addTeamSeg");
      if(seg && (idn==="rName"||idn==="bName")){
        seg.querySelectorAll("button").forEach(b=>{ b.textContent = teamName(b.dataset.team); });
      }
      saveState();renderHeader();
    });
  });

  $("hcpToggle").addEventListener("click",()=>{state.useHcp=!state.useHcp;saveState();render();});

  $("skinsToggle").addEventListener("click",()=>{state.skins.on=!state.skins.on;saveState();render();});
  const sb=$("skinsBuyIn");
  if(sb) sb.addEventListener("input",e=>{ const v=parseFloat(e.target.value); state.skins.buyIn = Number.isNaN(v)?0:Math.max(0,Math.round(v*100)); saveState(); });

  // add team segmented
  $("addTeamSeg").querySelectorAll("button").forEach(b=>{
    b.addEventListener("click",()=>{state.addTeam=b.dataset.team;saveState();renderSetup();});
  });
  $("addPlayerBtn").addEventListener("click",addPlayer);
  $("newPlayer").addEventListener("keydown",e=>{if(e.key==="Enter")addPlayer();});

  // player name / index edits & removal
  view.querySelectorAll(".pname").forEach(inp=>inp.addEventListener("input",e=>{
    const p=state.players[e.target.dataset.pid]; if(p){p.name=e.target.value;saveState();renderHeader();}
  }));
  view.querySelectorAll(".pidx").forEach(inp=>inp.addEventListener("input",e=>{
    const p=state.players[e.target.dataset.pid];
    if(p){ p.index = e.target.value===""?null:Number(e.target.value); saveState(); }
  }));
  view.querySelectorAll(".prow .x").forEach(b=>b.addEventListener("click",e=>{
    const pid=e.target.dataset.pid;
    if(playerInUse(pid)) return;
    delete state.players[pid]; saveState(); renderSetup(); renderHeader();
  }));

  // round format change
  view.querySelectorAll("[data-fmtsel]").forEach(sel=>sel.addEventListener("change",e=>{
    const r=state.rounds.find(x=>x.id===e.target.dataset.fmtsel); if(!r) return;
    const newFmt=e.target.value;
    const oldPer = r.fmt==="Singles"?1:2;
    const newPer = newFmt==="Singles"?1:2;
    if(oldPer!==newPer && r.matches.length){
      if(!confirm(`Switching to ${newFmt} changes the players per side, so this round's pairings will be cleared. Continue?`)){
        renderSetup(); return;
      }
      r.matches=[];
    }
    r.fmt=newFmt;
    saveState(); renderSetup(); renderHeader();
  }));

  // round format info tooltip
  view.querySelectorAll("[data-fmtinfo]").forEach(b=>b.addEventListener("click",e=>{
    const el=document.getElementById("fmtinfo-"+e.currentTarget.dataset.fmtinfo);
    if(el) el.hidden=!el.hidden;
  }));

  // course field edits (master or per-round, via data-scope)
  view.querySelectorAll("[data-cf]").forEach(inp=>inp.addEventListener("input",e=>{
    const c=scopeCourse(e.target.dataset.scope); if(!c)return;
    const f=e.target.dataset.cf;
    c[f] = (f==="courseName"||f==="tees") ? e.target.value : Number(e.target.value);
    saveState();
  }));
  view.querySelectorAll("[data-cf]").forEach(inp=>inp.addEventListener("blur",()=>{ if(state.sameCourseAll) renderHeader(); }));

  // course lookup (GolfCourseAPI)
  view.querySelectorAll("[data-courselookup]").forEach(b=>b.addEventListener("click",e=>{
    openCourseLookup(e.currentTarget.dataset.courselookup);
  }));

  // holes toggle & edits
  view.querySelectorAll("[data-toggleholes]").forEach(b=>b.addEventListener("click",e=>{
    const c=scopeCourse(e.target.dataset.toggleholes); if(!c)return;
    c._editHoles=!c._editHoles; renderSetup();
  }));
  view.querySelectorAll("[data-hf]").forEach(inp=>inp.addEventListener("input",e=>{
    const c=scopeCourse(e.target.dataset.scope); if(!c)return;
    const i=Number(e.target.dataset.hole), f=e.target.dataset.hf;
    c.holes[i][f]=Number(e.target.value); saveState();
  }));
  view.querySelectorAll("[data-hf]").forEach(inp=>inp.addEventListener("blur",()=>renderSetup()));

  // matches
  view.querySelectorAll("[data-addmatch]").forEach(b=>b.addEventListener("click",e=>{
    const r=state.rounds.find(x=>x.id===e.target.dataset.addmatch); if(!r)return;
    const per = r.fmt==="Singles"?1:2;
    r.matches.push({id:uid(), red:Array(per).fill(""), blue:Array(per).fill(""), scores:{}});
    saveState(); renderSetup(); renderHeader();
  }));
  view.querySelectorAll("[data-delmatch]").forEach(b=>b.addEventListener("click",e=>{
    const r=state.rounds.find(x=>x.id===e.target.dataset.delmatch); if(!r)return;
    r.matches=r.matches.filter(m=>m.id!==e.target.dataset.mid);
    saveState(); renderSetup(); renderHeader();
  }));
  view.querySelectorAll(".pair-side select").forEach(sel=>sel.addEventListener("change",e=>{
    const {rid,mid,side,slot}=e.target.dataset;
    const r=state.rounds.find(x=>x.id===rid); const m=r&&r.matches.find(x=>x.id===mid);
    if(!m)return;
    const newId=e.target.value;
    // prevent same player on both sides of THIS match
    const other = side==="red"?"blue":"red";
    if(newId && (m[other]||[]).includes(newId)){ toast("Player already on the other side"); renderSetup(); return; }
    m[side][Number(slot)] = newId;
    // clean stale score keys
    pruneScores(m);
    saveState(); renderSetup(); renderHeader();
  }));

  // Delete this tournament (bottom of Setup)
  const dtb=$("deleteTournamentBtn");
  if(dtb) dtb.addEventListener("click",()=>deleteTournament(state.id));
}

function bindInput(el,evt,fn){ if(el) el.addEventListener(evt,fn); }

function addPlayer(){
  const inp=document.getElementById("newPlayer");
  const name=inp.value.trim();
  if(!name) return;
  const team=state.addTeam;
  if(Object.values(state.players).filter(p=>p.team===team).length>=8){ toast("Max 8 per team"); return; }
  const id=uid();
  state.players[id]={id, name, team, index:null};
  saveState(); renderSetup(); renderHeader();
  // refocus add field
  const ni=document.getElementById("newPlayer"); if(ni){ni.focus();}
}

function pruneScores(m){
  if(!m.scores) m.scores={};
  const validKeys = new Set();
  // keys are player ids (non-scramble) or sideR/sideB
  (m.red||[]).forEach(id=>id&&validKeys.add(id));
  (m.blue||[]).forEach(id=>id&&validKeys.add(id));
  validKeys.add("sideR"); validKeys.add("sideB");
  Object.keys(m.scores).forEach(k=>{ if(!validKeys.has(k)) delete m.scores[k]; });
}

/* ============================================================
   PLAY TAB  (quick one-touch entry)
   ============================================================ */
function signed(n){ return n===0 ? "0" : (n>0 ? "+"+n : String(n)); }

function renderPlayQuick(){
  const rounds = activeRounds();
  if(!rounds.length){ view.innerHTML=`<div class="card"><h2>Play</h2><div class="sub">Set up the tournament first.</div></div>`; return; }

  // No pairings anywhere yet → same message as the Detail tab.
  if(!rounds.some(r=>r.matches.length)){
    view.innerHTML=`<div class="card"><h2>No matches yet</h2><div class="sub">Head to the Setup tab to add pairings for each round, then enter scores here.</div></div>`;
    return;
  }

  if(!playRound || !rounds.find(r=>r.id===playRound)){
    const cur = rounds.find(r=>r.n===currentRoundNum()) || rounds[0];
    playRound = (cur.matches.length ? cur : (rounds.find(r=>r.matches.length)||cur)).id;
  }
  const r = rounds.find(x=>x.id===playRound);
  const c = courseOf(r);
  currentHole = Math.max(0, Math.min(17, currentHole));

  // Pairings exist but no match chosen → prompt for which match on the current round.
  const validMatch = playMatch && r.matches.find(m=>m.id===playMatch);
  if(!validMatch){
    let p=`<div class="card qp-pickcard"><h2>Round ${r.n} · ${escapeHtml(r.fmt)}</h2>`;
    if(!r.matches.length){
      p+=`<div class="sub">No matches in this round yet. Add pairings in Setup.</div>`;
    } else {
      const units=playUnitsList(r);
      p+=`<div class="sub" style="margin-bottom:10px">Which ${r.fmt==="Singles"?"foursome":"match"} do you want to score?</div>`;
      p+=`<div class="qp-matches pick">`
        + units.map(u=>`<button class="qp-mtab" data-pm="${u.anchor}">${u.label}<span class="qp-mtab-sub">${escapeHtml(u.sub)}</span></button>`).join("")
        + `</div>`;
    }
    const selRounds = rounds.filter(roundHasPlayMatches);
    if(selRounds.length>1){
      p+=`<div class="sub" style="margin:0 0 6px">Or choose another round</div><div class="qp-rounds">`
        + selRounds.map(rr=>`<button class="qp-rtab ${rr.id===playRound?"on":""}" data-pr="${rr.id}">R${rr.n} · ${rr.fmt}</button>`).join("")
        + `</div>`;
    }
    p+=`</div>`;
    view.innerHTML=p; bindPlayQuick(); return;
  }

  let html="";
  const matches = unitMatches(r, playMatch);
  const m = matches[0];
  if(playAutoHole){ currentHole = unitFirstIncompleteHole(r, matches); playAutoHole=false; }

  const units = playUnitsList(r);
  const unitIdx = (r.fmt==="Singles") ? Math.floor(r.matches.findIndex(x=>x.id===playMatch)/2) : r.matches.findIndex(x=>x.id===playMatch);
  const unitLabel = (r.fmt==="Singles") ? `Foursome ${unitIdx+1}` : `Match ${unitIdx+1}`;
  const matchup = matches.map(mm=>`${escapeHtml(sideFirstNames(mm,"R"))} v ${escapeHtml(sideFirstNames(mm,"B"))}`).join(" + ");

  // status box — single match keeps the top chip; a foursome shows a neutral header
  // and a colored match-score circle between each match's two players (added below).
  let statusBox, mscores="";
  if(matches.length>1){
    statusBox = `<div class="qp2-nrow qp2-hrow qp2-status none"></div>`;
    matches.forEach((mm,k)=>{
      const s=matchStatusBits(r,mm); const st=matchStatus(r,mm);
      const token = st.standing===0 ? "AS" : `${Math.abs(st.standing)} up`;
      mscores += `<div class="qp2-mscore ${s.cls} ${st.finished?"final":""}" style="top:calc(var(--qp-headh) + ${2*k+1} * var(--qp-rowh))">${token}</div>`;
    });
  }else{
    const s=matchStatusBits(r,m);
    statusBox = `<div class="qp2-nrow qp2-hrow qp2-status ${s.cls}"><span class="qp2-st1">${s.st1}</span><span class="qp2-st2">${s.st2}</span></div>`;
  }

  // collapsible round + unit selector
  const selRounds = rounds.filter(roundHasPlayMatches);
  const multiRound=selRounds.length>1, multiUnit=units.length>1;
  if(multiRound || multiUnit){
    const summary = `R${r.n} · ${escapeHtml(r.fmt)}` + (multiUnit?` · ${unitLabel}`:"");
    html += `<div class="qp-sel ${selOpen?"open":""}">
      <button class="qp-sel-head" data-seltoggle="1">
        <span class="qp-sel-sum">${summary} <span class="qp-sel-names">${matchup}</span></span>
        <span class="qp-sel-chev">${selOpen?"▾":"▸"}</span>
      </button>`;
    if(selOpen){
      html += `<div class="qp-sel-body">`;
      if(multiRound) html += `<div class="qp-rounds">`+selRounds.map(rr=>`<button class="qp-rtab ${rr.id===playRound?"on":""}" data-pr="${rr.id}">R${rr.n} · ${rr.fmt}</button>`).join("")+`</div>`;
      if(multiUnit) html += `<div class="qp-matches">`+units.map((u,i)=>`<button class="qp-mtab ${i===unitIdx?"on":""}" data-pm="${u.anchor}">${u.label}<span class="qp-mtab-sub">${escapeHtml(u.sub)}</span></button>`).join("")+`</div>`;
      html += `</div>`;
    }
    html += `</div>`;
  }

  html += `<div class="qp-nav">
    <button class="qp-arrow" data-holestep="-1">‹</button>
    <div class="qp-navmid" id="qpNav"></div>
    <button class="qp-arrow" data-holestep="1">›</button>
  </div>`;

  html += `<div class="qp-fmt">${escapeHtml(r.fmt)} · ${matchup}</div>`;

  const balls = unitBalls(r, matches);
  const sepAt = i => i>0 && balls[i].gi!==balls[i-1].gi;

  html += `<div class="qp2" id="qp2">`;
  // scrolling holes layer
  html += `<div class="qp2-scroll" id="qp2scroll"><div class="qp2-track">`;
  html += `<div class="qp2-trow qp2-hrow"><div class="qp2-spacer"></div>`;
  for(let h=0;h<18;h++) html += `<div class="qp2-hcell" data-h="${h}"><span class="qp2-hn">${h+1}</span><span class="qp2-par">Par ${c.holes[h].par}</span></div>`;
  html += `<div class="qp2-end"></div></div>`;
  balls.forEach((b,i)=>{
    html += `<div class="qp2-trow ${sepAt(i)?"sep":""}"><div class="qp2-spacer"></div>`;
    for(let h=0;h<18;h++){
      const gross=ballScore(b.match,b.key,h);
      const net = gross===null?null:gross-strokesOnHole(b.playHcp,c.holes[h].si);
      html += `<div class="qp2-cell">${gross===null?`<span class="qp-blank">·</span>`:`<span class="qp-score">${gross}<sub>${net}</sub></span>`}</div>`;
    }
    html += `<div class="qp2-end"></div></div>`;
  });
  html += `</div></div>`;
  // fixed name column
  html += `<div class="qp2-names">${statusBox}`;
  balls.forEach((b,i)=>{
    const cls=b.team==="R"?"r":"b";
    html += `<div class="qp2-nrow ${sepAt(i)?"sep":""}"><div class="qp2-pname ${cls}">${escapeHtml(b.label)}</div>${state.useHcp?`<div class="qp2-phcp">HCP ${b.playHcp}</div>`:""}</div>`;
  });
  html += `</div>`;
  // fixed green slot (filled by initQp2)
  html += `<div class="qp2-slot" id="qp2slot"></div>`;
  html += mscores;
  html += `</div>`;

  view.innerHTML=html;
  bindPlayQuick();
  initQp2(r,c,balls);
  if(entry) renderEntryModal();
}

// First names of a side joined by "/" (e.g. "Daniel/Tom").
function sideFirstNames(match, team){
  const ids=(team==="R"?(match.red||[]):(match.blue||[])).filter(Boolean);
  if(!ids.length) return "—";
  return ids.map(id=>((state.players[id]||{}).name||"?").trim().split(/\s+/)[0]).join("/");
}

// Matches shown together as one Play unit. Singles → the foursome (consecutive pair by
// order); every other format → the single match on its own.
function unitMatches(round, anchorId){
  const list=round.matches;
  const idx=list.findIndex(m=>m.id===anchorId);
  if(idx<0) return [];
  if(round.fmt==="Singles"){ const g=Math.floor(idx/2); return list.slice(g*2, g*2+2); }
  return [list[idx]];
}
// Unit balls, each tagged with its owning match and group index gi.
function unitBalls(round, matches){
  const out=[];
  matches.forEach((mm,gi)=> withPlayingHcps(round,mm)
    .filter(b=>b.players.some(id=>id&&state.players[id]))
    .forEach(b=> out.push(Object.assign({}, b, {match:mm, gi}))) );
  return out;
}
// Choices for the match picker: foursomes in Singles, individual matches otherwise.
function playUnitsList(round){
  if(round.fmt!=="Singles") return round.matches.map((m,i)=>({anchor:m.id, label:`Match ${i+1}`, sub:`${sideFirstNames(m,"R")} v ${sideFirstNames(m,"B")}`}));
  const units=[];
  for(let i=0;i<round.matches.length;i+=2){
    const grp=round.matches.slice(i,i+2);
    units.push({anchor:grp[0].id, label:`Foursome ${i/2+1}`, sub:grp.map(m=>`${sideFirstNames(m,"R")} v ${sideFirstNames(m,"B")}`).join("  ·  ")});
  }
  return units;
}
// Compact match-status bits for the status box.
function matchStatusBits(round, mm){
  const st=matchStatus(round,mm);
  const lead=st.standing>0?"R":st.standing<0?"B":null;
  const k=Math.abs(st.standing);
  let st1="AS", st2="Thru 0", cls="none";
  if(st.played===0){ st1="AS"; st2="Thru 0"; cls="none"; }
  else if(st.finished){
    if(st.closeHole!==null){ const rem=17-st.closeHole; st1=rem>0?`${k}&${rem}`:`${k} Up`; }
    else st1=k===0?"Halved":`${k} Up`;
    st2="Final"; cls=lead?(lead==="R"?"r":"b"):"none";
  }else{ st1=k===0?"AS":`${k} Up`; st2=`Thru ${st.played}`; cls=lead?(lead==="R"?"r":"b"):"none"; }
  return {st1,st2,cls};
}
// First incomplete hole across all matches in the unit (skips dead holes per match).
function unitFirstIncompleteHole(round, matches){
  let last=0;
  matches.forEach(mm=>{ const st=matchStatus(round,mm); last=Math.max(last, st.closeHole!=null?st.closeHole:17); });
  for(let h=0;h<=last;h++){
    const need=matches.some(mm=>{ const st=matchStatus(round,mm); const dead=st.closeHole!=null&&h>st.closeHole; return !dead && !matchHoleComplete(round,mm,h); });
    if(need) return h;
  }
  return Math.max(0,Math.min(17,last));
}

const QP_NAMEW=150, QP_HOLEW=88;

// The fixed green slot's contents for a given hole.
function slotHtml(r,c,balls,h){
  let s=`<div class="qp2-slothead qp2-hrow"><span class="qp2-sh-h">${h+1}</span><span class="qp2-sh-p">Par ${c.holes[h].par}</span></div>`;
  balls.forEach((b,i)=>{
    const strokes=strokesOnHole(b.playHcp, c.holes[h].si);
    const gross=ballScore(b.match,b.key,h);
    const content = gross===null ? signed(-strokes) : String(gross);
    const ccls = gross===null ? "preview" : "scored";
    const sep = i>0 && balls[i].gi!==balls[i-1].gi ? "sep" : "";
    s+=`<div class="qp2-slotrow ${sep}"><button class="qp-circle ${ccls}" data-key="${b.key}">${content}</button></div>`;
  });
  return s;
}

function initQp2(r,c,balls){
  const sc=document.getElementById("qp2scroll");
  const slot=document.getElementById("qp2slot");
  const nav=document.getElementById("qpNav");
  const stage=document.getElementById("qp2");
  if(!sc||!slot||!stage) return;

  // grow rows/circles to fill the free vertical space below the controls
  const sizeToFit=()=>{
    const headH=52;
    const top=stage.getBoundingClientRect().top;
    const avail=window.innerHeight - top - 14;
    const n=Math.max(1, balls.length);
    let rowH=Math.floor((avail - headH)/n);
    rowH=Math.max(76, Math.min(240, rowH));
    const circle=Math.max(56, Math.min(rowH-20, QP_HOLEW-14));
    stage.style.setProperty("--qp-headh", headH+"px");
    stage.style.setProperty("--qp-rowh", rowH+"px");
    stage.style.setProperty("--qp-circle", circle+"px");
  };
  sizeToFit();

  const setEnds=()=>{ const w=Math.max(0, sc.clientWidth - QP_NAMEW - 2*QP_HOLEW);
    document.querySelectorAll("#qp2 .qp2-end").forEach(e=>e.style.width=w+"px"); };
  setEnds();

  let swiped=false;
  const renderSlot=()=>{
    slot.innerHTML=slotHtml(r,c,balls,currentHole);
    slot.querySelectorAll(".qp-circle").forEach(btn=>btn.addEventListener("click",()=>{
      if(swiped){ swiped=false; return; }   // ignore the click that ends a swipe
      openEntry(r.id,playMatch,currentHole,btn.dataset.key);
    }));
    if(nav) nav.innerHTML=`<span class="qp-h">Hole ${currentHole+1}</span><span class="qp-meta">Par ${c.holes[currentHole].par} · ${state.useHcp?`HCP ${c.holes[currentHole].si}`:""}</span>`;
    document.querySelectorAll("#qp2 .qp2-hcell").forEach(el=>el.classList.toggle("sel", Number(el.dataset.h)===currentHole));
  };

  // Swiping on the green slot column scrolls the holes with inertial momentum
  // (matching native scroll feel); a tap still opens entry.
  let dragX=null, dragLeft=0, lastX=0, lastT=0, vel=0, inertia=null;
  const cancelInertia=()=>{ if(inertia){ cancelAnimationFrame(inertia); inertia=null; } };
  const snapNearest=()=>{ const sel=Math.max(0,Math.min(17,Math.round(sc.scrollLeft/QP_HOLEW))); sc.scrollTo({left:sel*QP_HOLEW, behavior:"smooth"}); };
  slot.addEventListener("touchstart",e=>{
    cancelInertia();
    const x=e.touches[0].clientX; dragX=x; dragLeft=sc.scrollLeft; lastX=x; lastT=performance.now(); vel=0; swiped=false;
  },{passive:true});
  slot.addEventListener("touchmove",e=>{
    if(dragX===null) return;
    const x=e.touches[0].clientX, dx=x-dragX;
    if(Math.abs(dx)>6) swiped=true;
    if(swiped){
      sc.scrollLeft=dragLeft-dx;
      const now=performance.now(), dt=now-lastT;
      if(dt>0) vel=(x-lastX)/dt;            // finger velocity (px/ms)
      lastX=x; lastT=now;
      e.preventDefault();
    }
  },{passive:false});
  slot.addEventListener("touchend",()=>{
    if(dragX===null) return;
    dragX=null;
    if(!swiped) return;
    let v = -vel;                            // scroll velocity (px/ms)
    if(Math.abs(v) < 0.03){ snapNearest(); return; }
    const maxLeft = sc.scrollWidth - sc.clientWidth;
    let last=performance.now();
    const step=(now)=>{
      const dt=Math.min(40, now-last); last=now;
      sc.scrollLeft += v*dt;
      v *= Math.pow(0.95, dt/16);            // exponential deceleration
      if(sc.scrollLeft<=0){ sc.scrollLeft=0; v=0; }
      else if(sc.scrollLeft>=maxLeft){ sc.scrollLeft=maxLeft; v=0; }
      if(Math.abs(v) > 0.03){ inertia=requestAnimationFrame(step); }
      else { inertia=null; snapNearest(); }
    };
    inertia=requestAnimationFrame(step);
  });

  sc.scrollLeft = currentHole*QP_HOLEW;
  renderSlot();

  let raf=null;
  sc.addEventListener("scroll",()=>{
    if(raf) return;
    raf=requestAnimationFrame(()=>{
      raf=null;
      const sel=Math.max(0,Math.min(17,Math.round(sc.scrollLeft/QP_HOLEW)));
      if(sel!==currentHole){ currentHole=sel; renderSlot(); }
    });
  });
}

function bindPlayQuick(){
  const t=view.querySelector("[data-seltoggle]");
  if(t) t.addEventListener("click",()=>{ selOpen=!selOpen; renderPlayQuick(); });
  view.querySelectorAll("[data-pr]").forEach(b=>b.addEventListener("click",e=>{
    playRound=e.currentTarget.dataset.pr; playMatch=null; currentHole=0; selOpen=false; renderPlayQuick();
  }));
  view.querySelectorAll("[data-pm]").forEach(b=>b.addEventListener("click",e=>{
    playMatch=e.currentTarget.dataset.pm; selOpen=false; playAutoHole=true; renderPlayQuick();
  }));
  view.querySelectorAll("[data-holestep]").forEach(b=>b.addEventListener("click",e=>{
    const sc=document.getElementById("qp2scroll"); if(!sc) return;
    const target=Math.max(0,Math.min(17,currentHole+Number(e.currentTarget.dataset.holestep)));
    sc.scrollTo({left:target*QP_HOLEW, behavior:"smooth"});
  }));
  view.querySelectorAll("[data-h]").forEach(b=>b.addEventListener("click",e=>{
    const sc=document.getElementById("qp2scroll"); if(!sc) return;
    sc.scrollTo({left:Number(e.currentTarget.dataset.h)*QP_HOLEW, behavior:"smooth"});
  }));
}

/* ----- one-touch entry overlay ----- */
function openEntry(roundId, matchId, holeIdx, activeKey){
  entry={roundId, matchId, holeIdx, activeKey, touched:new Set()};
  tenPending=false;
  renderEntryModal();
}
function closeEntry(){
  entry=null; tenPending=false;
  const o=document.getElementById("entryOverlay"); if(o) o.remove();
}
function entryContext(){
  const r=activeRounds().find(x=>x.id===entry.roundId);
  if(!r) return null;
  const matches=unitMatches(r, entry.matchId);
  if(!matches.length) return null;
  return {r, matches, c:courseOf(r), balls:unitBalls(r, matches)};
}
function renderEntryModal(){
  const ctx=entryContext(); if(!ctx){ closeEntry(); return; }
  const {r,matches,c,balls}=ctx;
  const h=entry.holeIdx, par=c.holes[h].par;
  let o=document.getElementById("entryOverlay");
  if(!o){ o=document.createElement("div"); o.id="entryOverlay"; document.body.appendChild(o); }

  const rows = balls.map((b,i)=>{
    const strokes=strokesOnHole(b.playHcp, c.holes[h].si);
    const gross=ballScore(b.match,b.key,h);
    const val = gross===null ? -strokes : (gross - strokes - par);
    const active = b.key===entry.activeKey;
    const sep = i>0 && balls[i].gi!==balls[i-1].gi ? "eo-sep" : "";
    return `<div class="eo-prow ${active?"active":""} ${sep}" data-pick="${b.key}">
      <div class="eo-pinfo">
        <div class="eo-pn ${b.team==="R"?"r":"b"}">${escapeHtml(b.label)}</div>
        <div class="eo-pmeta">${escapeHtml(teamName(b.team))} · ${state.useHcp?`HCP ${b.playHcp}`:""}</div>
      </div>
      <div class="eo-circle ${gross===null?"preview":""}">${gross===null?signed(val):gross}</div>
    </div>`;
  }).join("");

  // keypad labels relative to par
  const lab=(n)=>{ const d=n-par; return d===-3?"Albatross":d===-2?"Eagle":d===-1?"Birdie":d===0?"Par":d===1?"Bogey":d===2?"Double Bogey":""; };
  let keys="";
  for(let n=1;n<=9;n++){
    keys += `<button class="eo-key ${n===par?"par":""}" data-num="${n}"><span class="k-n">${n}</span>${lab(n)?`<span class="k-l">${lab(n)}</span>`:""}</button>`;
  }
  keys += `<button class="eo-key wide" data-clear="1"><span class="k-n">Clear</span></button>`;
  keys += `<button class="eo-key wide" data-dash="1"><span class="k-n">${tenPending?"0":"–"}</span></button>`;
  keys += `<button class="eo-key wide ${tenPending?"pending":""}" data-ten="1"><span class="k-n">10+</span>${tenPending?`<span class="k-l">tap ones</span>`:""}</button>`;

  o.innerHTML = `
    <div class="eo-head">
      <button class="eo-back" data-eoback="1">‹</button>
      <div class="eo-title">HOLE ${h+1} | PAR ${par}</div>
      <div style="width:42px"></div>
    </div>
    <div class="eo-list ${balls.length>=4?"compact":""}">${rows}</div>
    <div class="eo-pad">${keys}</div>`;

  o.querySelector("[data-eoback]").addEventListener("click",()=>{ const cx=entryContext(); const rr=cx&&cx.r, mm=cx&&cx.matches; closeEntry(); renderPlayQuick(); if(rr&&mm) afterEntryReturn(rr, mm); });
  o.querySelectorAll("[data-pick]").forEach(el=>el.addEventListener("click",()=>{ entry.activeKey=el.dataset.pick; tenPending=false; renderEntryModal(); }));
  o.querySelectorAll("[data-num]").forEach(el=>el.addEventListener("click",()=>{
    const n=Number(el.dataset.num);
    if(tenPending){ entrySet(10+n); } else { entrySet(n); }
  }));
  o.querySelector("[data-clear]").addEventListener("click",()=>entrySet("clear"));
  o.querySelector("[data-dash]").addEventListener("click",()=>{ if(tenPending){ entrySet(10); } else { entrySet(null); } });
  o.querySelector("[data-ten]").addEventListener("click",()=>{ tenPending=!tenPending; renderEntryModal(); });
}

function entrySet(value){
  const ctx=entryContext(); if(!ctx){ closeEntry(); return; }
  const {r,matches,balls}=ctx;
  const key=entry.activeKey;
  const ball=balls.find(b=>b.key===key); if(!ball){ closeEntry(); return; }
  const m=ball.match;
  if(!m.scores) m.scores={};
  if(!m.scores[key]) m.scores[key]=Array(18).fill(null);

  if(value==="clear"){ m.scores[key][entry.holeIdx]=null; entry.touched.delete(key); tenPending=false; saveState(); renderEntryModal(); renderHeader(); return; }

  m.scores[key][entry.holeIdx] = (value===null ? null : value);
  entry.touched.add(key);
  tenPending=false;
  saveState(); renderHeader();

  // advance to next not-yet-entered ball across the whole unit
  const order=balls.map(b=>b.key);
  const idx=order.indexOf(key);
  let next=null;
  for(let i=1;i<=order.length;i++){ const k=order[(idx+i)%order.length]; if(!entry.touched.has(k)){ next=k; break; } }
  if(next===null){
    const h=entry.holeIdx;
    const complete = balls.every(b=> ballScore(b.match,b.key,h)!==null);
    closeEntry();
    if(h===currentHole && complete && currentHole<17) currentHole++;
    renderPlayQuick();
    afterEntryReturn(r, matches);
    return;
  }
  entry.activeKey=next;
  renderEntryModal();
}

// Result text for a finished match, e.g. "Reds win 2&1" / "Halved".
function matchResultText(round, m){
  const st=matchStatus(round,m);
  if(st.standing===0) return "Halved";
  const lead=st.standing>0?"R":"B", k=Math.abs(st.standing), nm=teamName(lead);
  if(st.closeHole!==null){ const rem=17-st.closeHole; return `${nm} win ${rem>0?`${k}&${rem}`:`${k} up`}`; }
  return `${nm} win ${k} up`;
}
// Called when leaving the entry screen back to the grid. If every hole of the unit is
// entered, run the finalize flow; otherwise announce any match that has just ended.
function afterEntryReturn(round, matches){
  if(!matches || !matches.length) return;
  if(matches.every(mm=>matchAllHolesScored(round,mm))) checkFinalize(round, matches);
  else checkMatchEnded(round, matches);
}
// Show a results dialog (OK to dismiss) for any match in the unit that just got decided.
function checkMatchEnded(round, matches){
  const newly = matches.filter(mm=>!endedAnnounced.has(mm.id) && matchStatus(round,mm).finished);
  if(!newly.length) return;
  newly.forEach(mm=>endedAnnounced.add(mm.id));
  setTimeout(()=>showResultsDialog(round, newly), 1000);
}
function resultLines(round, matches){
  return matches.map(mm=>{
    const lead=matchStatus(round,mm).standing, cls=lead>0?"r":lead<0?"b":"";
    return `<div class="fin-line">${escapeHtml(sideFirstNames(mm,"R"))} v ${escapeHtml(sideFirstNames(mm,"B"))} <b class="${cls}">${escapeHtml(matchResultText(round,mm))}</b></div>`;
  }).join("");
}
function showResultsDialog(round, matches){
  if(document.querySelector(".fin-ov")) return;
  const ov=document.createElement("div");
  ov.id="resultModal"; ov.className="fin-ov";
  ov.innerHTML=`<div class="fin-box">
    <div class="fin-title">${matches.length>1?"Matches finished":"Match finished"}</div>
    <div class="fin-results">${resultLines(round,matches)}</div>
    <div class="fin-btns"><button class="btn gold" id="finOk">OK</button></div>
  </div>`;
  document.body.appendChild(ov);
  document.getElementById("finOk").addEventListener("click",()=>ov.remove());
}
// Called when leaving the entry screen back to the grid. If every hole of the unit is
// entered, (re)show the finish dialog — first time, or again after a prior "No".
function checkFinalize(round, matches){
  if(!matches || !matches.length || !matches.every(mm=>matchAllHolesScored(round,mm))) return;
  if(document.querySelector(".fin-ov")) return;
  const key=matches.map(m=>m.id).join("|");
  if(finalizeDeclined.has(key)){ setTimeout(()=>showFinalizePrompt(round,matches,"again"),1000); }
  else if(!finalizePrompted.has(key)){ finalizePrompted.add(key); setTimeout(()=>showFinalizePrompt(round,matches,"first"),1000); }
}
function showFinalizePrompt(round, matches, variant){
  if(document.querySelector(".fin-ov")) return;
  const key=matches.map(m=>m.id).join("|");
  const title = variant==="again" ? "Ready to finalize?" : (matches.length>1?"Matches completed":"Match completed");
  const q = variant==="again" ? "Have you completed all edits and are you ready to finalize?" : "Do you want to finalize?";
  const ov=document.createElement("div");
  ov.id="finalizeModal"; ov.className="fin-ov";
  ov.innerHTML=`<div class="fin-box">
    <div class="fin-title">${title}</div>
    <div class="fin-results">${resultLines(round,matches)}</div>
    <div class="fin-msg">${q}</div>
    <div class="fin-btns">
      <button class="btn" id="finNo">No</button>
      <button class="btn gold" id="finYes">Yes, finalize</button>
    </div></div>`;
  document.body.appendChild(ov);
  document.getElementById("finNo").addEventListener("click",()=>{ finalizeDeclined.add(key); ov.remove(); });
  document.getElementById("finYes").addEventListener("click",()=>{ ov.remove(); finalizeMatch(round); });
}
function finalizeMatch(round){
  activeTab="leaderboard"; initRoundExpand(); render();
}

// True once every scoring ball in every match of the round has a gross score on hole h.
function holeComplete(round, h){
  return round.matches.every(m=>{
    const balls=withPlayingHcps(round,m).filter(b=>b.players.some(id=>id&&state.players[id]));
    if(!balls.length) return true;
    return balls.every(b=> ballScore(m,b.key,h)!==null);
  });
}
// Hole complete for ONE match (all required balls have a gross score).
function matchHoleComplete(round, match, h){
  const balls=withPlayingHcps(round,match).filter(b=>b.players.some(id=>id&&state.players[id]));
  if(!balls.length) return true;
  return balls.every(b=> ballScore(match,b.key,h)!==null);
}
// Every ball in the match has a real (non-zero) score on all 18 holes.
function matchAllHolesScored(round, match){
  const balls=withPlayingHcps(round,match).filter(b=>b.players.some(id=>id&&state.players[id]));
  if(!balls.length) return false;
  return balls.every(b=>{ for(let h=0;h<18;h++){ const v=ballScore(match,b.key,h); if(v===null||v<=0) return false; } return true; });
}
// First hole (0-17) that still needs scores for this match, skipping dead holes
// after the match has closed. Falls back to the last live hole if all are done.
function firstIncompleteHole(round, match){
  const st=matchStatus(round,match);
  const last = (st && st.closeHole!=null) ? st.closeHole : 17;
  for(let h=0;h<=last;h++){ if(!matchHoleComplete(round,match,h)) return h; }
  return Math.max(0, Math.min(17, last));
}

/* ============================================================
   DETAIL TAB  (full scorecard entry grid)
   ============================================================ */
function renderPlay(){
  let html=`<div class="sub" style="margin:0 2px 10px">Read-only scorecards. Enter scores on the Play tab.</div>`;
  let any=false;
  activeRounds().forEach(r=>{
    if(!r.matches.length) return;
    any=true;
    const c=courseOf(r);
    html+=`<div class="card">
      <h2>Round ${r.n} · ${r.fmt}</h2>
      <div class="sub">${escapeHtml(c.courseName)} · ${escapeHtml(c.tees)} tees${state.useHcp?` · CR ${c.cr} / Slope ${c.slope} / Par ${c.par}`:" · scratch"}</div>`;
    r.matches.forEach(m=>{ html+=scorecard(r,m); });
    html+=`</div>`;
  });
  if(!any) html=`<div class="card"><h2>No matches yet</h2><div class="sub">Head to the Setup tab to add pairings for each round, then enter scores here.</div></div>`;
  view.innerHTML=html;
  bindPlay();
}

function scorecard(round, match){
  const balls=withPlayingHcps(round, match);
  const ready = balls.length>0 && balls.every(b=>b.players.every(Boolean)||isSharedBall(round.fmt));
  const st = ready ? matchStatus(round, match) : null;
  const stTxt = st ? statusText(round, match, st) : {cls:"h",text:"Set pairing"};

  // header
  let html=`<div class="match-card" data-rid="${round.id}" data-mid="${match.id}">
    <div class="match-head">
      <span class="vs-lbl">${matchVsLabel(round,match)}</span>
      <span class="status ${stTxt.cls}" data-statusfor="${match.id}">${escapeHtml(stTxt.text)}</span>
    </div>`;

  if(!ready){
    html+=`<div style="padding:12px"><div class="empty">Select players for this match in Setup.</div></div></div>`;
    return html;
  }

  // table
  const c=courseOf(round);
  html+=`<div class="sc-scroll"><table class="sc">`;
  // header row
  html+=`<thead><tr><th class="hlbl">Hole</th>`;
  for(let h=0;h<18;h++){
    html+=`<th><span class="hno">${h+1}</span><span class="hsi">${state.useHcp?c.holes[h].si:""}</span></th>`;
  }
  html+=`<th class="tot">Gross</th><th class="tot">Net</th></tr></thead><tbody>`;

  // ball rows
  balls.forEach(b=>{
    const cls=b.team==="R"?"ball-r":"ball-b";
    const plus = b.playHcp>0 ? `<span class="plus">+${b.playHcp}</span>` : "";
    html+=`<tr class="${cls}"><td class="hlbl">${escapeHtml(b.label)}${plus}</td>`;
    for(let h=0;h<18;h++){
      const recv=strokesOnHole(b.playHcp, c.holes[h].si);
      const dots = recv>0 ? `<span class="dots">${Array(recv).fill('<span class="dot"></span>').join("")}</span>` : "";
      const dead = st.closeHole!==null && h>st.closeHole;
      const g = ballScore(match,b.key,h);
      html+=`<td><div class="sc-cell">${dots}<input type="number" inputmode="numeric" min="1" max="20" readonly tabindex="-1" class="sc-ro"
        data-rid="${round.id}" data-mid="${match.id}" data-key="${b.key}" data-hole="${h}"
        value="${g===null?"":g}" ${dead?'style="opacity:.35"':""}></div></td>`;
    }
    html+=`<td class="tot-cell" data-gross="${b.key}">—</td><td class="tot-cell" data-net="${b.key}">—</td>`;
    html+=`</tr>`;
  });

  // hole-won row
  html+=`<tr class="won-row"><td class="hlbl">Hole won</td>`;
  for(let h=0;h<18;h++) html+=`<td data-chair="${h}">${chipHtml(round,match,st,h)}</td>`;
  html+=`<td></td><td></td></tr>`;

  html+=`</tbody></table></div></div>`;
  // compute totals after insertion via update
  return html;
}

function matchVsLabel(round, match){
  const names = ids => (ids||[]).map(id=>(state.players[id]||{}).name||"?").join(" / ") || "—";
  return `<span style="color:#ff8d97">${escapeHtml(names(match.red))}</span> <span style="color:var(--faint)">v</span> <span style="color:#8fb4ff">${escapeHtml(names(match.blue))}</span>`;
}

function chipHtml(round, match, st, h){
  if(st && st.closeHole!==null && h>st.closeHole) return `<span class="chip dead">x</span>`;
  const balls = st? st.balls : withPlayingHcps(round,match);
  const res = holeResult(round, match, balls, h);
  if(res==="R") return `<span class="chip R">${escapeHtml(teamLetter("R"))}</span>`;
  if(res==="B") return `<span class="chip B">${escapeHtml(teamLetter("B"))}</span>`;
  if(res==="H") return `<span class="chip H">–</span>`;
  return `<span class="chip none">·</span>`;
}

function bindPlay(){
  // Detail tab is read-only (view of scorecards); totals only, no editing.
  view.querySelectorAll(".match-card").forEach(card=>updateMatchTotals(card));
}

function onScoreInput(e){
  const {rid,mid,key,hole}=e.target.dataset;
  const r=state.rounds.find(x=>x.id===rid); const m=r&&r.matches.find(x=>x.id===mid);
  if(!m) return;
  if(!m.scores) m.scores={};
  if(!m.scores[key]) m.scores[key]=Array(18).fill(null);
  const v=e.target.value;
  m.scores[key][Number(hole)] = v===""?null:Number(v);
  saveState();
  // targeted update of this match's chips, totals, status + header + ledger (cheap)
  const card=e.target.closest(".match-card");
  updateMatchView(card, r, m);
  renderHeader();
}

function updateMatchView(card, round, match){
  const st=matchStatus(round, match);
  // status text
  const stTxt=statusText(round, match, st);
  const stEl=card.querySelector(".status");
  if(stEl){ stEl.className="status "+stTxt.cls; stEl.textContent=stTxt.text; }
  // chips (recompute all with dead-hole logic)
  for(let h=0;h<18;h++){
    const td=card.querySelector(`[data-chair="${h}"]`);
    if(td) td.innerHTML=chipHtml(round, match, st, h);
  }
  // dim dead-hole inputs
  card.querySelectorAll(".sc-cell input").forEach(inp=>{
    const h=Number(inp.dataset.hole);
    const dead = st.closeHole!==null && h>st.closeHole;
    inp.style.opacity = dead ? ".35" : "";
  });
  updateMatchTotals(card, round, match, st);
}

function updateMatchTotals(card, round, match, st){
  round = round || state.rounds.find(r=>r.id===card.dataset.rid);
  match = match || (round && round.matches.find(m=>m.id===card.dataset.mid));
  if(!round||!match) return;
  const balls = (st&&st.balls) || withPlayingHcps(round, match);
  balls.forEach(b=>{
    const gEl=card.querySelector(`[data-gross="${b.key}"]`);
    const nEl=card.querySelector(`[data-net="${b.key}"]`);
    if(!gEl||!nEl) return;
    let complete=true, gross=0;
    for(let h=0;h<18;h++){ const g=ballScore(match,b.key,h); if(g===null){complete=false;break;} gross+=g; }
    if(complete){ gEl.textContent=gross; nEl.textContent=gross - b.baseCH; }
    else { gEl.textContent="—"; nEl.textContent="—"; }
  });
}

function renderLeaderboard(){
  let html="";
  let any=false;
  activeRounds().slice().reverse().forEach(r=>{
    if(!r.matches.length) return;
    any=true;
    const c=courseOf(r);
    let rR=0,rB=0;
    r.matches.forEach(m=>{ const d=matchPoints(matchStatus(r,m)); if(d){rR+=d.R;rB+=d.B;} });
    const isOpen = lbRoundOpen[r.id]===true;
    html+=`<div class="lb-round">
      <button class="lb-round-head" data-lbtoggle="${r.id}">
        <span class="lb-rn">R${r.n}</span>
        <span class="lb-rf">${r.fmt}</span>
        <span class="lb-rc">${escapeHtml(c.courseName)}${c.tees?` · ${escapeHtml(c.tees)}`:""}</span>
        <span class="lb-rp"><span class="seg-r">${fmtPts(rR)}</span> – <span class="seg-b">${fmtPts(rB)}</span></span>
        <span class="lb-rchev">${isOpen?"▾":"▸"}</span>
      </button>`;
    if(isOpen) r.matches.forEach((m,i)=>{ html+=leaderboardCard(r,m,i+1); });
    html+=`</div>`;
  });
  if(!any) html=`<div class="card"><h2>Leaderboard</h2><div class="sub">Add pairings in Setup and enter scores in Play. Matches will appear here — tap a round to expand it, then a match for its scorecard.</div></div>`;
  view.innerHTML=html;
  bindLeaderboard();
}

function leaderboardCard(round, match, num){
  const isSingles = round.fmt==="Singles";
  const redReady = (match.red||[]).filter(Boolean).length === (isSingles?1:2);
  const blueReady = (match.blue||[]).filter(Boolean).length === (isSingles?1:2);
  const ready = redReady && blueReady;

  const st = ready ? matchStatus(round, match) : null;
  const lead = st ? (st.standing>0?"R":st.standing<0?"B":null) : null;
  const finished = st ? st.finished : false;

  // center status
  let big="AS", thru = st? (`THRU ${st.played}`) : "—", centerCls="none";
  if(st){
    const k=Math.abs(st.standing);
    if(finished){
      if(st.closeHole!==null){
        const rem=17-st.closeHole;
        big = rem>0 ? `${k}&${rem}` : `${k}UP`;
      } else big = k===0 ? "AS" : `${k}UP`;
      thru = "FINAL";
      centerCls = lead ? (lead==="R"?"solid-r":"solid-b") : "halved";
    } else if(st.played===0){
      big="AS"; thru="THRU 0"; centerCls="none";
    } else {
      big = k===0 ? "AS" : `${k}UP`;
      centerCls = lead ? (lead==="R"?"lead-r":"lead-b") : "none";
    }
  }
  // arrow only while the match is live; a finished match is one continuous bar
  const point = (centerCls==="lead-r") ? "point-left" : (centerCls==="lead-b") ? "point-right" : "";

  // side panels colored only when finished
  const leftFill = finished && lead==="R" ? "fill-r" : "";
  const rightFill = finished && lead==="B" ? "fill-b" : "";

  const firstName = id => { const p=state.players[id]; return p ? (p.name||"").trim().split(/\s+/)[0] : ""; };
  const sideTitle = (team)=>{
    const ids = (team==="R" ? (match.red||[]) : (match.blue||[])).filter(Boolean);
    const strokes = ready ? sideStrokes(round, match, team) : 0;
    const name = ids.length ? ids.map(firstName).join("/") : `Pair ${num}`;
    return `${escapeHtml(name)} <span class="lb-strk">(${strokes})</span>`;
  };
  const sideLines = (team)=>{
    const ids = (team==="R" ? (match.red||[]) : (match.blue||[])).filter(Boolean);
    if(isSingles) return ids.length?`<div class="lb-pl">HCP ${courseHandicap(state.players[ids[0]],round)}</div>`:`<div class="lb-pl">—</div>`;
    if(!ids.length) return `<div class="lb-pl">— / —</div>`;
    return ids.map(id=>`<div class="lb-pl">${escapeHtml(shortName(id))} (${courseHandicap(state.players[id],round)})</div>`).join("");
  };

  const open = expandedMatch===match.id;
  let html=`<div class="lb-card ${open?"open":""}">
    <div class="lb-row" data-mid="${match.id}">
      <div class="lb-side left ${leftFill}">
        <div class="lb-title r">${sideTitle("R")}</div>
        ${sideLines("R")}
      </div>
      <div class="lb-center ${centerCls} ${point}">
        <div class="lb-big">${big}</div>
        <div class="lb-thru">${thru}</div>
      </div>
      <div class="lb-side right ${rightFill}">
        <div class="lb-title b">${sideTitle("B")}</div>
        ${sideLines("B")}
      </div>
    </div>`;

  if(open && ready) html += teamScorecard(round, match, st);
  else if(open && !ready) html += `<div class="lb-expand"><div class="empty" style="padding:14px">Complete this pairing in Setup to see the scorecard.</div></div>`;

  html+=`</div>`;
  return html;
}

// Expanded TEAM scorecard: pair net per hole, hole winner highlighted, running standings.
function teamScorecard(round, match, st){
  const c=courseOf(round);
  const stand=runningStandings(st);
  const num=n=> (n===null||n===undefined) ? "-" : n;

  const nine=(start)=>{
    const idxs=[]; for(let h=start;h<start+9;h++) idxs.push(h);
    const label = start===0 ? "Out" : "In";
    // side nets + totals over this nine (resolved holes only)
    const cellFor=(team)=>{
      let total=0, hasAny=false;
      const tds = idxs.map(h=>{
        const v=sideHoleScore(round,match,st.balls,team,h);
        const dead = st.closeHole!==null && h>st.closeHole;
        const res = st.results[h];
        const win = !dead && res===team;          // this side won the hole
        if(v!==null && !dead){ total+=v; hasAny=true; }
        return `<td class="${dead?"dead":""}">${(v===null||dead)?"":`<span class="${win?("win "+(team==="R"?"win-r":"win-b")):""}">${v}</span>`}</td>`;
      }).join("");
      const lbl = escapeHtml(teamName(team));
      return `<td class="lb-rowlbl ${team==="R"?"r":"b"}">${lbl}</td>${tds}<td class="lb-tot">${hasAny?total:""}</td>`;
    };
    const parCells = idxs.map(h=>`<td>${c.holes[h].par}</td>`).join("");
    const parTot = idxs.reduce((s,h)=>s+c.holes[h].par,0);
    const standCells = idxs.map(h=>{
      const s=stand[h];
      const cls = s.lead==="R"?"r":s.lead==="B"?"b":"";
      return `<td class="${cls}">${s.dead?"":s.txt}</td>`;
    }).join("");
    const holeCells = idxs.map(h=>`<td>${h+1}</td>`).join("");
    return `<table class="lb-sc">
      <colgroup><col class="c-lbl"><col span="9" class="c-hole"><col class="c-tot"></colgroup>
      <tr class="lb-hole"><th>Hole</th>${holeCells}<th>${label}</th></tr>
      <tr class="lb-par"><td class="lb-rowlbl">Par</td>${parCells}<td class="lb-tot">${parTot}</td></tr>
      <tr class="lb-pairrow rrow">${cellFor("R")}</tr>
      <tr class="lb-pairrow brow">${cellFor("B")}</tr>
      <tr class="lb-stand"><td class="lb-rowlbl">Standings</td>${standCells}<td></td></tr>
    </table>`;
  };

  return `<div class="lb-expand">${nine(0)}${nine(9)}</div>`;
}

function bindLeaderboard(){
  view.querySelectorAll("[data-lbtoggle]").forEach(b=>b.addEventListener("click",e=>{
    const id=e.currentTarget.dataset.lbtoggle;
    lbRoundOpen[id] = !(lbRoundOpen[id]===true);
    renderLeaderboard();
  }));
  view.querySelectorAll(".lb-row").forEach(row=>{
    row.addEventListener("click",()=>{
      const mid=row.dataset.mid;
      expandedMatch = (expandedMatch===mid) ? null : mid;
      renderLeaderboard();
    });
  });
}

/* ============================================================
   GIANT SKINS TAB  (individual net-skins side game)
   ============================================================ */
function fmtMoney(cents){ return "$"+(cents/100).toFixed(2); }
function fmtMoneySigned(cents){ return (cents<0?"-$":"+$")+(Math.abs(cents)/100).toFixed(2); }

// Strokes a player gets on a hole using FULL course handicap (100%), per the giant-skins spec.
// Positive handicap: strokes on the hardest holes; plus (negative) handicap: strokes given back
// from the easiest holes (returned as a negative number).
function giantStrokesOnHole(H, si){
  if(H===0) return 0;
  if(H>0){ const rem=H%18; return Math.floor(H/18) + ((rem>0 && si<=rem)?1:0); }
  const A=-H, rem=A%18;
  const give = Math.floor(A/18) + ((rem>0 && (19-si)<=rem)?1:0);
  return -give;
}

function giantSkins(round){
  const c=courseOf(round);
  const buyIn=state.skins.buyIn||0;
  const shared=isSharedBall(round.fmt);

  // distinct players in the round (everyone buys in → drives the pot)
  const playerIds=[];
  round.matches.forEach(m=>{ (m.red||[]).concat(m.blue||[]).forEach(id=>{ if(id&&state.players[id]&&!playerIds.includes(id)) playerIds.push(id); }); });
  if(!playerIds.length) return {na:"No players in this round yet."};
  const pot=playerIds.length*buyIn;

  // entrants: individual players normally; one entry per pair/side for shared-ball formats
  const entrants=[]; // {key,name,short,ch,scores}
  if(shared){
    round.matches.forEach(m=>{
      [["R","red","sideR"],["B","blue","sideB"]].forEach(([t,side,ballKey])=>{
        const ps=(m[side]||[]).filter(id=>id&&state.players[id]);
        if(!ps.length) return;
        const chs=ps.map(id=>courseHandicap(state.players[id], round));
        const ch=ps.length>=2 ? sideHcpFor(round.fmt, chs[0], chs[1]) : chs[0];
        const scores=(m.scores&&m.scores[ballKey])?m.scores[ballKey]:Array(18).fill(null);
        const nm=sideFirstNames(m,t);
        entrants.push({key:m.id+"|"+t, name:nm, short:nm, ch, scores});
      });
    });
  } else {
    playerIds.forEach(id=>{
      const m=round.matches.find(mm=>(mm.red||[]).includes(id)||(mm.blue||[]).includes(id));
      const scores=(m&&m.scores&&m.scores[id])?m.scores[id]:Array(18).fill(null);
      const full=state.players[id].name||"?";
      entrants.push({key:id, name:full, short:full.trim().split(/\s+/)[0], ch:courseHandicap(state.players[id], round), scores});
    });
  }
  if(!entrants.length) return {na:"No players in this round yet."};

  // Outright winner of each hole (strictly lowest net; ties win nothing).
  const has=(e,h)=>{ const v=e.scores[h]; return v!==null&&v!==undefined&&v!==""; };
  const holes=[]; const skinOrder=[]; let decidedCount=0;
  for(let h=0;h<18;h++){
    // Every entrant must have a score on this hole before a skin is awarded.
    if(!entrants.every(e=>has(e,h))){ holes.push({h, decided:false}); continue; }
    decidedCount++;
    let best=Infinity; const net={};
    entrants.forEach(e=>{ const n=Number(e.scores[h]) - giantStrokesOnHole(e.ch, c.holes[h].si); net[e.key]=n; if(n<best) best=n; });
    const low=entrants.filter(e=>net[e.key]===best);
    if(low.length===1){ holes.push({h, decided:true, won:true, winner:low[0].key, wname:low[0].short, net:best}); skinOrder.push(low[0].key); }
    else { holes.push({h, decided:true, won:false, net:best, tied:low.length}); }
  }

  // Pot divided by skins actually won; remainder cents to the first skins.
  const totalSkins=skinOrder.length;
  const base = totalSkins ? Math.floor(pot/totalSkins) : 0;
  const rem  = totalSkins ? pot%totalSkins : 0;
  const win={}, skins={}; entrants.forEach(e=>{ win[e.key]=0; skins[e.key]=0; });
  let awarded=0;
  skinOrder.forEach((k,idx)=>{ const v=base+(idx<rem?1:0); win[k]+=v; skins[k]++; awarded+=v; });
  const skinValue = totalSkins ? pot/totalSkins : 0;

  return {c, entrants, win, skins, pot, holes, totalSkins, skinValue, awarded, decidedCount, buyIn, playerCount:playerIds.length, shared};
}

function renderSkins(){
  let html="";
  let any=false;
  activeRounds().slice().reverse().forEach(r=>{
    if(!r.matches.length) return;
    any=true;
    const res=giantSkins(r);
    const open = skinsOpen[r.id] !== false;
    const sum = res.na ? "—" : `${res.totalSkins} skin${res.totalSkins===1?"":"s"} · <span class="money">${fmtMoney(res.pot)}</span>`;
    html+=`<div class="card skn-card">
      <button class="skn-head" data-sktoggle="${r.id}">
        <span class="skn-rn">R${r.n}</span><span class="skn-hfmt">${escapeHtml(r.fmt)}</span>
        <span class="skn-sum">${sum}</span><span class="skn-chev">${open?"▾":"▸"}</span>
      </button>`;
    if(!open){ html+=`</div>`; return; }
    if(res.na){ html+=`<div class="sub" style="margin-top:10px">${escapeHtml(res.na)}</div></div>`; return; }
    const c=res.c;
    const valTxt = res.totalSkins ? `<span class="money">${fmtMoney(Math.round(res.skinValue))}</span>/skin` : "skin value TBD";
    html+=`<div class="sub" style="margin-top:10px">${escapeHtml(c.courseName)}${c.tees?` · ${escapeHtml(c.tees)}`:""} · ${res.playerCount} player${res.playerCount===1?"":"s"}${res.shared?` · ${res.entrants.length} pairs`:""} · pot <span class="money">${fmtMoney(res.pot)}</span> · ${res.totalSkins} skin${res.totalSkins===1?"":"s"} won · ${valTxt}</div>`;

    // leaderboard sorted by winnings
    const rows=res.entrants.map(e=>({name:e.name, ch:e.ch, sk:res.skins[e.key], won:res.win[e.key]}))
      .sort((a,b)=> b.won-a.won || b.sk-a.sk);
    html+=`<div class="sc-scroll" style="margin-bottom:10px"><table class="skn"><thead><tr>
      <th style="text-align:left">${res.shared?"Pair":"Player"}</th><th>CH</th><th>Skins</th><th>Won</th></tr></thead><tbody>`;
    rows.forEach(row=>{
      html+=`<tr class="${row.sk>0?"":"skn-zero"}"><td style="text-align:left">${escapeHtml(row.name)}</td>
        <td>${state.useHcp?row.ch:0}</td>
        <td>${row.sk>0?`<span class="skn-ct">${row.sk}</span>`:"-"}</td>
        <td>${row.won>0?`<span class="money">${fmtMoney(row.won)}</span>`:"-"}</td></tr>`;
    });
    html+=`</tbody></table></div>`;

    // per-hole breakdown
    const decided=res.holes.filter(h=>h.decided);
    if(decided.length){
      html+=`<div class="skn-holes">`;
      decided.forEach(hr=>{
        if(hr.won){
          const nm=hr.wname;
          html+=`<div class="skn-hrow"><span class="skn-h">H${hr.h+1}</span>
            <span class="skn-w">${escapeHtml(nm)} <span class="skn-net">(net ${hr.net})</span></span>
            <span class="skn-pay">1 skin</span></div>`;
        } else {
          html+=`<div class="skn-hrow tied"><span class="skn-h">H${hr.h+1}</span>
            <span class="skn-w">Tied <span class="skn-net">(net ${hr.net} · ${hr.tied} ${res.shared?"pairs":"players"})</span></span>
            <span class="skn-pay">no skin</span></div>`;
        }
      });
      html+=`</div>`;
      const pending=18-res.decidedCount;
      html+=`<div class="sub" style="margin-top:8px">${res.totalSkins?`Pot <span class="money">${fmtMoney(res.pot)}</span> ÷ ${res.totalSkins} skin${res.totalSkins===1?"":"s"} = <span class="money">${fmtMoney(Math.round(res.skinValue))}</span> each`:"No skins won yet"}${pending?` · ${pending} hole${pending>1?"s":""} pending`:""}</div>`;
    } else {
      html+=`<div class="sub">No scores entered for this round yet.</div>`;
    }
    html+=`</div>`;
  });
  if(!any) html=`<div class="card"><h2>Giant Skins</h2><div class="sub">Add pairings and enter scores; each round's skins results will show here.</div></div>`;
  view.innerHTML=html;
  view.querySelectorAll("[data-sktoggle]").forEach(b=>b.addEventListener("click",e=>{
    const id=e.currentTarget.dataset.sktoggle;
    skinsOpen[id] = (skinsOpen[id]===false);   // default open -> toggle closed/open
    renderSkins();
  }));
}

   Export / Import
   ============================================================ */
function exportJSON(){
  const clean=JSON.parse(JSON.stringify(state));
  clean.rounds.forEach(r=>delete r._editHoles);
  if(clean.course) delete clean.course._editHoles;
  const blob=new Blob([JSON.stringify(clean,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  const fn=(state.name||"cupcaptain").trim().replace(/[^a-z0-9]+/gi,"-").toLowerCase()||"cupcaptain";
  a.href=URL.createObjectURL(blob); a.download=fn+".json";
  document.body.appendChild(a); a.click(); a.remove();
  toast("Exported");
}

function importJSON(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const parsed=JSON.parse(reader.result);
      if(!parsed || !parsed.players || !parsed.rounds) throw new Error("missing fields");
      const keepId = state && state.id;
      state=migrate(parsed); if(keepId) state.id=keepId; saveState(); render(); toast("Imported");
    }catch(err){ toast("Invalid file"); }
  };
  reader.readAsText(file);
  e.target.value="";
}

  } else {
    // Brand-new / never-set-up: start empty so the home screen shows the welcome card.
    _lib = { activeId: null, tournaments: [], cleanedV24:true };
  }
  saveLibrary(_lib);
} else {
  // One-time cleanup: drop tournaments auto-seeded by earlier builds that were
  // never actually set up (no players, teams, or scores).
  if(!_lib.cleanedV24){
    _lib.tournaments = _lib.tournaments.filter(t => hasContent(migrate(t.state)));
    _lib.cleanedV24 = true;
    if(!_lib.tournaments.some(t=>t.id===_lib.activeId)){
      _lib.activeId = _lib.tournaments[0] ? _lib.tournaments[0].id : null;
    }
    saveLibrary(_lib);
  }
  // Make the working state match the library's active tournament (if any).
  const act = _lib.tournaments.find(t=>t.id===_lib.activeId) || _lib.tournaments[0];
  if(act){ state = migrate(act.state); state.id = act.id; }
}

saveState();
render();          // prepare the app view (kept hidden behind the home screen)
initSync();
showHome();        // after the splash, land on the tournament list

(function(){ const txt="v "+APP_VERSION.toFixed(2).replace(/^0/,""); const v=document.getElementById("verTag"); if(v) v.textContent=txt; const sv=document.getElementById("splashVer"); if(sv) sv.textContent=txt; })();
</script>
</body>
