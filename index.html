<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Border Battle · Reds vs Blues</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0f14; --panel:#141923; --panel-2:#1b2230; --line:#2a3342;
  --ink:#f3f1ea; --muted:#8b95a7; --faint:#5b6577;
  --red:#e02434; --red-deep:#9c1622; --blue:#2563eb; --blue-deep:#16367f;
  --gold:#e8c468;
  --green:#1f9d57; --green-deep:#15784a;
  --display:'Anton',sans-serif;
  --body:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'Spline Sans Mono',ui-monospace,'SF Mono',Menlo,monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg); color:var(--ink); font-family:var(--body);
  font-size:15px; line-height:1.45; min-height:100vh;
  background-image:
    radial-gradient(420px 300px at 0% 0%, rgba(224,36,52,.18), transparent 70%),
    radial-gradient(420px 300px at 100% 0%, rgba(37,99,235,.18), transparent 70%);
  background-attachment:fixed;
}
.wrap{max-width:1040px;margin:0 auto;padding:0 16px 80px;}
a{color:inherit;}
button{font-family:var(--body);cursor:pointer;}
input,select{font-family:var(--body);}
.mono{font-family:var(--mono);}

/* ---------- Header / Scoreboard ---------- */
header.board{
  position:sticky;top:0;z-index:40;
  background:linear-gradient(180deg, rgba(12,15,20,.96), rgba(12,15,20,.86));
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.board-inner{max-width:1040px;margin:0 auto;padding:12px 16px 10px;}
.title{
  font-family:var(--display); text-align:center; letter-spacing:.04em;
  font-size:clamp(20px,5.2vw,30px); line-height:1; margin:2px 0 10px;
}
.title .vs{color:var(--gold);margin:0 .35em;font-size:.7em;vertical-align:.08em;}
.title .r{color:var(--red);} .title .b{color:var(--blue);}
.score-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;}
.team-panel{border-radius:12px;padding:10px 12px;border:1px solid var(--line);position:relative;overflow:hidden;text-align:center;}
.team-panel.R{background:linear-gradient(135deg, rgba(156,22,34,.35), rgba(20,25,35,.6));}
.team-panel.B{background:linear-gradient(135deg, rgba(22,54,127,.35), rgba(20,25,35,.6));}
.team-panel .tn{font-weight:800;font-size:13px;letter-spacing:.02em;text-transform:uppercase;}
.team-panel.R .tn{color:#ff8d97;} .team-panel.B .tn{color:#8fb4ff;}
.team-panel .pts{font-family:var(--display);font-size:clamp(34px,10vw,52px);line-height:.9;}
.team-panel .proj{font-family:var(--mono);font-size:11px;color:var(--muted);}
.center-col{text-align:center;min-width:74px;}
.center-col .towin{font-family:var(--display);font-size:22px;color:var(--gold);line-height:.95;}
.center-col .ofN{font-family:var(--mono);font-size:11px;color:var(--muted);}
.center-col .towin-cap{margin-top:14px;font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--faint);line-height:1.15;}
.share-bar{margin-top:9px;height:7px;border-radius:6px;background:var(--panel-2);overflow:hidden;display:flex;border:1px solid var(--line);}
.share-bar .sr{background:linear-gradient(90deg,var(--red-deep),var(--red));}
.share-bar .sb{background:linear-gradient(90deg,var(--blue),var(--blue-deep));margin-left:auto;}
.clinch{margin-top:7px;text-align:center;font-family:var(--mono);font-size:11.5px;color:var(--muted);}
.clinch.win{color:var(--gold);font-weight:600;}
.clinch .seg-r{color:#ff8d97;} .clinch .seg-b{color:#8fb4ff;}

/* ---------- Tabs ---------- */
.tabs{position:sticky;top:0;z-index:30;display:flex;gap:6px;justify-content:center;
  padding:8px 0;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tabs button{
  background:var(--panel);color:var(--muted);border:1px solid var(--line);
  border-radius:999px;padding:8px 18px;font-weight:700;font-size:13px;letter-spacing:.03em;
  text-transform:uppercase;transition:.15s;white-space:nowrap;flex:0 0 auto;
}
.tabs button.active{color:var(--bg);background:var(--gold);border-color:var(--gold);}
.tabs button:not(.active):hover{color:var(--ink);border-color:var(--faint);}

/* ---------- Cards ---------- */
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;}
.card h2{font-family:var(--display);font-weight:400;letter-spacing:.03em;font-size:19px;margin:0 0 4px;}
.card h3{font-size:14px;margin:0 0 10px;color:var(--gold);text-transform:uppercase;letter-spacing:.05em;font-weight:700;}
.sub{color:var(--muted);font-size:12.5px;margin:0 0 14px;}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
label.fld{display:flex;flex-direction:column;gap:4px;font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600;}
input[type=text],input[type=number],select{
  background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
  border-radius:9px;padding:9px 11px;font-size:14px;min-width:0;outline:none;transition:.12s;
}
input:focus,select:focus{border-color:var(--gold);}
input::placeholder{color:var(--faint);}
.btn{background:var(--panel-2);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:9px 14px;font-weight:600;font-size:13px;transition:.12s;}
.btn:hover{border-color:var(--faint);}
.btn.gold{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:700;}
.btn.red{background:var(--red-deep);border-color:var(--red);}
.btn.blue{background:var(--blue-deep);border-color:var(--blue);}
.btn.ghost{background:transparent;}
.btn.danger{color:#ff8d97;border-color:var(--red-deep);}
.btn.sm{padding:6px 10px;font-size:12px;}

/* segmented control */
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
.seg button{background:var(--panel-2);border:none;color:var(--muted);padding:8px 16px;font-weight:700;font-size:13px;}
.seg button.on.R{background:var(--red-deep);color:#fff;}
.seg button.on.B{background:var(--blue-deep);color:#fff;}

/* toggle */
.toggle{display:inline-flex;align-items:center;gap:10px;cursor:pointer;user-select:none;}
.toggle .track{width:46px;height:26px;border-radius:999px;background:var(--panel-2);border:1px solid var(--line);position:relative;transition:.15s;}
.toggle .knob{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:var(--faint);transition:.15s;}
.toggle.on .track{background:rgba(232,196,104,.25);border-color:var(--gold);}
.toggle.on .knob{left:22px;background:var(--gold);}

/* team grid + players */
.team-grid{display:grid;grid-template-columns:1fr 70px;gap:8px;align-items:center;margin-bottom:8px;}
.team-row-grid{display:grid;grid-template-columns:minmax(0,1fr) 46px auto;gap:6px;align-items:center;margin-bottom:8px;}
.defchk{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);white-space:nowrap;cursor:pointer;font-weight:600;}
.defchk input,.same-course input{width:16px;height:16px;accent-color:var(--gold);cursor:pointer;}
.same-course{display:inline-flex;align-items:center;gap:8px;margin:6px 0 12px;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;
  background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:9px 12px;}
.course-note{font-size:12.5px;color:var(--muted);margin-bottom:10px;}
.course-note strong{color:var(--ink);}
.players-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:620px){.players-cols{grid-template-columns:1fr;}}
.pcol h4{margin:0 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.04em;}
.pcol.R h4{color:#ff8d97;} .pcol.B h4{color:#8fb4ff;}
.prow{display:grid;grid-template-columns:1fr auto auto;gap:6px;align-items:center;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:6px 8px;margin-bottom:6px;}
.prow input.pname{background:transparent;border:none;padding:4px 2px;}
.prow input.pidx{width:62px;text-align:center;background:var(--bg);}
.prow .x{background:transparent;border:none;color:var(--faint);font-size:18px;line-height:1;padding:2px 6px;}
.prow .x:hover{color:var(--red);}
.prow .x:disabled{opacity:.3;cursor:not-allowed;}

/* round setup */
.round-block{border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden;}
.round-head{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--panel-2);}
.round-head .num{font-family:var(--display);font-size:22px;color:var(--gold);min-width:26px;}
.round-head .fmt{font-weight:700;}
.round-head .fmt-sel{font-family:var(--body);font-weight:700;font-size:14px;color:var(--ink);
  background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:5px 8px;}
.fmt-info-btn{background:none;border:none;color:var(--gold);font-size:16px;cursor:pointer;padding:0 2px;line-height:1;}
.fmt-info{padding:10px 13px;background:var(--panel);border-bottom:1px solid var(--line);
  color:var(--muted);font-size:12.5px;line-height:1.5;}
.round-head .alw{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted);}
.round-body{padding:13px;}
.course-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:9px;margin-bottom:10px;}
.course-rsp{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:9px;margin-bottom:10px;max-width:340px;}
.course-rsp input{padding:8px 8px;}
.holes-editor{margin-top:8px;}
.holes-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;}
.holes-table th,.holes-table td{border:1px solid var(--line);padding:3px 2px;text-align:center;}
.holes-table th{color:var(--muted);font-weight:500;}
.holes-table input{width:30px;text-align:center;padding:3px 1px;font-size:11px;background:var(--bg);border-radius:5px;}
.collapse-btn{font-size:12px;color:var(--gold);background:none;border:none;padding:4px 0;font-weight:600;}

/* pairings */
.pair-row{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:center;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:8px;margin-bottom:7px;}
.pair-side select{width:100%;margin-bottom:4px;}
.pair-status{font-family:var(--mono);font-size:11px;color:var(--muted);grid-column:1/3;}
.warn{color:var(--gold);font-size:11.5px;font-family:var(--mono);margin-top:4px;}

/* play scorecards */
.match-card{border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden;background:var(--panel-2);}
.match-head{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
.match-head .vs-lbl{font-weight:700;font-size:13px;}
.match-head .status{margin-left:auto;font-family:var(--mono);font-size:12px;font-weight:600;}
.status.r{color:#ff8d97;} .status.b{color:#8fb4ff;} .status.h{color:var(--muted);} .status.live{color:var(--gold);}
.sc-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table.sc{border-collapse:collapse;font-family:var(--mono);font-size:12px;min-width:max-content;}
table.sc th,table.sc td{border:1px solid var(--line);text-align:center;padding:0;}
table.sc .hlbl{position:sticky;left:0;background:var(--panel);z-index:2;text-align:left;padding:4px 9px;white-space:nowrap;min-width:120px;font-family:var(--body);}
table.sc thead th{background:var(--panel);color:var(--muted);font-weight:500;padding:4px 0;min-width:30px;}
table.sc thead .hno{font-size:12px;color:var(--ink);display:block;}
table.sc thead .hsi{font-size:9px;color:var(--gold);display:block;margin-top:3px;}
table.sc thead .tot{min-width:42px;color:var(--ink);}
.sc-cell{position:relative;min-width:30px;height:34px;}
.sc-cell input{width:34px;height:34px;border:none;background:transparent;text-align:center;color:var(--ink);font-family:var(--mono);font-size:13px;padding:0;}
.sc-cell input.sc-ro{pointer-events:none;caret-color:transparent;}
.sc-cell input:focus{background:rgba(232,196,104,.12);}
.dots{position:absolute;top:2px;right:3px;display:flex;gap:1px;pointer-events:none;}
.dot{width:4px;height:4px;border-radius:50%;background:var(--gold);}
.sc .ball-r .hlbl{border-left:3px solid var(--red);}
.sc .ball-b .hlbl{border-left:3px solid var(--blue);}
.plus{color:var(--gold);font-family:var(--mono);font-size:11px;margin-left:5px;}
.sc .tot-cell{font-weight:600;color:var(--ink);min-width:42px;}
.sc .won-row .hlbl{color:var(--muted);font-family:var(--mono);font-size:11px;}
.chip{display:inline-flex;align-items:center;justify-content:center;width:24px;height:22px;border-radius:5px;font-weight:700;font-size:12px;margin:3px auto;}
.chip.R{background:var(--red-deep);color:#fff;}
.chip.B{background:var(--blue-deep);color:#fff;}
.chip.H{background:var(--panel);color:var(--muted);}
.chip.none{background:transparent;color:var(--faint);}
.chip.dead{background:transparent;color:var(--faint);opacity:.4;font-weight:400;}

/* ledger */
.led-round{margin-bottom:14px;}
.led-rh{display:flex;align-items:center;gap:10px;padding-bottom:6px;border-bottom:1px solid var(--line);margin-bottom:8px;}
.led-rh .num{font-family:var(--display);color:var(--gold);font-size:18px;}
.led-rh .tot{margin-left:auto;font-family:var(--mono);font-size:13px;}
.led-m{display:flex;justify-content:space-between;gap:10px;padding:6px 2px;font-size:13px;border-bottom:1px solid rgba(42,51,66,.5);}
.led-m .lst{font-family:var(--mono);font-size:12px;color:var(--muted);}

/* ---------- Leaderboard ---------- */
.lb-round{margin-bottom:18px;}
.lb-round-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:8px 2px;flex-wrap:wrap;
  width:100%;background:transparent;border:none;color:var(--ink);text-align:left;cursor:pointer;}
.lb-round-head .lb-rchev{color:var(--gold);font-size:13px;flex:0 0 auto;}
.lb-round-head .lb-rn{font-family:var(--display);color:var(--gold);font-size:18px;line-height:1;}
.lb-round-head .lb-rf{font-weight:700;font-size:13px;}
.lb-round-head .lb-rc{color:var(--muted);font-size:12px;}
.lb-round-head .lb-rp{margin-left:auto;font-family:var(--mono);font-size:13px;font-weight:600;}
.seg-r{color:#ff8d97;} .seg-b{color:#8fb4ff;}

.lb-card{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:10px;background:var(--panel);}
.lb-card.open{border-color:var(--faint);}
.lb-row{display:grid;grid-template-columns:1fr 96px 1fr;align-items:stretch;cursor:pointer;min-height:74px;}
.lb-side{padding:11px 13px;display:flex;flex-direction:column;justify-content:center;gap:1px;transition:background .15s;}
.lb-side.right{text-align:right;align-items:flex-end;}
.lb-title{font-family:var(--body);font-weight:400;letter-spacing:0;font-size:16px;line-height:1.15;}
.lb-title.r{color:var(--red);} .lb-title.b{color:var(--blue);}
.lb-strk{font-family:var(--mono);font-size:13px;}
.lb-pl{font-size:12.5px;color:var(--muted);font-weight:600;line-height:1.25;}
.lb-side.fill-r{background:var(--red);}
.lb-side.fill-r .lb-title,.lb-side.fill-r .lb-pl,.lb-side.fill-r .lb-strk{color:#fff;}
.lb-side.fill-b{background:var(--blue);}
.lb-side.fill-b .lb-title,.lb-side.fill-b .lb-pl,.lb-side.fill-b .lb-strk{color:#fff;}

.lb-center{display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--panel-2);color:var(--muted);}
.lb-center .lb-big{font-family:var(--display);font-size:22px;line-height:1;}
.lb-center .lb-thru{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;margin-top:3px;opacity:.9;}
.lb-center.none{background:var(--panel-2);color:var(--ink);}
.lb-center.halved{background:var(--line);color:var(--ink);}
/* live: pennant arrow points toward the leader */
.lb-center.lead-r{background:var(--red);color:#fff;}
.lb-center.lead-b{background:var(--blue);color:#fff;}
.lb-center.point-left{clip-path:polygon(26% 0,100% 0,100% 100%,26% 100%,0 50%);}
.lb-center.point-right{clip-path:polygon(0 0,74% 0,100% 50%,74% 100%,0 100%);}
/* finished: solid bar, no clip — continuous with the winning side */
.lb-center.solid-r{background:var(--red);color:#fff;}
.lb-center.solid-b{background:var(--blue);color:#fff;}

.lb-expand{padding:10px 10px 14px;background:var(--bg);border-top:1px solid var(--line);overflow-x:auto;-webkit-overflow-scrolling:touch;}
table.lb-sc{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px;table-layout:fixed;margin-bottom:10px;}
table.lb-sc:last-child{margin-bottom:0;}
.lb-sc col.c-lbl{width:96px;} .lb-sc col.c-tot{width:34px;}
table.lb-sc td,table.lb-sc th{border:1px solid var(--line);text-align:center;padding:5px 0;overflow:hidden;}
.lb-sc .lb-hole th{background:var(--panel-2);color:var(--gold);font-weight:600;}
.lb-sc .lb-hole th:first-child{text-align:left;padding-left:8px;color:var(--muted);}
.lb-sc .lb-rowlbl{text-align:left;padding-left:8px;font-family:var(--body);font-weight:600;font-size:11.5px;white-space:nowrap;}
.lb-sc .lb-rowlbl.r{color:#ff8d97;} .lb-sc .lb-rowlbl.b{color:#8fb4ff;}
.lb-sc .lb-par td{color:var(--muted);}
.lb-sc .lb-tot{font-weight:700;color:var(--ink);background:var(--panel-2);}
.lb-sc .rrow td{color:#ff8d97;} .lb-sc .brow td{color:#8fb4ff;}
.lb-sc td.dead{opacity:.3;}
.lb-sc .win{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;color:#fff !important;font-weight:700;}
.lb-sc .win.win-r{background:var(--red);} .lb-sc .win.win-b{background:var(--blue);}
.lb-sc .lb-stand td{font-weight:600;color:var(--muted);}
.lb-sc .lb-stand td.r{color:#ff8d97;} .lb-sc .lb-stand td.b{color:#8fb4ff;}
.lb-sc .lb-stand .lb-rowlbl{color:var(--muted);}

/* ---------- Quick Play (one-touch entry) ---------- */
.qp-rounds{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;}
.qp-sel{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden;}
.qp-sel-head{width:100%;display:flex;align-items:center;gap:10px;background:transparent;border:none;
  padding:11px 13px;color:var(--ink);text-align:left;}
.qp-sel-sum{flex:1;font-weight:700;font-size:14px;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.qp-sel-names{font-weight:500;font-size:12px;color:var(--muted);font-family:var(--mono);margin-left:6px;}
.qp-sel-chev{color:var(--gold);font-size:13px;flex:0 0 auto;}
.qp-sel-body{padding:0 13px 12px;border-top:1px solid var(--line);}
.qp-sel-body .qp-rounds{margin-top:12px;}
.qp-sel-body .qp-matches{margin-bottom:0;}
.qp-rounds::-webkit-scrollbar{display:none;}
.qp-rtab{flex:0 0 auto;background:var(--panel);border:1px solid var(--line);color:var(--muted);
  border-radius:999px;padding:6px 16px;font-weight:700;font-size:13px;}
.qp-rtab.on{background:var(--green);border-color:var(--green);color:#fff;}
.qp-matches{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;}
.qp-matches::-webkit-scrollbar{display:none;}
.qp-mtab{flex:0 0 auto;background:var(--panel);border:1px solid var(--line);color:var(--muted);
  border-radius:10px;padding:7px 14px;font-weight:700;font-size:13px;display:flex;flex-direction:column;align-items:flex-start;gap:1px;line-height:1.1;}
.qp-mtab .qp-mtab-sub{font-weight:500;font-size:10.5px;color:var(--faint);font-family:var(--mono);}
.qp-mtab.on{background:var(--panel-2);border-color:var(--gold);color:var(--ink);}
.qp-mtab.on .qp-mtab-sub{color:var(--muted);}
.qp-nav{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);
  border-radius:10px;padding:3px 8px;margin-bottom:8px;}
.qp-nav .qp-arrow{flex:0 0 auto;width:32px;height:32px;border-radius:8px;background:var(--panel-2);

        <div class="proj" id="projR">proj 0</div>
      </div>
      <div class="center-col">

        <div class="ofN" id="ofN">of 24</div>
        <div class="ofN towin-cap">needed to win</div>
      </div>

        <div class="tn" id="tnB">Blue</div>

<div class="wrap">

    <button data-tab="detail">Detail</button>

  </nav>
  <main id="view"></main>
</div>

<div id="toast"></div>

<script>
"use strict";

/* ============================================================
   Constants
   ============================================================ */
const STORAGE_KEY = "rvb_state_v2";

const ROUND_DEFS = [
  {n:1, fmt:"Four-Ball"},
  {n:2, fmt:"Aggregate"},
  {n:3, fmt:"Four-Ball"},
  {n:4, fmt:"Scramble"},
  {n:5, fmt:"Singles"},
  {n:6, fmt:"Alternate Shot"},
];

const FMT_ALLOWANCE = {
  "Four-Ball":"100% per player",
  "Aggregate":"100% per player",
  "Scramble":"35% low + 15% high",
  "Alternate Shot":"50% of combined",
  "Singles":"100%, difference applied",
};

const FMT_INFO = {
  "Four-Ball":"Better Ball. Each of the two partners plays their own ball; the lower net of the pair counts on each hole. Handicaps: 100% of each player's Course Handicap.",
  "Aggregate":"Both partners play their own ball and both net scores are added together each hole. Handicaps: 100% of each player's Course Handicap.",
  "Scramble":"Both partners tee off, the best shot is selected, and both play from there until holed — one ball per side. Side handicap: 35% of the lower Course Handicap + 15% of the higher.",
  "Alternate Shot":"Foursomes. Partners share one ball and play alternate shots (one tees on odd holes, the other on even). Side handicap: 50% of the partners' combined Course Handicaps (USGA recommended).",
  "Singles":"One player versus one player, head-to-head net match play. Handicaps: 100%; the lower-handicap player plays off scratch and the higher receives the difference by stroke index.",
};

// Turtleback Golf Course, Rice Lake WI — Blue tees
const DEFAULT_COURSE = {
  courseName:"Turtleback Golf Course", tees:"Blue",
  cr:71.0, slope:132, par:71,
  holes:[
    {par:4,si:11},{par:5,si:1},{par:4,si:7},{par:3,si:15},{par:4,si:3},
    {par:4,si:9},{par:4,si:17},{par:3,si:13},{par:4,si:5},
    {par:4,si:6},{par:4,si:14},{par:4,si:12},{par:3,si:18},{par:5,si:4},
    {par:3,si:16},{par:4,si:10},{par:4,si:8},{par:5,si:2},
  ],
};

/* ============================================================
   State & persistence
   ============================================================ */
let state = null;
let activeTab = "play";
let expandedMatch = null;     // matchId currently expanded on the leaderboard
let playRound = null;         // round id selected in the quick Play tab
let playMatch = null;         // match id selected in the quick Play tab (one at a time)
let currentHole = 0;          // selected hole (0-17) for quick entry
let entry = null;             // active one-touch entry overlay state
let tenPending = false;       // "10+" tapped, waiting for the ones digit
let selOpen = false;          // round/match selector expanded on the Play tab
let skinsOpen = {};           // roundId -> open? (default open) on the Giant Skins tab
let lbRoundOpen = {};         // roundId -> open? on the Leaderboard tab
let memFallback = null;       // in-memory store if localStorage unusable
let lsOK = true;

function uid(){ state.seq = (state.seq||0)+1; return "id" + state.seq + "_" + Date.now().toString(36).slice(-4); }

function freshCourse(){ return JSON.parse(JSON.stringify(DEFAULT_COURSE)); }

function seedRounds(){
  return ROUND_DEFS.map(d => ({
    id: "rnd" + d.n,
    n: d.n,
    fmt: d.fmt,
    ...freshCourse(),
    matches: [],
  }));
}

function blankState(){
  return {
    name:"Border Battle",
    teamNames:{R:"",B:""},
    teamLetters:{R:"",B:""},
    useHcp:true,
    defending:null,
    addTeam:"R",
    seq:0,
    numRounds:5,                 // how many of the 5 fixed rounds are in play
    currentRound:null,           // manual override of the current round (null = auto)
    sameCourseAll:true,          // use the tournament course for every round
    course:freshCourse(),        // tournament-level (master) course
    skins:{on:false, buyIn:2000},// Giant Skins side game (buyIn in cents)
    players:{},
    rounds:seedRounds(),
  };
}

function loadState(){
  let raw=null;
  try{ raw = window.localStorage.getItem(STORAGE_KEY); }
  catch(e){ lsOK=false; }
  if(lsOK===false && memFallback) return memFallback;
  if(raw){
    try{
      const parsed = JSON.parse(raw);
      if(parsed && parsed.rounds && parsed.players) return migrate(parsed);
    }catch(e){/* corrupt -> blank */}
  }
  return blankState();
}

function migrate(s){
  // Ensure 6 rounds exist; preserve existing data and user-chosen formats.
  if(!Array.isArray(s.rounds) || !s.rounds.length){
    s.rounds = seedRounds();
  } else {
    for(let i=0;i<6;i++){
      if(!s.rounds[i]){ const d=ROUND_DEFS[i]; s.rounds[i]={id:"rnd"+d.n, n:d.n, fmt:d.fmt, ...freshCourse(), matches:[]}; }
      const r=s.rounds[i];
      r.n=i+1; r.id="rnd"+(i+1);
      if(!r.fmt || !FMT_ALLOWANCE[r.fmt]) r.fmt=ROUND_DEFS[i].fmt;
      if(!Array.isArray(r.holes)||r.holes.length!==18) Object.assign(r, freshCourse());
      if(!Array.isArray(r.matches)) r.matches=[];
    }
    s.rounds = s.rounds.slice(0,6);
  }
  s.teamNames=s.teamNames||{R:"",B:""};
  s.teamLetters=s.teamLetters||{R:"",B:""};
  s.addTeam=s.addTeam||"R";
  s.players=s.players||{};
  if(typeof s.useHcp!=="boolean") s.useHcp=true;
  if(typeof s.numRounds!=="number" || s.numRounds<1 || s.numRounds>6) s.numRounds=5;
  if(typeof s.sameCourseAll!=="boolean") s.sameCourseAll=true;
  if(!s.course || !Array.isArray(s.course.holes) || s.course.holes.length!==18) s.course=freshCourse();
  if(!s.skins || typeof s.skins!=="object") s.skins={on:false, buyIn:2000};
  if(typeof s.skins.on!=="boolean") s.skins.on=false;
  if(typeof s.skins.buyIn!=="number") s.skins.buyIn=2000;
  return s;
}

function saveState(){
  try{ window.localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e){ lsOK=false; memFallback=state; }
  if(lsOK===false) memFallback=state;
}

/* ============================================================
   Team helpers
   ============================================================ */
function teamName(t){ return (state.teamNames[t]||"").trim() || (t==="R"?"Red":"Blue"); }
function teamLetter(t){ const l=(state.teamLetters[t]||"").trim().toUpperCase(); return l.charAt(0) || t; }
function teamCount(t){ return Object.values(state.players).filter(p=>p.team===t).length; }

/* The course a round actually plays: the tournament course when "same course
   for all rounds" is on, otherwise the round's own course. */
function courseOf(round){ return state.sameCourseAll ? state.course : round; }

/* Only the first numRounds of the fixed five are in play. */
function activeRounds(){ return state.rounds.slice(0, state.numRounds); }

/* ============================================================
   Handicap engine
   ============================================================ */
function courseHandicap(player, round){
  if(!state.useHcp) return 0;
  if(!player || player.index===null || player.index===undefined || player.index==="") return 0;
  const idx = Number(player.index);
  if(Number.isNaN(idx)) return 0;
  const c = courseOf(round);
  return Math.round(idx*(c.slope/113) + (c.cr - c.par));
}

function scrambleSideHcp(chA, chB){
  const lo = Math.min(chA, chB), hi = Math.max(chA, chB);
  return Math.round(0.35*lo + 0.15*hi);
}
// Formats where the two partners play a single shared ball per side.
function isSharedBall(fmt){ return fmt==="Scramble" || fmt==="Alternate Shot"; }
// Combined side handicap for a shared-ball format.
function sideHcpFor(fmt, chA, chB){
  if(fmt==="Alternate Shot") return Math.round(0.5*(chA+chB));   // Foursomes: 50% combined
  return scrambleSideHcp(chA, chB);                              // Scramble: 35% low + 15% high
}

// Returns the scoring "balls" of a match with their base (allowance-adjusted) course handicap.
// Four-Ball/Aggregate/Singles: one ball per player. Scramble/Alternate Shot: one ball per side.
function matchBalls(round, match){
  const balls=[];
  if(isSharedBall(round.fmt)){
    ["R","B"].forEach(team=>{
      const ids = team==="R"?match.red:match.blue;
      const chs = ids.map(id=>courseHandicap(state.players[id], round));
      const ch = chs.length===2 ? sideHcpFor(round.fmt, chs[0], chs[1]) : (chs[0]||0);
      balls.push({key:team==="R"?"sideR":"sideB", team, players:ids.slice(), baseCH:ch,
        label: ids.map(id=>(state.players[id]||{}).name||"?").join(" / ")});
    });
  } else {
    ["R","B"].forEach(team=>{
      const ids = team==="R"?match.red:match.blue;
      ids.forEach(id=>{
        const p=state.players[id];
        balls.push({key:id, team, players:[id], baseCH:courseHandicap(p,round),
          label:(p||{}).name||"?"});
      });
    });
  }
  return balls;
}

// Off-the-low: playing handicap = baseCH - min(baseCH across all balls in match).
function withPlayingHcps(round, match){
  const balls=matchBalls(round,match);
  if(balls.length===0) return balls;
  const low=Math.min(...balls.map(b=>b.baseCH));
  balls.forEach(b=> b.playHcp = b.baseCH - low);
  return balls;
}

function strokesOnHole(playHcp, si){
  if(playHcp<=0) return 0;
  const full=Math.floor(playHcp/18);
  const rem=playHcp%18;
  return full + (si<=rem ? 1 : 0);
}

/* ============================================================
   Scoring
   ============================================================ */
function ballScore(match, key, hole){
  const arr = match.scores && match.scores[key];
  const v = arr ? arr[hole] : null;
  return (v===null||v===undefined||v==="") ? null : Number(v);
}

// Required balls per side for a format.
function requiredPerSide(fmt){ return fmt==="Singles"||isSharedBall(fmt) ? 1 : 2; }

function sideHoleScore(round, match, balls, team, hole){
  const c = courseOf(round);
  const sideBalls = balls.filter(b=>b.team===team);
  const nets = sideBalls.map(b=>{
    const g = ballScore(match, b.key, hole);
    return g===null ? null : g - strokesOnHole(b.playHcp, c.holes[hole].si);
  });
  if(nets.some(n=>n===null)) return null; // not all required balls in
  if(round.fmt==="Aggregate") return nets.reduce((a,b)=>a+b,0);
  // Four-Ball: best (lowest) net; Scramble/Singles: the single net
  return Math.min(...nets);
}

function holeResult(round, match, balls, hole){
  const rs = sideHoleScore(round, match, balls, "R", hole);
  const bs = sideHoleScore(round, match, balls, "B", hole);
  if(rs===null || bs===null) return null;
  if(rs<bs) return "R";
  if(bs<rs) return "B";
  return "H";
}

function matchStatus(round, match){
  const balls=withPlayingHcps(round, match);
  let standing=0, played=0, closeHole=null;
  const results=new Array(18).fill(null);
  for(let h=0; h<18; h++){
    if(closeHole!==null){ continue; } // remaining handled below as dead
    const res=holeResult(round, match, balls, h);
    if(res===null){ results[h]=null; continue; }
    results[h]=res;
    standing += res==="R"?1:res==="B"?-1:0;
    played += 1;
    const remaining = 18 - played;
    if(Math.abs(standing) > remaining){ closeHole=h; }
  }
  const finished = (closeHole!==null) || (played===18 && played>0 && allHolesScored(round,match,balls));
  return {balls, standing, played, closeHole, finished, results};
}

function allHolesScored(round, match, balls){
  for(let h=0;h<18;h++){ if(holeResult(round,match,balls,h)===null) return false; }
  return true;
}

function statusText(round, match, st){
  const {standing, played, closeHole, finished}=st;
  const lead = Math.abs(standing);
  const leader = standing>0?"R":standing<0?"B":null;
  if(finished){
    if(closeHole!==null){
      const remaining = 17 - closeHole; // holes left after the closing hole
      if(remaining>0) return {cls:leader==="R"?"r":"b", text:`${teamName(leader)} win ${lead}&${remaining}`};
      return {cls:leader==="R"?"r":"b", text:`${teamName(leader)} win ${lead} UP`};
    }
    if(lead===0) return {cls:"h", text:"Halved"};
    return {cls:leader==="R"?"r":"b", text:`${teamName(leader)} win ${lead} UP`};
  }
  if(played===0) return {cls:"h", text:"Not started"};
  const remaining = 18 - played;
  if(lead===0) return {cls:"live", text:`All Square · thru ${played}`};
  const dormie = (lead===remaining) ? " · Dormie" : "";
  return {cls:leader==="R"?"r":"b", text:`${teamName(leader)} ${lead} UP · thru ${played}${dormie}`};
}

// Decided points for a finished match.
function matchPoints(st){
  if(!st.finished) return null;
  if(st.standing>0) return {R:1,B:0};
  if(st.standing<0) return {R:0,B:1};
  return {R:0.5,B:0.5};
}

// Projected: decided -> result; in-progress (>=1 hole played) -> leader (½/½ if AS); unstarted -> excluded.
function matchProjected(st){
  if(st.finished) return matchPoints(st);
  if(st.played===0) return null;
  if(st.standing>0) return {R:1,B:0};
  if(st.standing<0) return {R:0,B:1};
  return {R:0.5,B:0.5};
}

function allMatches(){
  const out=[];
  activeRounds().forEach(r=> r.matches.forEach(m=> out.push({round:r,match:m})));
  return out;
}

/* A side's base handicap total (before off-the-low). Used for the "(N)" the
   leaderboard shows next to each pair: the strokes that side gives/gets vs its
   opponent. Four-Ball/Aggregate sum both players; Scramble uses the 35/15
   combined side handicap; Singles is the single player. */
function sideTotalFor(round, match, team){
  const ids = team==="R" ? (match.red||[]) : (match.blue||[]);
  if(isSharedBall(round.fmt)){
    const chs = ids.filter(Boolean).map(id=>courseHandicap(state.players[id], round));
    return chs.length===2 ? sideHcpFor(round.fmt, chs[0], chs[1]) : (chs[0]||0);
  }
  return ids.filter(Boolean).reduce((s,id)=>s+courseHandicap(state.players[id],round),0);
}
// Net strokes this side receives versus the opponent (0 for the lower side).
function sideStrokes(round, match, team){
  const own = sideTotalFor(round, match, team);
  const opp = sideTotalFor(round, match, team==="R"?"B":"R");
  return Math.max(0, own - opp);
}

// Running match standing label after each resolved hole, leader's perspective.
function runningStandings(st){
  // returns array[18] of {txt, lead:'R'|'B'|null, dead:bool}
  const out=[]; let standing=0;
  for(let h=0;h<18;h++){
    const dead = st.closeHole!==null && h>st.closeHole;
    const res = st.results[h];
    if(dead || res===null){ out.push({txt:"-", lead:null, dead}); continue; }
    standing += res==="R"?1:res==="B"?-1:0;
    if(standing===0) out.push({txt:"AS", lead:null, dead:false});
    else out.push({txt:Math.abs(standing)+"UP", lead:standing>0?"R":"B", dead:false});
  }
  return out;
}

// Short display name: "Dustin Tiger" -> "D. Tiger".
function shortName(id){
  const p=state.players[id]; if(!p) return "—";
  const parts=(p.name||"").trim().split(/\s+/);
  if(parts.length<2) return p.name||"—";
  return parts[0].charAt(0).toUpperCase()+". "+parts.slice(1).join(" ");
}


function totals(){
  let R=0,B=0,pR=0,pB=0,matchCount=0;
  allMatches().forEach(({round,match})=>{
    matchCount++;
    const st=matchStatus(round,match);
    const dec=matchPoints(st);
    if(dec){R+=dec.R;B+=dec.B;}
    const proj=matchProjected(st);
    if(proj){pR+=proj.R;pB+=proj.B;}
  });
  return {R,B,pR,pB,matchCount};
}

// Points a round contributes when fully played, based on team sizes and format.
// Team formats pair two players a side (matches = teamSize/2); Singles is one per player.
// Uses the smaller team so the count reflects head-to-head matches actually possible.
function expectedRoundPoints(round){
  const rc=teamCount("R"), bc=teamCount("B");
  if(round.fmt==="Singles") return Math.min(rc,bc);
  return Math.min(Math.floor(rc/2), Math.floor(bc/2));
}
function totalAvailable(){ return activeRounds().reduce((s,r)=>s+expectedRoundPoints(r),0); }

// A round is "fully set up" when it has its full set of pairings and every slot is filled.
function roundFullySetUp(round){
  const exp=expectedRoundPoints(round);
  if(exp<=0 || round.matches.length!==exp) return false;
  const per = round.fmt==="Singles"?1:2;
  return round.matches.every(m=>(m.red||[]).filter(Boolean).length===per && (m.blue||[]).filter(Boolean).length===per);
}
// A round is "fully scored" when every one of its matches has finished
// (decided early or all 18 holes played).
function roundFullyScored(round){
  if(!round || !round.matches.length) return false;
  return round.matches.every(m=>matchStatus(round,m).finished);
}
// Current round advances to a round once its pairings are set AND the previous
// round has all its scores entered (round 1 has no previous-round requirement).
function computedCurrentRound(){
  const rounds=activeRounds();
  let cur=1;
  rounds.forEach((r,i)=>{
    const prevDone = i===0 ? true : roundFullyScored(rounds[i-1]);
    if(roundFullySetUp(r) && prevDone) cur=r.n;
  });
  return cur;
}
// The current round: manual override if set & valid, otherwise computed.
function currentRoundNum(){
  const n=state.currentRound;
  if(typeof n==="number" && n>=1 && n<=state.numRounds) return n;
  return computedCurrentRound();
}
// On entering Leaderboard/Skins, expand only the current round.
function initRoundExpand(){
  const cur=currentRoundNum();
  lbRoundOpen={}; skinsOpen={}; expandedMatch=null;
  activeRounds().forEach(r=>{ const open=(r.n===cur); lbRoundOpen[r.id]=open; skinsOpen[r.id]=open; });
}

/* ============================================================
   Rendering — Header
   ============================================================ */
function fmtPts(n){
  const whole=Math.floor(n);
  const half=n-whole>=0.5;
  if(whole===0 && half) return "½";
  return half ? whole+"½" : String(whole);
}

function renderHeader(){
  const t=totals();
  document.getElementById("boardTitle").innerHTML =
    `<span class="r">${escapeHtml(teamName("R")).toUpperCase()}</span>`+
    `<span class="vs">VS</span>`+
    `<span class="b">${escapeHtml(teamName("B")).toUpperCase()}</span>`;
  document.getElementById("tnR").textContent=teamName("R");
  document.getElementById("tnB").textContent=teamName("B");
  document.getElementById("ptsR").textContent=fmtPts(t.R);
  document.getElementById("ptsB").textContent=fmtPts(t.B);
  document.getElementById("projR").textContent="proj "+fmtPts(t.pR);
  document.getElementById("projB").textContent="proj "+fmtPts(t.pB);

  const total=totalAvailable();
  const threshold = total>0 ? total/2 + 0.5 : 0;
  document.getElementById("toWin").textContent = total>0 ? fmtPts(threshold) : "—";
  document.getElementById("ofN").textContent = "of "+total;

  // share bar from decided points
  const dec=t.R+t.B;
  const rPct = dec>0 ? (t.R/dec*100) : 50;
  document.getElementById("barR").style.width=rPct+"%";
  document.getElementById("barB").style.width=(100-rPct)+"%";

  // clinch line
  const cl=document.getElementById("clinch");
  cl.className="clinch";
  if(t.matchCount===0){ cl.textContent="Add pairings in Setup to begin."; return; }
  if(t.R>=threshold){ cl.classList.add("win"); cl.innerHTML=`<span class="seg-r">${escapeHtml(teamName("R"))}</span> clinch the Cup! 🏆`; return; }
  if(t.B>=threshold){ cl.classList.add("win"); cl.innerHTML=`<span class="seg-b">${escapeHtml(teamName("B"))}</span> clinch the Cup! 🏆`; return; }
  // tie with every available point decided
  if(dec===total && t.R===t.B){
    if(state.defending){ cl.classList.add("win"); cl.innerHTML=`Tied ${fmtPts(t.R)}–${fmtPts(t.B)} · <span class="seg-${state.defending.toLowerCase()}">${escapeHtml(teamName(state.defending))}</span> retain the Cup`; }
    else { cl.classList.add("win"); cl.textContent=`Tied ${fmtPts(t.R)}–${fmtPts(t.B)} · Playoff required`; }
    return;
  }
  cl.innerHTML=`First to ${fmtPts(threshold)} wins · projected `+
    `<span class="seg-r">${fmtPts(t.pR)}</span> – <span class="seg-b">${fmtPts(t.pB)}</span>`;
}

const view=document.getElementById("view");

function render(){
  renderHeader();
  // Giant Skins tab visibility follows the toggle
  const stab=document.getElementById("skinsTab");
  if(stab) stab.classList.toggle("hide", !state.skins.on);
  if(activeTab==="skins" && !state.skins.on) activeTab="play";

}

function holesEditor(c, scope){
  const nums=(a,b)=>{let s="";for(let i=a;i<=b;i++)s+=`<th>${i}</th>`;return s;}
  const cell=(i,fld)=>`<td><input type="number" data-hole="${i}" data-hf="${fld}" data-scope="${scope}" value="${c.holes[i][fld]}"></td>`;
  const valid = validStrokeIndex(c);
  return `<div class="holes-editor">
    <div class="sc-scroll"><table class="holes-table">
      <tr><th>Hole</th>${nums(1,9)}</tr>
      <tr><th>Par</th>${c.holes.slice(0,9).map((h,i)=>cell(i,"par")).join("")}</tr>
      <tr><th>SI</th>${c.holes.slice(0,9).map((h,i)=>cell(i,"si")).join("")}</tr>
    </table></div>
    <div class="sc-scroll" style="margin-top:6px"><table class="holes-table">
      <tr><th>Hole</th>${nums(10,18)}</tr>
      <tr><th>Par</th>${c.holes.slice(9).map((h,i)=>cell(i+9,"par")).join("")}</tr>
      <tr><th>SI</th>${c.holes.slice(9).map((h,i)=>cell(i+9,"si")).join("")}</tr>
    </table></div>
    ${valid?"":`<div class="warn">⚠ Stroke index must be a complete 1–18 set with no duplicates.</div>`}
  </div>`;
}

function validStrokeIndex(c){
  const seen=new Set();
  for(const h of c.holes){ const si=Number(h.si); if(si<1||si>18||seen.has(si)) return false; seen.add(si); }
  return seen.size===18;
}

/* Resolve a course-editor scope to the object being edited. */
function scopeCourse(scope){ return scope==="master" ? state.course : state.rounds.find(r=>r.id===scope); }

function playerOptions(team, selected, round){
  const used=new Set();
  if(round) round.matches.forEach(m=>{
    (m.red||[]).forEach(id=>{ if(id) used.add(id); });
    (m.blue||[]).forEach(id=>{ if(id) used.add(id); });
  });
  // show players on this team not yet used in the round (always keep this slot's own pick)
  const list=Object.values(state.players).filter(p=>p.team===team && (p.id===selected || !used.has(p.id)));
  let opts=`<option value="">— select —</option>`;
  list.forEach(p=> opts+=`<option value="${p.id}" ${p.id===selected?"selected":""}>${escapeHtml(p.name)}</option>`);
  return opts;
}

function pairingsSection(r){
  const singles = r.fmt==="Singles";
  const perSide = singles?1:2;
  const maxMatches = expectedRoundPoints(r);
  let html=`<div class="divider"></div><div class="row" style="justify-content:space-between"><strong style="font-size:13px">${singles?"Singles order":"Pairings"} <span style="color:var(--faint);font-weight:400">(${r.matches.length}/${maxMatches})</span></strong>`;
  if(r.matches.length<maxMatches)
    html+=`<button class="btn sm gold" data-addmatch="${r.id}">+ ${singles?"Match":"Pairing"}</button>`;
  html+=`</div>`;

  if(!r.matches.length) html+=`<div class="empty">No ${singles?"matches":"pairings"} yet.</div>`;

  r.matches.forEach((m,mi)=>{
    const redSel = team => (m.red||[]).map((id,i)=>selBox(r,m,"red",i,team)).join("");
    const blueSel = team => (m.blue||[]).map((id,i)=>selBox(r,m,"blue",i,team)).join("");
    html+=`<div class="pair-row" data-rid="${r.id}" data-mid="${m.id}">
      <div class="pair-side">${(m.red||[]).map((id,i)=>selBox(r,m,"red",i,"R")).join("")}</div>
      <div class="pair-side">${(m.blue||[]).map((id,i)=>selBox(r,m,"blue",i,"B")).join("")}</div>
      <button class="x" data-delmatch="${r.id}" data-mid="${m.id}" style="background:none;border:none;color:var(--faint);font-size:18px">×</button>
    </div>`;
    const dupWarn = pairingReused(r,m);
    if(dupWarn) html+=`<div class="warn">⚠ This 2-man pairing is already used in ${dupWarn}.</div>`;
  });
  return html;
}

function selBox(r,m,side,i,team){
  const id=m[side][i]||"";
  return `<select data-rid="${r.id}" data-mid="${m.id}" data-side="${side}" data-slot="${i}">${playerOptions(team,id,r)}</select>`;
}

function playerInUse(pid){
  return state.rounds.some(r=> r.matches.some(m=> (m.red||[]).includes(pid)||(m.blue||[]).includes(pid)));
}

// Detect reused 2-man pairing across team rounds 1-4 (warning only).
function pairingReused(round, match){
  if(round.fmt==="Singles") return null;
  const key = ids => ids.filter(Boolean).slice().sort().join("|");
  const teamRounds = activeRounds().filter(r=>r.fmt!=="Singles");
  for(const side of ["red","blue"]){
    const k=key(match[side]||[]);
    if((match[side]||[]).filter(Boolean).length<2) continue;
    for(const r of teamRounds){
      for(const m of r.matches){
        if(r.id===round.id && m.id===match.id) continue;
        if(key(m.red||[])===k || key(m.blue||[])===k) return "Round "+r.n;
      }
    }
  }
  return null;
}

/* ----- Setup events ----- */
function bindSetup(){
  const $=id=>document.getElementById(id);

  bindInput($("tName"),"input",e=>{state.name=e.target.value;saveState();renderHeader();});

  // Number of rounds
  $("numRoundsSel").addEventListener("change",e=>{
    state.numRounds=Number(e.target.value); saveState(); render();
  });
  $("curRound").addEventListener("input",e=>{
    const v=parseInt(e.target.value,10);
    state.currentRound = (Number.isNaN(v)) ? null : Math.max(1, Math.min(state.numRounds, v));
    saveState();
  });

  // Defending champion checkboxes — only one team may be defending.
  $("defR").addEventListener("change",e=>{
    state.defending = e.target.checked ? "R" : null; saveState(); renderSetup(); renderHeader();
  });
  $("defB").addEventListener("change",e=>{
    state.defending = e.target.checked ? "B" : null; saveState(); renderSetup(); renderHeader();
  });

  // Same course for all rounds
  $("sameCourse").addEventListener("change",e=>{
    state.sameCourseAll = e.target.checked; saveState(); renderSetup(); renderHeader();
  });

  ["rName","bName","rLetter","bLetter"].forEach(idn=>{
    $(idn).addEventListener("input",e=>{
      const v=e.target.value;
      if(idn==="rName")state.teamNames.R=v;
      if(idn==="bName")state.teamNames.B=v;
      if(idn==="rLetter")state.teamLetters.R=v.toUpperCase();
      if(idn==="bLetter")state.teamLetters.B=v.toUpperCase();
      saveState();renderHeader();
    });
  });

  $("hcpToggle").addEventListener("click",()=>{state.useHcp=!state.useHcp;saveState();render();});

  $("skinsToggle").addEventListener("click",()=>{state.skins.on=!state.skins.on;saveState();render();});
  const sb=$("skinsBuyIn");
  if(sb) sb.addEventListener("input",e=>{ const v=parseFloat(e.target.value); state.skins.buyIn = Number.isNaN(v)?0:Math.max(0,Math.round(v*100)); saveState(); });

  // add team segmented
  $("addTeamSeg").querySelectorAll("button").forEach(b=>{
    b.addEventListener("click",()=>{state.addTeam=b.dataset.team;saveState();renderSetup();});
  });
  $("addPlayerBtn").addEventListener("click",addPlayer);
  $("newPlayer").addEventListener("keydown",e=>{if(e.key==="Enter")addPlayer();});

  // player name / index edits & removal
  view.querySelectorAll(".pname").forEach(inp=>inp.addEventListener("input",e=>{
    const p=state.players[e.target.dataset.pid]; if(p){p.name=e.target.value;saveState();renderHeader();}
  }));
  view.querySelectorAll(".pidx").forEach(inp=>inp.addEventListener("input",e=>{
    const p=state.players[e.target.dataset.pid];
    if(p){ p.index = e.target.value===""?null:Number(e.target.value); saveState(); }
  }));
  view.querySelectorAll(".prow .x").forEach(b=>b.addEventListener("click",e=>{
    const pid=e.target.dataset.pid;
    if(playerInUse(pid)) return;
    delete state.players[pid]; saveState(); renderSetup(); renderHeader();
  }));

  // round format change
  view.querySelectorAll("[data-fmtsel]").forEach(sel=>sel.addEventListener("change",e=>{
    const r=state.rounds.find(x=>x.id===e.target.dataset.fmtsel); if(!r) return;
    const newFmt=e.target.value;
    const oldPer = r.fmt==="Singles"?1:2;
    const newPer = newFmt==="Singles"?1:2;
    if(oldPer!==newPer && r.matches.length){
      if(!confirm(`Switching to ${newFmt} changes the players per side, so this round's pairings will be cleared. Continue?`)){
        renderSetup(); return;
      }
      r.matches=[];
    }
    r.fmt=newFmt;
    saveState(); renderSetup(); renderHeader();
  }));

  // round format info tooltip
  view.querySelectorAll("[data-fmtinfo]").forEach(b=>b.addEventListener("click",e=>{
    const el=document.getElementById("fmtinfo-"+e.currentTarget.dataset.fmtinfo);
    if(el) el.hidden=!el.hidden;
  }));

  // course field edits (master or per-round, via data-scope)
  view.querySelectorAll("[data-cf]").forEach(inp=>inp.addEventListener("input",e=>{
    const c=scopeCourse(e.target.dataset.scope); if(!c)return;
    const f=e.target.dataset.cf;
    c[f] = (f==="courseName"||f==="tees") ? e.target.value : Number(e.target.value);
    saveState();
  }));
  view.querySelectorAll("[data-cf]").forEach(inp=>inp.addEventListener("blur",()=>{ if(state.sameCourseAll) renderHeader(); }));

  // holes toggle & edits
  view.querySelectorAll("[data-toggleholes]").forEach(b=>b.addEventListener("click",e=>{
    const c=scopeCourse(e.target.dataset.toggleholes); if(!c)return;
    c._editHoles=!c._editHoles; renderSetup();
  }));
  view.querySelectorAll("[data-hf]").forEach(inp=>inp.addEventListener("input",e=>{
    const c=scopeCourse(e.target.dataset.scope); if(!c)return;
    const i=Number(e.target.dataset.hole), f=e.target.dataset.hf;
    c.holes[i][f]=Number(e.target.value); saveState();
  }));
  view.querySelectorAll("[data-hf]").forEach(inp=>inp.addEventListener("blur",()=>renderSetup()));

  // matches
  view.querySelectorAll("[data-addmatch]").forEach(b=>b.addEventListener("click",e=>{
    const r=state.rounds.find(x=>x.id===e.target.dataset.addmatch); if(!r)return;
    const per = r.fmt==="Singles"?1:2;
    r.matches.push({id:uid(), red:Array(per).fill(""), blue:Array(per).fill(""), scores:{}});
    saveState(); renderSetup(); renderHeader();
  }));
  view.querySelectorAll("[data-delmatch]").forEach(b=>b.addEventListener("click",e=>{
    const r=state.rounds.find(x=>x.id===e.target.dataset.delmatch); if(!r)return;
    r.matches=r.matches.filter(m=>m.id!==e.target.dataset.mid);
    saveState(); renderSetup(); renderHeader();
  }));
  view.querySelectorAll(".pair-side select").forEach(sel=>sel.addEventListener("change",e=>{
    const {rid,mid,side,slot}=e.target.dataset;
    const r=state.rounds.find(x=>x.id===rid); const m=r&&r.matches.find(x=>x.id===mid);
    if(!m)return;
    const newId=e.target.value;
    // prevent same player on both sides of THIS match
    const other = side==="red"?"blue":"red";
    if(newId && (m[other]||[]).includes(newId)){ toast("Player already on the other side"); renderSetup(); return; }
    m[side][Number(slot)] = newId;
    // clean stale score keys
    pruneScores(m);
    saveState(); renderSetup(); renderHeader();
  }));

  // save & sync
  $("exportBtn").addEventListener("click",exportJSON);
  $("importBtn").addEventListener("click",()=>$("importFile").click());
  $("importFile").addEventListener("change",importJSON);
  $("resetBtn").addEventListener("click",()=>{
    if(confirm("Reset everything? This clears all players, scores and pairings.")){
      state=blankState(); saveState(); render(); toast("Reset complete");
    }
  });
}

function bindInput(el,evt,fn){ if(el) el.addEventListener(evt,fn); }

function addPlayer(){
  const inp=document.getElementById("newPlayer");
  const name=inp.value.trim();
  if(!name) return;
  const team=state.addTeam;
  if(Object.values(state.players).filter(p=>p.team===team).length>=8){ toast("Max 8 per team"); return; }
  const id=uid();
  state.players[id]={id, name, team, index:null};
  saveState(); renderSetup(); renderHeader();
  // refocus add field
  const ni=document.getElementById("newPlayer"); if(ni){ni.focus();}
}

function pruneScores(m){
  if(!m.scores) m.scores={};
  const validKeys = new Set();
  // keys are player ids (non-scramble) or sideR/sideB
  (m.red||[]).forEach(id=>id&&validKeys.add(id));
  (m.blue||[]).forEach(id=>id&&validKeys.add(id));
  validKeys.add("sideR"); validKeys.add("sideB");
  Object.keys(m.scores).forEach(k=>{ if(!validKeys.has(k)) delete m.scores[k]; });
}

/* ============================================================
   PLAY TAB  (quick one-touch entry)
   ============================================================ */
function signed(n){ return n===0 ? "0" : (n>0 ? "+"+n : String(n)); }

function renderPlayQuick(){
  const rounds = activeRounds();
  if(!rounds.length){ view.innerHTML=`<div class="card"><h2>Play</h2><div class="sub">Set up the tournament first.</div></div>`; return; }

  // No pairings anywhere yet → same message as the Detail tab.
  if(!rounds.some(r=>r.matches.length)){
    view.innerHTML=`<div class="card"><h2>No matches yet</h2><div class="sub">Head to the Setup tab to add pairings for each round, then enter scores here.</div></div>`;
    return;
  }

  if(!playRound || !rounds.find(r=>r.id===playRound)){
    const cur = rounds.find(r=>r.n===currentRoundNum()) || rounds[0];
    playRound = (cur.matches.length ? cur : (rounds.find(r=>r.matches.length)||cur)).id;
  }
  const r = rounds.find(x=>x.id===playRound);
  const c = courseOf(r);
  currentHole = Math.max(0, Math.min(17, currentHole));

  // Pairings exist but no match chosen → prompt for which match on the current round.
  const validMatch = playMatch && r.matches.find(m=>m.id===playMatch);
  if(!validMatch){
    let p=`<div class="card"><h2>Round ${r.n} · ${escapeHtml(r.fmt)}</h2>`;
    if(!r.matches.length){
      p+=`<div class="sub">No matches in this round yet. Add pairings in Setup.</div>`;
    } else {
      p+=`<div class="sub" style="margin-bottom:10px">Which match do you want to score?</div>`;
      p+=`<div class="qp-matches">`
        + r.matches.map((mm,i)=>`<button class="qp-mtab" data-pm="${mm.id}">Match ${i+1}<span class="qp-mtab-sub">${escapeHtml(sideFirstNames(mm,"R"))} v ${escapeHtml(sideFirstNames(mm,"B"))}</span></button>`).join("")
        + `</div>`;
    }
    if(rounds.length>1){
      p+=`<div class="sub" style="margin:14px 0 6px">Or choose another round</div><div class="qp-rounds">`
        + rounds.map(rr=>`<button class="qp-rtab ${rr.id===playRound?"on":""}" data-pr="${rr.id}">R${rr.n} · ${rr.fmt}</button>`).join("")
        + `</div>`;
    }
    p+=`</div>`;
    view.innerHTML=p; bindPlayQuick(); return;
  }

  let html="";
  const m = r.matches.find(x=>x.id===playMatch);
  const mIdx = r.matches.findIndex(x=>x.id===playMatch);
  const matchup = `${escapeHtml(sideFirstNames(m,"R"))} v ${escapeHtml(sideFirstNames(m,"B"))}`;

  // compact live match status for the box above the names
  const st0 = matchStatus(r,m);
  const lead0 = st0.standing>0?"R":st0.standing<0?"B":null;
  const k0 = Math.abs(st0.standing);
  let st1="AS", st2="", stCls="none";
  if(st0.played===0){ st1="AS"; st2="Thru 0"; stCls="none"; }
  else if(st0.finished){
    if(st0.closeHole!==null){ const rem=17-st0.closeHole; st1 = rem>0?`${k0}&${rem}`:`${k0} Up`; }
    else st1 = k0===0?"Halved":`${k0} Up`;
    st2="Final"; stCls = lead0?(lead0==="R"?"r":"b"):"none";
  } else {
    st1 = k0===0?"AS":`${k0} Up`;
    st2 = `Thru ${st0.played}`;
    stCls = lead0?(lead0==="R"?"r":"b"):"none";
  }
  const statusBox = `<div class="qp2-nrow qp2-hrow qp2-status ${stCls}"><span class="qp2-st1">${st1}</span><span class="qp2-st2">${st2}</span></div>`;

  // collapsible round + match selector
  const multiRound=rounds.length>1, multiMatch=r.matches.length>1;
  if(multiRound || multiMatch){
    const summary = `R${r.n} · ${escapeHtml(r.fmt)}` + (multiMatch?` · Match ${mIdx+1}`:"");
    html += `<div class="qp-sel ${selOpen?"open":""}">
      <button class="qp-sel-head" data-seltoggle="1">
        <span class="qp-sel-sum">${summary} <span class="qp-sel-names">${matchup}</span></span>
        <span class="qp-sel-chev">${selOpen?"▾":"▸"}</span>
      </button>`;
    if(selOpen){
      html += `<div class="qp-sel-body">`;
      if(multiRound) html += `<div class="qp-rounds">`+rounds.map(rr=>`<button class="qp-rtab ${rr.id===playRound?"on":""}" data-pr="${rr.id}">R${rr.n} · ${rr.fmt}</button>`).join("")+`</div>`;
      if(multiMatch) html += `<div class="qp-matches">`+r.matches.map((mm,i)=>`<button class="qp-mtab ${mm.id===playMatch?"on":""}" data-pm="${mm.id}">Match ${i+1}<span class="qp-mtab-sub">${escapeHtml(sideFirstNames(mm,"R"))} v ${escapeHtml(sideFirstNames(mm,"B"))}</span></button>`).join("")+`</div>`;
      html += `</div>`;
    }
    html += `</div>`;
  }

  html += `<div class="qp-nav">
    <button class="qp-arrow" data-holestep="-1">‹</button>
    <div class="qp-navmid" id="qpNav"></div>
    <button class="qp-arrow" data-holestep="1">›</button>
  </div>`;

  html += `<div class="qp-fmt">${escapeHtml(r.fmt)} · ${matchup}</div>`;

  const balls = withPlayingHcps(r,m).filter(b=>b.players.some(id=>id&&state.players[id]));

  html += `<div class="qp2" id="qp2">`;
  // scrolling holes layer
  html += `<div class="qp2-scroll" id="qp2scroll"><div class="qp2-track">`;
  html += `<div class="qp2-trow qp2-hrow"><div class="qp2-spacer"></div>`;
  for(let h=0;h<18;h++) html += `<div class="qp2-hcell" data-h="${h}"><span class="qp2-hn">${h+1}</span><span class="qp2-par">Par ${c.holes[h].par}</span></div>`;
  html += `<div class="qp2-end"></div></div>`;
  balls.forEach(b=>{
    html += `<div class="qp2-trow"><div class="qp2-spacer"></div>`;
    for(let h=0;h<18;h++){
      const gross=ballScore(m,b.key,h);
      const net = gross===null?null:gross-strokesOnHole(b.playHcp,c.holes[h].si);
      html += `<div class="qp2-cell">${gross===null?`<span class="qp-blank">·</span>`:`<span class="qp-score">${gross}<sub>${net}</sub></span>`}</div>`;
    }
    html += `<div class="qp2-end"></div></div>`;
  });
  html += `</div></div>`;
  // fixed name column
  html += `<div class="qp2-names">${statusBox}`;
  balls.forEach(b=>{
    const cls=b.team==="R"?"r":"b";
    html += `<div class="qp2-nrow"><div class="qp2-pname ${cls}">${escapeHtml(b.label)}</div>${state.useHcp?`<div class="qp2-phcp">HCP ${b.playHcp}</div>`:""}</div>`;
  });
  html += `</div>`;
  // fixed green slot (filled by initQp2)
  html += `<div class="qp2-slot" id="qp2slot"></div>`;
  html += `</div>`;

  view.innerHTML=html;
  bindPlayQuick();
  initQp2(r,c,m,balls);
  if(entry) renderEntryModal();
}

// First names of a side joined by "/" (e.g. "Daniel/Tom").
function sideFirstNames(match, team){
  const ids=(team==="R"?(match.red||[]):(match.blue||[])).filter(Boolean);
  if(!ids.length) return "—";
  return ids.map(id=>((state.players[id]||{}).name||"?").trim().split(/\s+/)[0]).join("/");
}

const QP_NAMEW=150, QP_HOLEW=88;

// The fixed green slot's contents for a given hole.
function slotHtml(r,c,m,balls,h){
  let s=`<div class="qp2-slothead qp2-hrow"><span class="qp2-sh-h">${h+1}</span><span class="qp2-sh-p">Par ${c.holes[h].par}</span></div>`;
  balls.forEach(b=>{
    const strokes=strokesOnHole(b.playHcp, c.holes[h].si);
    const gross=ballScore(m,b.key,h);
    const content = gross===null ? signed(-strokes) : String(gross);
    const ccls = gross===null ? "preview" : "scored";
    s+=`<div class="qp2-slotrow"><button class="qp-circle ${ccls}" data-key="${b.key}">${content}</button></div>`;
  });
  return s;
}

function initQp2(r,c,m,balls){
  const sc=document.getElementById("qp2scroll");
  const slot=document.getElementById("qp2slot");
  const nav=document.getElementById("qpNav");
  const stage=document.getElementById("qp2");
  if(!sc||!slot||!stage) return;

  // grow rows/circles to fill the free vertical space below the controls
  const sizeToFit=()=>{
    const headH=52;
    const top=stage.getBoundingClientRect().top;
    const avail=window.innerHeight - top - 14;
    const n=Math.max(1, balls.length);
    let rowH=Math.floor((avail - headH)/n);
    rowH=Math.max(76, Math.min(240, rowH));
    const circle=Math.max(56, Math.min(rowH-20, QP_HOLEW-14));
    stage.style.setProperty("--qp-headh", headH+"px");
    stage.style.setProperty("--qp-rowh", rowH+"px");
    stage.style.setProperty("--qp-circle", circle+"px");
  };
  sizeToFit();

  const setEnds=()=>{ const w=Math.max(0, sc.clientWidth - QP_NAMEW - 2*QP_HOLEW);
    document.querySelectorAll("#qp2 .qp2-end").forEach(e=>e.style.width=w+"px"); };
  setEnds();

  const renderSlot=()=>{
    slot.innerHTML=slotHtml(r,c,m,balls,currentHole);
    slot.querySelectorAll(".qp-circle").forEach(btn=>btn.addEventListener("click",()=>openEntry(r.id,m.id,currentHole,btn.dataset.key)));
    if(nav) nav.innerHTML=`<span class="qp-h">Hole ${currentHole+1}</span><span class="qp-meta">Par ${c.holes[currentHole].par} · ${state.useHcp?`HCP ${c.holes[currentHole].si}`:""}</span>`;
    document.querySelectorAll("#qp2 .qp2-hcell").forEach(el=>el.classList.toggle("sel", Number(el.dataset.h)===currentHole));
  };

  sc.scrollLeft = currentHole*QP_HOLEW;
  renderSlot();

  let raf=null;
  sc.addEventListener("scroll",()=>{
    if(raf) return;
    raf=requestAnimationFrame(()=>{
      raf=null;
      const sel=Math.max(0,Math.min(17,Math.round(sc.scrollLeft/QP_HOLEW)));
      if(sel!==currentHole){ currentHole=sel; renderSlot(); }
    });
  });
}

function bindPlayQuick(){
  const t=view.querySelector("[data-seltoggle]");
  if(t) t.addEventListener("click",()=>{ selOpen=!selOpen; renderPlayQuick(); });
  view.querySelectorAll("[data-pr]").forEach(b=>b.addEventListener("click",e=>{
    playRound=e.currentTarget.dataset.pr; playMatch=null; currentHole=0; selOpen=false; renderPlayQuick();
  }));
  view.querySelectorAll("[data-pm]").forEach(b=>b.addEventListener("click",e=>{
    playMatch=e.currentTarget.dataset.pm; selOpen=false; renderPlayQuick();
  }));
  view.querySelectorAll("[data-holestep]").forEach(b=>b.addEventListener("click",e=>{
    const sc=document.getElementById("qp2scroll"); if(!sc) return;
    const target=Math.max(0,Math.min(17,currentHole+Number(e.currentTarget.dataset.holestep)));
    sc.scrollTo({left:target*QP_HOLEW, behavior:"smooth"});
  }));
  view.querySelectorAll("[data-h]").forEach(b=>b.addEventListener("click",e=>{
    const sc=document.getElementById("qp2scroll"); if(!sc) return;
    sc.scrollTo({left:Number(e.currentTarget.dataset.h)*QP_HOLEW, behavior:"smooth"});
  }));
}

/* ----- one-touch entry overlay ----- */
function openEntry(roundId, matchId, holeIdx, activeKey){
  entry={roundId, matchId, holeIdx, activeKey, touched:new Set()};
  tenPending=false;
  renderEntryModal();
}
function closeEntry(){
  entry=null; tenPending=false;
  const o=document.getElementById("entryOverlay"); if(o) o.remove();
}
function entryContext(){
  const r=activeRounds().find(x=>x.id===entry.roundId);
  const m=r&&r.matches.find(x=>x.id===entry.matchId);
  if(!r||!m) return null;
  return {r, m, c:courseOf(r), balls:withPlayingHcps(r,m).filter(b=>b.players.some(id=>id&&state.players[id]))};
}
function renderEntryModal(){
  const ctx=entryContext(); if(!ctx){ closeEntry(); return; }
  const {r,m,c,balls}=ctx;
  const h=entry.holeIdx, par=c.holes[h].par;
  let o=document.getElementById("entryOverlay");
  if(!o){ o=document.createElement("div"); o.id="entryOverlay"; document.body.appendChild(o); }

  const rows = balls.map(b=>{
    const strokes=strokesOnHole(b.playHcp, c.holes[h].si);
    const gross=ballScore(m,b.key,h);
    const val = gross===null ? -strokes : (gross - strokes - par);
    const active = b.key===entry.activeKey;
    return `<div class="eo-prow ${active?"active":""}" data-pick="${b.key}">
      <div class="eo-pinfo">
        <div class="eo-pn ${b.team==="R"?"r":"b"}">${escapeHtml(b.label)}</div>
        <div class="eo-pmeta">${escapeHtml(teamName(b.team))} · ${state.useHcp?`HCP ${b.playHcp}`:""}</div>
      </div>
      <div class="eo-circle ${gross===null?"preview":""}">${gross===null?signed(val):gross}</div>
    </div>`;
  }).join("");

  // keypad labels relative to par
  const lab=(n)=>{ const d=n-par; return d===-3?"Albatross":d===-2?"Eagle":d===-1?"Birdie":d===0?"Par":d===1?"Bogey":d===2?"Double Bogey":""; };
  let keys="";
  for(let n=1;n<=9;n++){
    keys += `<button class="eo-key ${n===par?"par":""}" data-num="${n}"><span class="k-n">${n}</span>${lab(n)?`<span class="k-l">${lab(n)}</span>`:""}</button>`;
  }
  keys += `<button class="eo-key wide" data-clear="1"><span class="k-n">Clear</span></button>`;
  keys += `<button class="eo-key wide" data-dash="1"><span class="k-n">${tenPending?"0":"–"}</span></button>`;
  keys += `<button class="eo-key wide ${tenPending?"pending":""}" data-ten="1"><span class="k-n">10+</span>${tenPending?`<span class="k-l">tap ones</span>`:""}</button>`;

  o.innerHTML = `
    <div class="eo-head">
      <button class="eo-back" data-eoback="1">‹</button>
      <div class="eo-title">HOLE ${h+1} | PAR ${par}</div>
      <div style="width:42px"></div>
    </div>
    <div class="eo-list">${rows}</div>
    <div class="eo-pad">${keys}</div>`;

  o.querySelector("[data-eoback]").addEventListener("click",()=>{ closeEntry(); renderPlayQuick(); });
  o.querySelectorAll("[data-pick]").forEach(el=>el.addEventListener("click",()=>{ entry.activeKey=el.dataset.pick; tenPending=false; renderEntryModal(); }));
  o.querySelectorAll("[data-num]").forEach(el=>el.addEventListener("click",()=>{
    const n=Number(el.dataset.num);
    if(tenPending){ entrySet(10+n); } else { entrySet(n); }
  }));
  o.querySelector("[data-clear]").addEventListener("click",()=>entrySet("clear"));
  o.querySelector("[data-dash]").addEventListener("click",()=>{ if(tenPending){ entrySet(10); } else { entrySet(null); } });
  o.querySelector("[data-ten]").addEventListener("click",()=>{ tenPending=!tenPending; renderEntryModal(); });
}

function entrySet(value){
  const ctx=entryContext(); if(!ctx){ closeEntry(); return; }
  const {m,balls}=ctx;
  const key=entry.activeKey;
  if(!m.scores) m.scores={};
  if(!m.scores[key]) m.scores[key]=Array(18).fill(null);

  if(value==="clear"){ m.scores[key][entry.holeIdx]=null; entry.touched.delete(key); tenPending=false; saveState(); renderEntryModal(); renderHeader(); return; }

  m.scores[key][entry.holeIdx] = (value===null ? null : value);
  entry.touched.add(key);
  tenPending=false;
  saveState(); renderHeader();

  // advance to next not-yet-entered ball
  const order=balls.map(b=>b.key);
  const idx=order.indexOf(key);
  let next=null;
  for(let i=1;i<=order.length;i++){ const k=order[(idx+i)%order.length]; if(!entry.touched.has(k)){ next=k; break; } }
  if(next===null){
    // group done -> if this match's hole is now fully scored, move the circles to the next hole
    const h=entry.holeIdx;
    const complete = balls.every(b=> ballScore(m,b.key,h)!==null);
    closeEntry();
    if(h===currentHole && complete && currentHole<17) currentHole++;
    renderPlayQuick();
    return;
  }
  entry.activeKey=next;
  renderEntryModal();
}

// True once every scoring ball in every match of the round has a gross score on hole h.
function holeComplete(round, h){
  return round.matches.every(m=>{
    const balls=withPlayingHcps(round,m).filter(b=>b.players.some(id=>id&&state.players[id]));
    if(!balls.length) return true;
    return balls.every(b=> ballScore(m,b.key,h)!==null);
  });
}

   DETAIL TAB  (full scorecard entry grid)

function renderPlay(){
  let html=`<div class="sub" style="margin:0 2px 10px">Read-only scorecards. Enter scores on the Play tab.</div>`;
  let any=false;
  activeRounds().forEach(r=>{
    if(!r.matches.length) return;

    const c=courseOf(r);
    html+=`<div class="card">
      <h2>Round ${r.n} · ${r.fmt}</h2>
      <div class="sub">${escapeHtml(c.courseName)} · ${escapeHtml(c.tees)} tees${state.useHcp?` · CR ${c.cr} / Slope ${c.slope} / Par ${c.par}`:" · scratch"}</div>`;
    r.matches.forEach(m=>{ html+=scorecard(r,m); });
    html+=`</div>`;
  });

}

function scorecard(round, match){
  const balls=withPlayingHcps(round, match);
  const ready = balls.length>0 && balls.every(b=>b.players.every(Boolean)||isSharedBall(round.fmt));
  const st = ready ? matchStatus(round, match) : null;
  const stTxt = st ? statusText(round, match, st) : {cls:"h",text:"Set pairing"};

  // header
  let html=`<div class="match-card" data-rid="${round.id}" data-mid="${match.id}">
    <div class="match-head">
      <span class="vs-lbl">${matchVsLabel(round,match)}</span>
      <span class="status ${stTxt.cls}" data-statusfor="${match.id}">${escapeHtml(stTxt.text)}</span>
    </div>`;

  if(!ready){
    html+=`<div style="padding:12px"><div class="empty">Select players for this match in Setup.</div></div></div>`;
    return html;
  }

  // table
  const c=courseOf(round);
  html+=`<div class="sc-scroll"><table class="sc">`;
  // header row
  html+=`<thead><tr><th class="hlbl">Hole</th>`;
  for(let h=0;h<18;h++){
    html+=`<th><span class="hno">${h+1}</span><span class="hsi">${state.useHcp?c.holes[h].si:""}</span></th>`;
  }
  html+=`<th class="tot">Gross</th><th class="tot">Net</th></tr></thead><tbody>`;

  // ball rows
  balls.forEach(b=>{
    const cls=b.team==="R"?"ball-r":"ball-b";
    const plus = b.playHcp>0 ? `<span class="plus">+${b.playHcp}</span>` : "";
    html+=`<tr class="${cls}"><td class="hlbl">${escapeHtml(b.label)}${plus}</td>`;
    for(let h=0;h<18;h++){
      const recv=strokesOnHole(b.playHcp, c.holes[h].si);
      const dots = recv>0 ? `<span class="dots">${Array(recv).fill('<span class="dot"></span>').join("")}</span>` : "";
      const dead = st.closeHole!==null && h>st.closeHole;
      const g = ballScore(match,b.key,h);
      html+=`<td><div class="sc-cell">${dots}<input type="number" inputmode="numeric" min="1" max="20" readonly tabindex="-1" class="sc-ro"
        data-rid="${round.id}" data-mid="${match.id}" data-key="${b.key}" data-hole="${h}"
        value="${g===null?"":g}" ${dead?'style="opacity:.35"':""}></div></td>`;
    }
    html+=`<td class="tot-cell" data-gross="${b.key}">—</td><td class="tot-cell" data-net="${b.key}">—</td>`;
    html+=`</tr>`;
  });

  // hole-won row
  html+=`<tr class="won-row"><td class="hlbl">Hole won</td>`;
  for(let h=0;h<18;h++) html+=`<td data-chair="${h}">${chipHtml(round,match,st,h)}</td>`;
  html+=`<td></td><td></td></tr>`;

  html+=`</tbody></table></div></div>`;
  // compute totals after insertion via update
  return html;
}

function matchVsLabel(round, match){
  const names = ids => (ids||[]).map(id=>(state.players[id]||{}).name||"?").join(" / ") || "—";
  return `<span style="color:#ff8d97">${escapeHtml(names(match.red))}</span> <span style="color:var(--faint)">v</span> <span style="color:#8fb4ff">${escapeHtml(names(match.blue))}</span>`;
}

function chipHtml(round, match, st, h){
  if(st && st.closeHole!==null && h>st.closeHole) return `<span class="chip dead">x</span>`;
  const balls = st? st.balls : withPlayingHcps(round,match);
  const res = holeResult(round, match, balls, h);
  if(res==="R") return `<span class="chip R">${escapeHtml(teamLetter("R"))}</span>`;
  if(res==="B") return `<span class="chip B">${escapeHtml(teamLetter("B"))}</span>`;
  if(res==="H") return `<span class="chip H">–</span>`;
  return `<span class="chip none">·</span>`;
}

function bindPlay(){
  // Detail tab is read-only (view of scorecards); totals only, no editing.
  view.querySelectorAll(".match-card").forEach(card=>updateMatchTotals(card));
}

function onScoreInput(e){
  const {rid,mid,key,hole}=e.target.dataset;
  const r=state.rounds.find(x=>x.id===rid); const m=r&&r.matches.find(x=>x.id===mid);
  if(!m) return;
  if(!m.scores) m.scores={};
  if(!m.scores[key]) m.scores[key]=Array(18).fill(null);
  const v=e.target.value;
  m.scores[key][Number(hole)] = v===""?null:Number(v);
  saveState();
  // targeted update of this match's chips, totals, status + header + ledger (cheap)
  const card=e.target.closest(".match-card");
  updateMatchView(card, r, m);
  renderHeader();
}

function updateMatchView(card, round, match){
  const st=matchStatus(round, match);
  // status text
  const stTxt=statusText(round, match, st);
  const stEl=card.querySelector(".status");
  if(stEl){ stEl.className="status "+stTxt.cls; stEl.textContent=stTxt.text; }
  // chips (recompute all with dead-hole logic)
  for(let h=0;h<18;h++){
    const td=card.querySelector(`[data-chair="${h}"]`);
    if(td) td.innerHTML=chipHtml(round, match, st, h);
  }
  // dim dead-hole inputs
  card.querySelectorAll(".sc-cell input").forEach(inp=>{
    const h=Number(inp.dataset.hole);
    const dead = st.closeHole!==null && h>st.closeHole;
    inp.style.opacity = dead ? ".35" : "";
  });
  updateMatchTotals(card, round, match, st);
}

function updateMatchTotals(card, round, match, st){
  round = round || state.rounds.find(r=>r.id===card.dataset.rid);
  match = match || (round && round.matches.find(m=>m.id===card.dataset.mid));
  if(!round||!match) return;
  const balls = (st&&st.balls) || withPlayingHcps(round, match);
  balls.forEach(b=>{
    const gEl=card.querySelector(`[data-gross="${b.key}"]`);
    const nEl=card.querySelector(`[data-net="${b.key}"]`);
    if(!gEl||!nEl) return;
    let complete=true, gross=0;
    for(let h=0;h<18;h++){ const g=ballScore(match,b.key,h); if(g===null){complete=false;break;} gross+=g; }
    if(complete){ gEl.textContent=gross; nEl.textContent=gross - b.baseCH; }
    else { gEl.textContent="—"; nEl.textContent="—"; }
  });
}

function leaderboardCard(round, match, num){
  const isSingles = round.fmt==="Singles";
  const redReady = (match.red||[]).filter(Boolean).length === (isSingles?1:2);
  const blueReady = (match.blue||[]).filter(Boolean).length === (isSingles?1:2);
  const ready = redReady && blueReady;

  const st = ready ? matchStatus(round, match) : null;
  const lead = st ? (st.standing>0?"R":st.standing<0?"B":null) : null;
  const finished = st ? st.finished : false;

  // center status
  let big="AS", thru = st? (`THRU ${st.played}`) : "—", centerCls="none";
  if(st){
    const k=Math.abs(st.standing);
    if(finished){
      if(st.closeHole!==null){
        const rem=17-st.closeHole;
        big = rem>0 ? `${k}&${rem}` : `${k}UP`;
      } else big = k===0 ? "AS" : `${k}UP`;
      thru = "FINAL";
      centerCls = lead ? (lead==="R"?"solid-r":"solid-b") : "halved";
    } else if(st.played===0){
      big="AS"; thru="THRU 0"; centerCls="none";
    } else {
      big = k===0 ? "AS" : `${k}UP`;
      centerCls = lead ? (lead==="R"?"lead-r":"lead-b") : "none";
    }
  }
  // arrow only while the match is live; a finished match is one continuous bar
  const point = (centerCls==="lead-r") ? "point-left" : (centerCls==="lead-b") ? "point-right" : "";

  // side panels colored only when finished
  const leftFill = finished && lead==="R" ? "fill-r" : "";
  const rightFill = finished && lead==="B" ? "fill-b" : "";

  const firstName = id => { const p=state.players[id]; return p ? (p.name||"").trim().split(/\s+/)[0] : ""; };
  const sideTitle = (team)=>{
    const ids = (team==="R" ? (match.red||[]) : (match.blue||[])).filter(Boolean);
    const strokes = ready ? sideStrokes(round, match, team) : 0;
    const name = ids.length ? ids.map(firstName).join("/") : `Pair ${num}`;
    return `${escapeHtml(name)} <span class="lb-strk">(${strokes})</span>`;
  };
  const sideLines = (team)=>{
    const ids = (team==="R" ? (match.red||[]) : (match.blue||[])).filter(Boolean);
    if(isSingles) return ids.length?`<div class="lb-pl">HCP ${courseHandicap(state.players[ids[0]],round)}</div>`:`<div class="lb-pl">—</div>`;
    if(!ids.length) return `<div class="lb-pl">— / —</div>`;
    return ids.map(id=>`<div class="lb-pl">${escapeHtml(shortName(id))} (${courseHandicap(state.players[id],round)})</div>`).join("");
  };

  const open = expandedMatch===match.id;
  let html=`<div class="lb-card ${open?"open":""}">
    <div class="lb-row" data-mid="${match.id}">
      <div class="lb-side left ${leftFill}">
        <div class="lb-title r">${sideTitle("R")}</div>
        ${sideLines("R")}
      </div>
      <div class="lb-center ${centerCls} ${point}">
        <div class="lb-big">${big}</div>
        <div class="lb-thru">${thru}</div>
      </div>
      <div class="lb-side right ${rightFill}">
        <div class="lb-title b">${sideTitle("B")}</div>
        ${sideLines("B")}
      </div>
    </div>`;

  if(open && ready) html += teamScorecard(round, match, st);
  else if(open && !ready) html += `<div class="lb-expand"><div class="empty" style="padding:14px">Complete this pairing in Setup to see the scorecard.</div></div>`;

  html+=`</div>`;
  return html;
}

// Expanded TEAM scorecard: pair net per hole, hole winner highlighted, running standings.
function teamScorecard(round, match, st){
  const c=courseOf(round);
  const stand=runningStandings(st);
  const num=n=> (n===null||n===undefined) ? "-" : n;

  const nine=(start)=>{
    const idxs=[]; for(let h=start;h<start+9;h++) idxs.push(h);
    const label = start===0 ? "Out" : "In";
    // side nets + totals over this nine (resolved holes only)
    const cellFor=(team)=>{
      let total=0, hasAny=false;
      const tds = idxs.map(h=>{
        const v=sideHoleScore(round,match,st.balls,team,h);
        const dead = st.closeHole!==null && h>st.closeHole;
        const res = st.results[h];
        const win = !dead && res===team;          // this side won the hole
        if(v!==null && !dead){ total+=v; hasAny=true; }
        return `<td class="${dead?"dead":""}">${(v===null||dead)?"":`<span class="${win?("win "+(team==="R"?"win-r":"win-b")):""}">${v}</span>`}</td>`;
      }).join("");
      const lbl = escapeHtml(teamName(team));
      return `<td class="lb-rowlbl ${team==="R"?"r":"b"}">${lbl}</td>${tds}<td class="lb-tot">${hasAny?total:""}</td>`;
    };
    const parCells = idxs.map(h=>`<td>${c.holes[h].par}</td>`).join("");
    const parTot = idxs.reduce((s,h)=>s+c.holes[h].par,0);
    const standCells = idxs.map(h=>{
      const s=stand[h];
      const cls = s.lead==="R"?"r":s.lead==="B"?"b":"";
      return `<td class="${cls}">${s.dead?"":s.txt}</td>`;
    }).join("");
    const holeCells = idxs.map(h=>`<td>${h+1}</td>`).join("");
    return `<table class="lb-sc">
      <colgroup><col class="c-lbl"><col span="9" class="c-hole"><col class="c-tot"></colgroup>
      <tr class="lb-hole"><th>Hole</th>${holeCells}<th>${label}</th></tr>
      <tr class="lb-par"><td class="lb-rowlbl">Par</td>${parCells}<td class="lb-tot">${parTot}</td></tr>
      <tr class="lb-pairrow rrow">${cellFor("R")}</tr>
      <tr class="lb-pairrow brow">${cellFor("B")}</tr>
      <tr class="lb-stand"><td class="lb-rowlbl">Standings</td>${standCells}<td></td></tr>
    </table>`;
  };

  return `<div class="lb-expand">${nine(0)}${nine(9)}</div>`;
}
