<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CupCaptain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0f14; --panel:#141923; --panel-2:#1b2230; --line:#2a3342;
  --ink:#f3f1ea; --muted:#8b95a7; --faint:#5b6577;
  --red:#e02434; --red-deep:#9c1622; --blue:#2563eb; --blue-deep:#16367f;
  --gold:#e8c468;
  --green:#1f9d57; --green-deep:#15784a;
  --display:'Anton',sans-serif;
  --body:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'Spline Sans Mono',ui-monospace,'SF Mono',Menlo,monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg); color:var(--ink); font-family:var(--body);
  font-size:15px; line-height:1.45; min-height:100vh;
  background-image:
    radial-gradient(420px 300px at 0% 0%, rgba(224,36,52,.18), transparent 70%),
    radial-gradient(420px 300px at 100% 0%, rgba(37,99,235,.18), transparent 70%);
  background-attachment:fixed;
}
.wrap{max-width:1040px;margin:0 auto;padding:0 16px 80px;}
a{color:inherit;}
button{font-family:var(--body);cursor:pointer;}
input,select{font-family:var(--body);}
.mono{font-family:var(--mono);}

/* ---------- Header / Scoreboard ---------- */
header.board{
  position:sticky;top:0;z-index:40;
  background:linear-gradient(180deg, rgba(12,15,20,.96), rgba(12,15,20,.86));
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.board-inner{max-width:1040px;margin:0 auto;padding:12px 16px 10px;}
.title{
  font-family:var(--display); text-align:center; letter-spacing:.04em;
  font-size:clamp(20px,5.2vw,30px); line-height:1; margin:2px 0 10px;
}
.title .vs{color:var(--gold);margin:0 .35em;font-size:.7em;vertical-align:.08em;}
.title .r{color:var(--red);} .title .b{color:var(--blue);}
.score-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;}
.team-panel{border-radius:12px;padding:10px 12px;border:1px solid var(--line);position:relative;overflow:hidden;text-align:center;}
.team-panel.R{background:linear-gradient(135deg, rgba(156,22,34,.35), rgba(20,25,35,.6));}
.team-panel.B{background:linear-gradient(135deg, rgba(22,54,127,.35), rgba(20,25,35,.6));}
.team-panel .tn{font-weight:800;font-size:13px;letter-spacing:.02em;text-transform:uppercase;}
.team-panel.R .tn{color:#ff8d97;} .team-panel.B .tn{color:#8fb4ff;}
.team-panel .pts{font-family:var(--display);font-size:clamp(34px,10vw,52px);line-height:.9;margin:6px 0;}
.team-panel .proj{font-family:var(--mono);font-size:11px;color:var(--muted);}
.center-col{text-align:center;min-width:74px;}
.center-col .towin{font-family:var(--display);font-size:22px;color:var(--gold);line-height:.95;}
.center-col .ofN{font-family:var(--mono);font-size:11px;color:var(--muted);}
.center-col .towin-cap{margin-top:14px;font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--faint);line-height:1.15;}
.share-bar{margin-top:9px;height:7px;border-radius:6px;background:var(--panel-2);overflow:hidden;display:flex;border:1px solid var(--line);}
.share-bar .sr{background:linear-gradient(90deg,var(--red-deep),var(--red));}
.share-bar .sb{background:linear-gradient(90deg,var(--blue),var(--blue-deep));margin-left:auto;}
.clinch{margin-top:7px;text-align:center;font-family:var(--mono);font-size:11.5px;color:var(--muted);}
.clinch.win{color:var(--gold);font-weight:600;}
.clinch .seg-r{color:#ff8d97;} .clinch .seg-b{color:#8fb4ff;}

/* ---------- Tabs ---------- */
.tabs{position:sticky;top:0;z-index:30;display:flex;gap:6px;justify-content:center;
  padding:8px 0;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tabs button{
  background:var(--panel);color:var(--muted);border:1px solid var(--line);
  border-radius:999px;padding:8px 18px;font-weight:700;font-size:13px;letter-spacing:.03em;
  text-transform:uppercase;transition:.15s;white-space:nowrap;flex:0 0 auto;
}
.tabs button.active{color:var(--bg);background:var(--gold);border-color:var(--gold);}
.tabs button:not(.active):hover{color:var(--ink);border-color:var(--faint);}

/* ---------- Cards ---------- */
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;}
.card h2{font-family:var(--display);font-weight:400;letter-spacing:.03em;font-size:19px;margin:0 0 4px;}
.card h3{font-size:14px;margin:0 0 10px;color:var(--gold);text-transform:uppercase;letter-spacing:.05em;font-weight:700;}
.sub{color:var(--muted);font-size:12.5px;margin:0 0 14px;}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
label.fld{display:flex;flex-direction:column;gap:4px;font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600;}
input[type=text],input[type=number],select,textarea{
  background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
  border-radius:9px;padding:9px 11px;font-size:14px;min-width:0;outline:none;transition:.12s;
}
textarea{font-family:var(--mono);font-size:12px;line-height:1.4;resize:vertical;width:100%;}
.sync-status{margin-top:8px;font-size:12.5px;font-weight:600;color:var(--muted);}
.sync-status.ok{color:#6fcf97;}
.sync-status.err{color:#ff8d97;}
.fin-ov{position:fixed;inset:0;z-index:60;background:rgba(6,8,12,.72);display:flex;align-items:center;justify-content:center;padding:24px;}
.fin-box{background:var(--panel);border:1px solid var(--line);border-radius:16px;max-width:360px;width:100%;padding:22px 20px;text-align:center;box-shadow:0 18px 50px rgba(0,0,0,.5);}
.fin-title{font-family:var(--display);font-size:24px;color:var(--gold);margin-bottom:8px;}
.fin-msg{color:var(--ink);font-size:14px;line-height:1.45;margin-bottom:18px;}
.fin-results{margin:0 0 14px;display:flex;flex-direction:column;gap:6px;}
.fin-line{font-size:14px;color:var(--muted);font-family:var(--mono);}
.fin-line b{font-weight:700;}
.fin-line b.r{color:var(--red);} .fin-line b.b{color:var(--blue);}
.fin-btns{display:flex;gap:10px;justify-content:center;}
.fin-btns .btn{flex:1;}
input:focus,select:focus{border-color:var(--gold);}
input::placeholder{color:var(--faint);}
.btn{background:var(--panel-2);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:9px 14px;font-weight:600;font-size:13px;transition:.12s;}
.btn:hover{border-color:var(--faint);}
.btn.gold{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:700;}
.btn.red{background:var(--red-deep);border-color:var(--red);}
.btn.blue{background:var(--blue-deep);border-color:var(--blue);}
.btn.ghost{background:transparent;}
.btn.danger{color:#ff8d97;border-color:var(--red-deep);}
.btn.sm{padding:6px 10px;font-size:12px;}

/* segmented control */
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
.seg button{background:var(--panel-2);border:none;color:var(--muted);padding:8px 16px;font-weight:700;font-size:13px;}
.seg button.on.R{background:var(--red-deep);color:#fff;}
.seg button.on.B{background:var(--blue-deep);color:#fff;}

/* toggle */
.toggle{display:inline-flex;align-items:center;gap:10px;cursor:pointer;user-select:none;}
.toggle .track{width:46px;height:26px;border-radius:999px;background:var(--panel-2);border:1px solid var(--line);position:relative;transition:.15s;}
.toggle .knob{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:var(--faint);transition:.15s;}
.toggle.on .track{background:rgba(232,196,104,.25);border-color:var(--gold);}
.toggle.on .knob{left:22px;background:var(--gold);}

/* team grid + players */
.team-grid{display:grid;grid-template-columns:1fr 70px;gap:8px;align-items:center;margin-bottom:8px;}
.team-row-grid{display:grid;grid-template-columns:minmax(0,1fr) 46px auto;gap:6px;align-items:center;margin-bottom:8px;}
.defchk{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);white-space:nowrap;cursor:pointer;font-weight:600;}
.defchk input,.same-course input{width:16px;height:16px;accent-color:var(--gold);cursor:pointer;}
.same-course{display:inline-flex;align-items:center;gap:8px;margin:6px 0 12px;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;
  background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:9px 12px;}
.course-note{font-size:12.5px;color:var(--muted);margin-bottom:10px;}
.course-note strong{color:var(--ink);}
.players-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:620px){.players-cols{grid-template-columns:1fr;}}
.pcol h4{margin:0 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.04em;}
.pcol.R h4{color:#ff8d97;} .pcol.B h4{color:#8fb4ff;}
.prow{display:grid;grid-template-columns:1fr auto auto;gap:6px;align-items:center;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:6px 8px;margin-bottom:6px;}
.prow input.pname{background:transparent;border:none;padding:4px 2px;}
.prow input.pidx{width:62px;text-align:center;background:var(--bg);}
.prow .x{background:transparent;border:none;color:var(--faint);font-size:18px;line-height:1;padding:2px 6px;}
.prow .x:hover{color:var(--red);}
.prow .x:disabled{opacity:.3;cursor:not-allowed;}

/* round setup */
.round-block{border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden;}
.round-head{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--panel-2);}
.round-head .num{font-family:var(--display);font-size:22px;color:var(--gold);min-width:26px;}
.round-head .fmt{font-weight:700;}
.round-head .fmt-sel{font-family:var(--body);font-weight:700;font-size:14px;color:var(--ink);
  background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:5px 8px;}
.fmt-info-btn{background:none;border:none;color:var(--gold);font-size:16px;cursor:pointer;padding:0 2px;line-height:1;}
.fmt-info{padding:10px 13px;background:var(--panel);border-bottom:1px solid var(--line);
  color:var(--muted);font-size:12.5px;line-height:1.5;}
.round-head .alw{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted);}
.round-body{padding:13px;}
.course-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:9px;margin-bottom:10px;}
.course-rsp{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:9px;margin-bottom:10px;max-width:340px;}
.course-rsp input{padding:8px 8px;}
.holes-editor{margin-top:8px;}
.holes-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;}
.holes-table th,.holes-table td{border:1px solid var(--line);padding:3px 2px;text-align:center;}
.holes-table th{color:var(--muted);font-weight:500;}
.holes-table input{width:30px;text-align:center;padding:3px 1px;font-size:11px;background:var(--bg);border-radius:5px;}
.collapse-btn{font-size:12px;color:var(--gold);background:none;border:none;padding:4px 0;font-weight:600;}

/* pairings */
.pair-row{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:center;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:8px;margin-bottom:7px;}
.pair-side select{width:100%;margin-bottom:4px;}
.pair-status{font-family:var(--mono);font-size:11px;color:var(--muted);grid-column:1/3;}
.warn{color:var(--gold);font-size:11.5px;font-family:var(--mono);margin-top:4px;}

/* play scorecards */
.match-card{border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden;background:var(--panel-2);}
.match-head{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
.match-head .vs-lbl{font-weight:700;font-size:13px;}
.match-head .status{margin-left:auto;font-family:var(--mono);font-size:12px;font-weight:600;}
.status.r{color:#ff8d97;} .status.b{color:#8fb4ff;} .status.h{color:var(--muted);} .status.live{color:var(--gold);}
.sc-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table.sc{border-collapse:collapse;font-family:var(--mono);font-size:12px;min-width:max-content;}
table.sc th,table.sc td{border:1px solid var(--line);text-align:center;padding:0;}
table.sc .hlbl{position:sticky;left:0;background:var(--panel);z-index:2;text-align:left;padding:4px 9px;white-space:nowrap;min-width:120px;font-family:var(--body);}
table.sc thead th{background:var(--panel);color:var(--muted);font-weight:500;padding:4px 0;min-width:30px;}
table.sc thead .hno{font-size:12px;color:var(--ink);display:block;}
table.sc thead .hsi{font-size:9px;color:var(--gold);display:block;margin-top:3px;}
table.sc thead .tot{min-width:42px;color:var(--ink);}
.sc-cell{position:relative;min-width:30px;height:34px;}
.sc-cell input{width:34px;height:34px;border:none;background:transparent;text-align:center;color:var(--ink);font-family:var(--mono);font-size:13px;padding:0;}
.sc-cell input.sc-ro{pointer-events:none;caret-color:transparent;}
.sc-cell input:focus{background:rgba(232,196,104,.12);}
.dots{position:absolute;top:2px;right:3px;display:flex;gap:1px;pointer-events:none;}
.dot{width:4px;height:4px;border-radius:50%;background:var(--gold);}
.sc .ball-r .hlbl{border-left:3px solid var(--red);}
.sc .ball-b .hlbl{border-left:3px solid var(--blue);}
.plus{color:var(--gold);font-family:var(--mono);font-size:11px;margin-left:5px;}
.sc .tot-cell{font-weight:600;color:var(--ink);min-width:42px;}
.sc .won-row .hlbl{color:var(--muted);font-family:var(--mono);font-size:11px;}
.chip{display:inline-flex;align-items:center;justify-content:center;width:24px;height:22px;border-radius:5px;font-weight:700;font-size:12px;margin:3px auto;}
.chip.R{background:var(--red-deep);color:#fff;}
.chip.B{background:var(--blue-deep);color:#fff;}
.chip.H{background:var(--panel);color:var(--muted);}
.chip.none{background:transparent;color:var(--faint);}
.chip.dead{background:transparent;color:var(--faint);opacity:.4;font-weight:400;}

/* ledger */
.led-round{margin-bottom:14px;}
.led-rh{display:flex;align-items:center;gap:10px;padding-bottom:6px;border-bottom:1px solid var(--line);margin-bottom:8px;}
.led-rh .num{font-family:var(--display);color:var(--gold);font-size:18px;}
.led-rh .tot{margin-left:auto;font-family:var(--mono);font-size:13px;}
.led-m{display:flex;justify-content:space-between;gap:10px;padding:6px 2px;font-size:13px;border-bottom:1px solid rgba(42,51,66,.5);}
.led-m .lst{font-family:var(--mono);font-size:12px;color:var(--muted);}

/* ---------- Leaderboard ---------- */
.lb-round{margin-bottom:18px;}
.lb-round-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:8px 2px;flex-wrap:wrap;
  width:100%;background:transparent;border:none;color:var(--ink);text-align:left;cursor:pointer;}
.lb-round-head .lb-rchev{color:var(--gold);font-size:13px;flex:0 0 auto;}
.lb-round-head .lb-rn{font-family:var(--display);color:var(--gold);font-size:18px;line-height:1;}
.lb-round-head .lb-rf{font-weight:700;font-size:13px;}
.lb-round-head .lb-rc{color:var(--muted);font-size:12px;}
.lb-round-head .lb-rp{margin-left:auto;font-family:var(--mono);font-size:13px;font-weight:600;}
.seg-r{color:#ff8d97;} .seg-b{color:#8fb4ff;}

.lb-card{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:10px;background:var(--panel);}
.lb-card.open{border-color:var(--faint);}
.lb-row{display:grid;grid-template-columns:1fr 96px 1fr;align-items:stretch;cursor:pointer;min-height:74px;}
.lb-side{padding:11px 13px;display:flex;flex-direction:column;justify-content:center;gap:1px;transition:background .15s;}
.lb-side.right{text-align:right;align-items:flex-end;}
.lb-title{font-family:var(--body);font-weight:400;letter-spacing:0;font-size:16px;line-height:1.15;}
.lb-title.r{color:var(--red);} .lb-title.b{color:var(--blue);}
.lb-strk{font-family:var(--mono);font-size:13px;}
.lb-pl{font-size:12.5px;color:var(--muted);font-weight:600;line-height:1.25;}
.lb-side.fill-r{background:var(--red);}
.lb-side.fill-r .lb-title,.lb-side.fill-r .lb-pl,.lb-side.fill-r .lb-strk{color:#fff;}
.lb-side.fill-b{background:var(--blue);}
.lb-side.fill-b .lb-title,.lb-side.fill-b .lb-pl,.lb-side.fill-b .lb-strk{color:#fff;}

.lb-center{display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--panel-2);color:var(--muted);}
.lb-center .lb-big{font-family:var(--display);font-size:22px;line-height:1;}
.lb-center .lb-thru{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;margin-top:3px;opacity:.9;}
.lb-center.none{background:var(--panel-2);color:var(--ink);}
.lb-center.halved{background:var(--line);color:var(--ink);}
/* live: pennant arrow points toward the leader */
.lb-center.lead-r{background:var(--red);color:#fff;}
.lb-center.lead-b{background:var(--blue);color:#fff;}
.lb-center.point-left{clip-path:polygon(26% 0,100% 0,100% 100%,26% 100%,0 50%);}
.lb-center.point-right{clip-path:polygon(0 0,74% 0,100% 50%,74% 100%,0 100%);}
/* finished: solid bar, no clip — continuous with the winning side */
.lb-center.solid-r{background:var(--red);color:#fff;}
.lb-center.solid-b{background:var(--blue);color:#fff;}

.lb-expand{padding:10px 10px 14px;background:var(--bg);border-top:1px solid var(--line);overflow-x:auto;-webkit-overflow-scrolling:touch;}
table.lb-sc{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px;table-layout:fixed;margin-bottom:10px;}
table.lb-sc:last-child{margin-bottom:0;}
.lb-sc col.c-lbl{width:96px;} .lb-sc col.c-tot{width:34px;}
table.lb-sc td,table.lb-sc th{border:1px solid var(--line);text-align:center;padding:5px 0;overflow:hidden;}
.lb-sc .lb-hole th{background:var(--panel-2);color:var(--gold);font-weight:600;}
.lb-sc .lb-hole th:first-child{text-align:left;padding-left:8px;color:var(--muted);}
.lb-sc .lb-rowlbl{text-align:left;padding-left:8px;font-family:var(--body);font-weight:600;font-size:11.5px;white-space:nowrap;}
.lb-sc .lb-rowlbl.r{color:#ff8d97;} .lb-sc .lb-rowlbl.b{color:#8fb4ff;}
.lb-sc .lb-par td{color:var(--muted);}
.lb-sc .lb-tot{font-weight:700;color:var(--ink);background:var(--panel-2);}
.lb-sc .rrow td{color:#ff8d97;} .lb-sc .brow td{color:#8fb4ff;}
.lb-sc td.dead{opacity:.3;}
.lb-sc .win{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;color:#fff !important;font-weight:700;}
.lb-sc .win.win-r{background:var(--red);} .lb-sc .win.win-b{background:var(--blue);}
.lb-sc .lb-stand td{font-weight:600;color:var(--muted);}
.lb-sc .lb-stand td.r{color:#ff8d97;} .lb-sc .lb-stand td.b{color:#8fb4ff;}
.lb-sc .lb-stand .lb-rowlbl{color:var(--muted);}

/* ---------- Quick Play (one-touch entry) ---------- */
.qp-rounds{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;}
.qp-sel{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden;}
.qp-sel-head{width:100%;display:flex;align-items:center;gap:10px;background:transparent;border:none;
  padding:11px 13px;color:var(--ink);text-align:left;}
.qp-sel-sum{flex:1;font-weight:700;font-size:14px;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.qp-sel-names{font-weight:500;font-size:12px;color:var(--muted);font-family:var(--mono);margin-left:6px;}
.qp-sel-chev{color:var(--gold);font-size:13px;flex:0 0 auto;}
.qp-sel-body{padding:0 13px 12px;border-top:1px solid var(--line);}
.qp-sel-body .qp-rounds{margin-top:12px;}
.qp-sel-body .qp-matches{margin-bottom:0;}
.qp-rounds::-webkit-scrollbar{display:none;}
.qp-rtab{flex:0 0 auto;background:var(--panel);border:1px solid var(--line);color:var(--muted);
  border-radius:999px;padding:6px 16px;font-weight:700;font-size:13px;}
.qp-rtab.on{background:var(--green);border-color:var(--green);color:#fff;}
.qp-matches{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;}
.qp-matches::-webkit-scrollbar{display:none;}
.qp-mtab{flex:0 0 auto;background:var(--panel);border:1px solid var(--line);color:var(--muted);
  border-radius:10px;padding:7px 14px;font-weight:700;font-size:13px;display:flex;flex-direction:column;align-items:flex-start;gap:1px;line-height:1.1;}
.qp-mtab .qp-mtab-sub{font-weight:500;font-size:10.5px;color:var(--faint);font-family:var(--mono);}
.qp-mtab.on{background:var(--panel-2);border-color:var(--gold);color:var(--ink);}
.qp-mtab.on .qp-mtab-sub{color:var(--muted);}
.qp-pickcard{display:flex;flex-direction:column;min-height:calc(100dvh - 220px);}
.qp-matches.pick{flex-direction:column;flex:1 1 auto;gap:10px;overflow-y:auto;margin-bottom:14px;}
.qp-matches.pick .qp-mtab{width:100%;flex:1 1 0;min-height:48px;max-height:11vh;justify-content:center;align-items:flex-start;
  border-radius:12px;padding:10px 16px;font-size:16px;gap:4px;}
.qp-matches.pick .qp-mtab .qp-mtab-sub{font-size:16px;font-weight:700;color:var(--ink);}
.qp-nav{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);
  border-radius:10px;padding:3px 8px;margin-bottom:8px;}
.qp-nav .qp-arrow{flex:0 0 auto;width:32px;height:32px;border-radius:8px;background:var(--panel-2);
  border:1px solid var(--line);color:var(--ink);font-size:18px;line-height:1;}
.qp-nav .qp-arrow:disabled{opacity:.3;}
.qp-navmid{flex:1;text-align:center;display:flex;align-items:baseline;justify-content:center;gap:8px;}
.qp-navmid .qp-h{font-family:var(--display);font-size:16px;line-height:1;letter-spacing:.02em;}
.qp-navmid .qp-meta{font-family:var(--mono);font-size:10px;color:var(--muted);}
.qp-fmt{background:linear-gradient(135deg,var(--green),var(--green-deep));color:#fff;
  font-weight:800;letter-spacing:.04em;text-transform:uppercase;font-size:13px;
  padding:9px 13px;border-radius:10px 10px 0 0;border:1px solid var(--green-deep);border-bottom:none;}
.qp-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:0 0 12px 12px;background:var(--panel);}
table.qp{border-collapse:collapse;width:max-content;min-width:100%;font-family:var(--mono);}
table.qp th,table.qp td{text-align:center;border-bottom:1px solid var(--line);}
.qp .qp-name{position:sticky;left:0;z-index:2;background:var(--panel);text-align:left;
  padding:9px 11px;min-width:140px;max-width:140px;font-family:var(--body);border-right:1px solid var(--line);}
.qp thead .qp-name{background:var(--panel-2);}
.qp-hcell{min-width:46px;padding:6px 4px;background:var(--panel-2);cursor:pointer;}
.qp-hcell .qp-hn{display:block;font-size:15px;font-weight:700;color:var(--ink);font-family:var(--display);}
.qp-hcell .qp-par{display:block;font-size:9px;color:var(--muted);margin-top:2px;}
.qp-hcell.qp-cur{background:rgba(31,157,87,.18);}
.qp-cur{background:rgba(31,157,87,.08);}
.qp-pname{font-weight:600;font-size:14px;line-height:1.1;}
.qp-pname.r{color:var(--red);} .qp-pname.b{color:var(--blue);}
.qp-phcp{font-size:10.5px;color:var(--muted);font-family:var(--mono);margin-top:1px;}
.qp-msep td{background:var(--bg);border-bottom:1px solid var(--line);}
.qp-msep .qp-name{background:var(--bg);font-family:var(--body);font-weight:700;font-size:11px;
  text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:6px 11px;}
.qp-cell{min-width:46px;height:54px;padding:0 4px;}
.qp-score{font-size:16px;color:var(--ink);} .qp-score sub{font-size:10px;color:var(--muted);}
.qp-blank{color:var(--faint);font-size:13px;}
.qp-circle{display:inline-flex;align-items:center;justify-content:center;width:46px;height:46px;
  border-radius:50%;background:var(--green);color:#fff;font-weight:700;font-size:16px;border:none;cursor:pointer;}
.qp-circle.preview{color:rgba(255,255,255,.55);font-weight:600;}
.qp-circle.scored{background:var(--green);color:#fff;}

/* fixed-slot scrolling play grid */
.qp2{position:relative;border:1px solid var(--line);border-radius:0 0 12px 12px;overflow:hidden;background:var(--panel);
  --qp-namew:150px;--qp-holew:88px;--qp-headh:50px;--qp-rowh:88px;--qp-circle:72px;}
.qp2-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  scroll-snap-type:x proximity;scroll-padding-left:calc(var(--qp-namew) + var(--qp-holew));}
.qp2-scroll::-webkit-scrollbar{display:none;}
.qp2-track{display:flex;flex-direction:column;width:max-content;}
.qp2-trow{display:flex;align-items:stretch;height:var(--qp-rowh);border-bottom:1px solid var(--line);}
.qp2-trow:last-child{border-bottom:none;}
.qp2-hrow{height:var(--qp-headh);}
.qp2-spacer{flex:0 0 calc(var(--qp-namew) + var(--qp-holew));width:calc(var(--qp-namew) + var(--qp-holew));}
.qp2-hcell{flex:0 0 var(--qp-holew);width:var(--qp-holew);display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--panel-2);border-left:1px solid var(--line);cursor:pointer;scroll-snap-align:start;}
.qp2-hcell .qp2-hn{font-family:var(--display);font-size:24px;color:var(--ink);line-height:1;}
.qp2-hcell .qp2-par{font-size:16px;color:var(--muted);margin-top:4px;}
.qp2-hcell.sel{background:rgba(31,157,87,.20);}
.qp2-cell{flex:0 0 var(--qp-holew);width:var(--qp-holew);display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);border-left:1px solid var(--line);scroll-snap-align:start;}
.qp2-cell .qp-score{font-size:22px;color:var(--ink);} .qp2-cell .qp-score sub{font-size:15px;color:var(--muted);}
.qp2-cell .qp-blank{color:var(--faint);font-size:16px;}
.qp2-end{flex:0 0 auto;}
.qp2-names{position:absolute;top:0;left:0;width:var(--qp-namew);z-index:3;background:var(--panel);border-right:1px solid var(--line);pointer-events:none;}
.qp2-nrow{height:var(--qp-rowh);border-bottom:1px solid var(--line);display:flex;flex-direction:column;justify-content:center;padding:0 12px;}
.qp2-nrow:last-child{border-bottom:none;}
.qp2-nrow.qp2-hrow{height:var(--qp-headh);background:var(--panel-2);}
.qp2-status{align-items:center;justify-content:center;text-align:center;gap:0;padding:0;}
.qp2-status .qp2-st1{font-family:var(--display);font-size:18px;line-height:1;}
.qp2-status .qp2-st2{font-family:var(--mono);font-size:10px;line-height:1;margin-top:2px;opacity:.9;}
.qp2-status.r{background:var(--red);color:#fff;} .qp2-status.b{background:var(--blue);color:#fff;}
.qp2-status.none{background:var(--panel-2);color:var(--muted);}
.qp2-status.multi{flex-direction:column;gap:3px;padding:4px 2px;background:var(--panel-2);}
.qp2-stmini{font-family:var(--mono);font-size:11px;line-height:1.1;padding:2px 7px;border-radius:6px;white-space:nowrap;color:var(--muted);}
.qp2-stmini b{font-family:var(--display);font-weight:400;font-size:12px;}
.qp2-stmini.r{background:var(--red);color:#fff;} .qp2-stmini.b{background:var(--blue);color:#fff;}
.qp2-trow.sep,.qp2-nrow.sep,.qp2-slotrow.sep{border-top:4px double var(--muted);}
.qp2-mtag{display:inline-block;font-family:var(--mono);font-size:10px;color:var(--gold);background:var(--panel-2);border-radius:5px;padding:1px 5px;margin-right:6px;vertical-align:middle;}
.eo-prow.eo-sep{border-top:4px double var(--muted);}
.qp2-mscore{position:absolute;left:var(--qp-namew);transform:translate(-50%,-50%);z-index:5;
  width:var(--qp-circle);height:var(--qp-circle);border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-size:18px;white-space:nowrap;color:#fff;border:2px solid var(--panel);box-shadow:0 1px 6px rgba(0,0,0,.5);}
.qp2-mscore.r{background:var(--red);} .qp2-mscore.b{background:var(--blue);}
.qp2-mscore.none{background:var(--faint);color:var(--ink);}
.qp2-mscore.final{border-color:var(--gold);}
.eo-mtag{display:inline-block;font-family:var(--mono);font-size:11px;color:var(--gold);background:var(--panel-2);border-radius:5px;padding:1px 6px;margin-right:8px;vertical-align:middle;}
.qp2-pname{font-weight:700;font-size:22px;line-height:1.1;}
.qp2-pname.r{color:var(--red);} .qp2-pname.b{color:var(--blue);}
.qp2-phcp{font-size:13px;color:var(--muted);font-family:var(--mono);margin-top:2px;}
.qp2-slot{position:absolute;top:0;left:calc(var(--qp-namew) + var(--qp-holew));width:var(--qp-holew);z-index:4;background:var(--panel);
  box-shadow:0 0 0 2px var(--green) inset;}
.qp2-slothead{height:var(--qp-headh);display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--green),var(--green-deep));color:#fff;}
.qp2-slothead .qp2-sh-h{font-family:var(--display);font-size:24px;line-height:1;}
.qp2-slothead .qp2-sh-p{font-size:16px;opacity:.9;margin-top:2px;}
.qp2-slotrow{height:var(--qp-rowh);display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--line);}
.qp2-slotrow:last-child{border-bottom:none;}
.qp2-slotrow .qp-circle{width:var(--qp-circle);height:var(--qp-circle);font-size:26px;}

/* one-touch entry overlay */
#entryOverlay{position:fixed;top:0;left:0;right:0;height:100dvh;z-index:100;background:var(--bg);display:flex;flex-direction:column;}
.eo-head{flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:16px 16px 12px;border-bottom:1px solid var(--line);}
.eo-head .eo-back{width:46px;height:46px;border-radius:50%;background:var(--panel-2);border:1px solid var(--line);color:var(--ink);font-size:26px;line-height:1;}
.eo-head .eo-title{flex:1;text-align:center;font-family:var(--display);font-size:19px;letter-spacing:.03em;}
.eo-list{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;overflow:hidden;}
.eo-prow{flex:1 1 0;min-height:0;overflow:hidden;display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--line);}
.eo-prow.active{background:linear-gradient(135deg,var(--green),var(--green-deep));}
.eo-pinfo{flex:1;min-width:0;}
.eo-pn{font-size:23px;font-weight:700;line-height:1.1;}
.eo-pn.r{color:var(--red);} .eo-pn.b{color:var(--blue);}
.eo-pmeta{font-size:15px;color:var(--muted);font-family:var(--mono);margin-top:3px;}
.eo-prow.active .eo-pn,.eo-prow.active .eo-pn.r,.eo-prow.active .eo-pn.b,.eo-prow.active .eo-pmeta{color:#fff;}
.eo-circle{flex:0 0 auto;width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:26px;background:var(--green);color:#fff;}
.eo-circle.preview{color:rgba(255,255,255,.55);}
.eo-prow.active .eo-circle{background:#fff;color:var(--green);}
.eo-prow.active .eo-circle.preview{color:var(--green);}
/* When 4+ players are on one entry screen, tighten row padding so all rows fit (circles stay full size). */
.eo-list.compact .eo-prow{padding:4px 16px;}
.eo-list.compact .eo-pmeta{margin-top:0;}
.eo-pad{flex:0 0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 12px;background:var(--panel);border-top:1px solid var(--line);}
.eo-key{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;color:var(--ink);
  height:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.eo-key .k-n{font-size:32px;font-weight:700;line-height:1;}
.eo-key .k-l{font-size:13px;color:var(--muted);}
.eo-key.par{background:var(--green);border-color:var(--green);color:#fff;}
.eo-key.par .k-l{color:rgba(255,255,255,.85);}
.eo-key.pending{outline:2px solid var(--gold);}
.eo-key.wide .k-n{font-size:22px;}

/* ---------- Giant Skins ---------- */
table.skn{width:100%;border-collapse:collapse;font-size:13px;}
table.skn th,table.skn td{border-bottom:1px solid var(--line);padding:7px 8px;text-align:center;font-family:var(--mono);}
table.skn th{color:var(--muted);font-weight:500;font-family:var(--body);}
table.skn td.pos{color:#6fcf97;} table.skn td.neg{color:#ff8d97;}
.skn .money,.sub .money{color:#6fcf97;font-weight:600;}
table.skn tr.skn-zero td{color:#5b6577;}
.skn-ct{color:var(--gold);font-weight:700;}
.skn-card{padding-top:0;padding-bottom:14px;}
.skn-head{width:100%;display:flex;align-items:center;gap:10px;background:transparent;border:none;
  padding:14px 0 0;color:var(--ink);text-align:left;}
.skn-head .skn-rn{font-family:var(--display);color:var(--gold);font-size:18px;line-height:1;}
.skn-head .skn-hfmt{font-weight:700;font-size:14px;}
.skn-head .skn-sum{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--muted);}
.skn-head .skn-chev{color:var(--gold);font-size:13px;flex:0 0 auto;}
.skn-holes{border-top:1px solid var(--line);}
.skn-hrow{display:flex;align-items:center;gap:10px;padding:6px 2px;border-bottom:1px solid rgba(42,51,66,.5);font-size:13px;}
.skn-hrow .skn-h{font-family:var(--mono);color:var(--gold);font-weight:700;width:34px;flex:0 0 auto;}
.skn-hrow .skn-w{flex:1;min-width:0;}
.skn-hrow .skn-net{color:var(--muted);font-size:11.5px;font-family:var(--mono);}
.skn-hrow .skn-pay{font-family:var(--mono);font-weight:600;flex:0 0 auto;}
.skn-hrow.tied{opacity:.6;} .skn-hrow.tied .skn-pay{font-weight:400;color:var(--faint);}

/* toast */
#verTag{position:fixed;top:5px;right:8px;z-index:50;font-family:var(--mono);font-size:10px;
  color:rgba(243,241,234,.4);pointer-events:none;letter-spacing:.03em;}
#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
  background:var(--gold);color:var(--bg);font-weight:700;font-size:13px;padding:10px 18px;border-radius:999px;
  opacity:0;pointer-events:none;transition:.2s;z-index:90;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.empty{color:var(--faint);font-style:italic;font-size:13px;padding:8px 0;}
.hide{display:none !important;}

/* ---------- tournaments home screen ---------- */
#home{min-height:100vh;background:var(--bg);}
.home-inner{max-width:1040px;margin:0 auto;padding:26px 16px 80px;}
.home-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.home-title{font-family:var(--display);font-size:34px;letter-spacing:.05em;color:var(--ink);}
.home-title .acc{color:var(--gold);}
.home-sub{color:var(--muted);font-size:13px;margin:-8px 0 16px;}
.tcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;
  display:flex;align-items:center;gap:14px;cursor:pointer;transition:.12s;}
.tcard:hover{border-color:var(--gold);transform:translateY(-1px);}
.tcard .tc-main{flex:1;min-width:0;}
.tcard .tc-name{font-weight:700;font-size:17px;color:var(--ink);margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tcard .tc-meta{display:flex;gap:14px;flex-wrap:wrap;align-items:center;font-size:12.5px;color:var(--muted);}
.tcard .tc-vs .r{color:var(--red);font-weight:700;} .tcard .tc-vs .b{color:var(--blue);font-weight:700;}
.tcard .tc-vs .vs{color:var(--faint);margin:0 .4em;}
.tcard .tc-score{font-family:var(--mono);color:var(--ink);}
.tpill{font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:6px 12px;border-radius:999px;border:1px solid transparent;white-space:nowrap;}
.tpill.muted{color:#cdd5e1;background:#2a3342;}
.tpill.ready{color:#fff;background:var(--blue);box-shadow:0 0 0 1px var(--blue), 0 2px 10px rgba(37,99,235,.45);}
.tpill.live{color:var(--bg);background:var(--gold);box-shadow:0 0 0 1px var(--gold), 0 2px 12px rgba(232,196,104,.55);}
.tpill.win{color:var(--bg);background:linear-gradient(135deg,#f6d98a,#e8c468);box-shadow:0 0 0 1px var(--gold), 0 2px 14px rgba(232,196,104,.7);}
.tcard .tc-acts{display:flex;flex-direction:column;gap:6px;}
.tc-empty{color:var(--muted);text-align:center;padding:40px 10px;border:1px dashed var(--line);border-radius:14px;}
.welcome-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:34px 24px;text-align:center;}
.welcome-title{font-family:var(--display);font-size:26px;letter-spacing:.04em;color:var(--gold);margin-bottom:12px;}
.welcome-text{color:var(--muted);font-size:15px;line-height:1.55;}
.backHome{margin:14px 0 4px;}
.flex-end{display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap;}
.divider{height:1px;background:var(--line);margin:14px 0;}

#splash::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,12,20,.30),rgba(8,12,20,.55));}
#splash.hide{opacity:0;pointer-events:none;}
#splashLogo{position:relative;width:min(72vw,420px);max-height:62vh;object-fit:contain;
  opacity:0;transform:scale(.94);transition:opacity .8s ease,transform .8s ease;filter:drop-shadow(0 12px 34px rgba(0,0,0,.55));}
#splash.logo-in #splashLogo{opacity:1;transform:scale(1);}
#splashLoad{position:absolute;bottom:8%;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:10px;z-index:1;}
#splashLoad .spinner{width:34px;height:34px;border-radius:50%;border:3px solid rgba(255,255,255,.25);border-top-color:#fff;animation:splashspin .8s linear infinite;}
#splashLoad .loadtxt{color:#fff;font-family:var(--body);font-size:13px;letter-spacing:.08em;opacity:.9;}
#splashVer{position:absolute;top:10px;right:12px;z-index:3;font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:#3a4250;}
@keyframes splashspin{to{transform:rotate(360deg);}}

/* course lookup modal */
.cl-ov{position:fixed;inset:0;z-index:120;background:rgba(6,8,12,.72);display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;overflow:auto;}
.cl-box{background:var(--panel);border:1px solid var(--line);border-radius:16px;max-width:420px;width:100%;padding:18px 16px 16px;box-shadow:0 18px 50px rgba(0,0,0,.5);margin:20px 0;}
.cl-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cl-title{font-family:var(--display);font-size:20px;color:var(--gold);letter-spacing:.03em;}
.cl-x{background:none;border:none;color:var(--muted);font-size:24px;line-height:1;padding:0 4px;cursor:pointer;}
.cl-x:hover{color:var(--ink);}
.cl-row{display:flex;gap:8px;margin-bottom:10px;}
.cl-row input{flex:1;}
.cl-box input[type=text],.cl-box input[type=search]{background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:9px 10px;color:var(--ink);font-size:14px;font-family:var(--body);width:100%;}
.cl-list{display:flex;flex-direction:column;gap:6px;max-height:46vh;overflow:auto;margin-top:2px;}
.cl-item{text-align:left;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;cursor:pointer;color:var(--ink);font-size:14px;font-weight:600;transition:.12s;}
.cl-item:hover{border-color:var(--gold);}
.cl-item .cl-sub{display:block;font-size:11.5px;color:var(--muted);margin-top:3px;font-weight:400;font-family:var(--mono);}
.cl-msg{font-size:12.5px;color:var(--muted);padding:5px 2px;line-height:1.45;}
.cl-msg.err{color:#ff8d97;}
.cl-msg.head{color:var(--ink);font-weight:700;font-size:14px;}
.cl-back{font-size:12px;color:var(--gold);background:none;border:none;cursor:pointer;padding:2px 0;margin-bottom:8px;font-weight:600;}
.cl-note{font-size:11.5px;color:var(--faint);margin-top:12px;line-height:1.45;}
.cl-note a{color:var(--muted);}
</style>
</head>

<script>
"use strict";
const APP_VERSION = 0.26;   // bump in 0.01 steps; shown top-right as "v .01"

/* ============================================================
   Constants
   ============================================================ */
const STORAGE_KEY = "rvb_state_v2";

const ROUND_DEFS = [
  {n:1, fmt:"Four-Ball"},
  {n:2, fmt:"Aggregate"},
  {n:3, fmt:"Four-Ball"},
  {n:4, fmt:"Scramble"},
  {n:5, fmt:"Singles"},
  {n:6, fmt:"Alternate Shot"},
];

const FMT_ALLOWANCE = {
  "Four-Ball":"100% per player",
  "Aggregate":"100% per player",
  "Scramble":"35% low + 15% high",
  "Alternate Shot":"50% of combined",
  "Singles":"100%, difference applied",
};

const FMT_INFO = {
  "Four-Ball":"Better Ball. Each of the two partners plays their own ball; the lower net of the pair counts on each hole. Handicaps: 100% of each player's Course Handicap.",
  "Aggregate":"Both partners play their own ball and both net scores are added together each hole. Handicaps: 100% of each player's Course Handicap.",
  "Scramble":"Both partners tee off, the best shot is selected, and both play from there until holed — one ball per side. Side handicap: 35% of the lower Course Handicap + 15% of the higher.",
  "Alternate Shot":"Foursomes. Partners share one ball and play alternate shots (one tees on odd holes, the other on even). Side handicap: 50% of the partners' combined Course Handicaps (USGA recommended).",
  "Singles":"One player versus one player, head-to-head net match play. Handicaps: 100%; the lower-handicap player plays off scratch and the higher receives the difference by stroke index.",
};

// Turtleback Golf Course, Rice Lake WI — Blue tees
const DEFAULT_COURSE = {
  courseName:"Turtleback Golf Course", tees:"Blue",
  cr:71.0, slope:132, par:71,
  holes:[
    {par:4,si:11},{par:5,si:1},{par:4,si:7},{par:3,si:15},{par:4,si:3},
    {par:4,si:9},{par:4,si:17},{par:3,si:13},{par:4,si:5},
    {par:4,si:6},{par:4,si:14},{par:4,si:12},{par:3,si:18},{par:5,si:4},
    {par:3,si:16},{par:4,si:10},{par:4,si:8},{par:5,si:2},
  ],
};

/* ============================================================
   State & persistence
   ============================================================ */
let state = null;
let activeTab = "play";
let expandedMatch = null;     // matchId currently expanded on the leaderboard
let playRound = null;         // round id selected in the quick Play tab
let playMatch = null;         // match id selected in the quick Play tab (one at a time)
let currentHole = 0;          // selected hole (0-17) for quick entry
let playAutoHole = true;      // jump the green slot to the first incomplete hole on entry
let finalizePrompted = new Set(); // unit keys that have shown the first finish dialog
let finalizeDeclined = new Set(); // unit keys where the user chose "No" (re-nag on return)
let endedAnnounced = new Set();   // match ids whose "match finished" result has been shown
let entry = null;             // active one-touch entry overlay state
let courseLookup = null;      // active course-lookup overlay state
let tenPending = false;       // "10+" tapped, waiting for the ones digit
let selOpen = false;          // round/match selector expanded on the Play tab
let skinsOpen = {};           // roundId -> open? (default open) on the Giant Skins tab
let lbRoundOpen = {};         // roundId -> open? on the Leaderboard tab
let memFallback = null;       // in-memory store if localStorage unusable
let lsOK = true;

function uid(){ state.seq = (state.seq||0)+1; return "id" + state.seq + "_" + Date.now().toString(36).slice(-4); }

function freshCourse(){ return JSON.parse(JSON.stringify(DEFAULT_COURSE)); }

function seedRounds(){
  return ROUND_DEFS.map(d => ({
    id: "rnd" + d.n,
    n: d.n,
    fmt: d.fmt,
    ...freshCourse(),
    matches: [],
  }));
}

function blankState(){
  return {
    id:newId(),
    name:"Border Battle",
    teamNames:{R:"",B:""},
    teamLetters:{R:"",B:""},
    useHcp:false,
    defending:null,
    addTeam:"R",
    seq:0,
    numRounds:5,                 // how many of the 5 fixed rounds are in play
    currentRound:null,           // manual override of the current round (null = auto)
    sameCourseAll:true,          // use the tournament course for every round
    course:freshCourse(),        // tournament-level (master) course
    skins:{on:false, buyIn:2000},// Giant Skins side game (buyIn in cents)
    players:{},
    rounds:seedRounds(),
  };
}

/* ============================================================
   TOURNAMENT LIBRARY  (multiple saved tournaments)
   The active tournament's working state lives under STORAGE_KEY exactly as
   before (so sync/export/etc. are unchanged). A separate library under LIB_KEY
   holds a snapshot of every tournament plus which one is active. Every
   saveState() refreshes the active tournament's snapshot.
   ============================================================ */
const LIB_KEY = "rvb_tournaments_v1";
let appScreen = "home";   // "home" (tournament list) or "app" (a tournament open)
let libMem = null;        // in-memory fallback when localStorage is unavailable
let homeBound = false;    // delegated home-screen click handler attached once

function newId(){ return "trn_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2,7); }

function loadLibrary(){
  try{
    const raw = window.localStorage.getItem(LIB_KEY);
    if(raw){ const p = JSON.parse(raw); if(p && Array.isArray(p.tournaments)) return p; }
  }catch(e){}
  return libMem;   // null if never set
}
function saveLibrary(lib){
  libMem = lib;    // always keep an in-memory copy so the app works without storage
  try{ window.localStorage.setItem(LIB_KEY, JSON.stringify(lib)); }catch(e){}
}

function snapshot(s){
  return { id:s.id, name:s.name, savedAt:Date.now(), state:JSON.parse(JSON.stringify(s)) };
}

// Mirror the current working state into its library entry (called from saveState).
function refreshLibEntry(){
  if(!state || !state.id) return;
  let lib = loadLibrary();
  if(!lib) return;                       // no library yet → nothing to mirror
  const i = lib.tournaments.findIndex(t=>t.id===state.id);
  if(i<0) return;                        // not a registered tournament → don't auto-create
  lib.tournaments[i] = snapshot(state);
  lib.activeId = state.id;
  saveLibrary(lib);
}

// Has this tournament actually been set up (vs a pristine, never-touched blank)?
function hasContent(s){
  if(!s) return false;
  if(s.players && Object.keys(s.players).length>0) return true;
  if(s.teamNames && ((s.teamNames.R||"").trim() || (s.teamNames.B||"").trim())) return true;
  if(Array.isArray(s.rounds)){
    for(const r of s.rounds){
      if(r && Array.isArray(r.matches)){
        for(const m of r.matches){
          if(m && m.scores){
            for(const k in m.scores){
              const arr=m.scores[k];
              if(Array.isArray(arr) && arr.some(v=>v!=null && v!=="")) return true;
            }
          }
        }
      }
    }
  }
  return false;
}

// Run a function with a different state temporarily (for reading other
// tournaments' status without disturbing the active one).
function withState(s, fn){ const prev=state; state=s; try{ return fn(); } finally{ state=prev; } }

// Status summary for one tournament's state (run inside withState).
function tournamentInfo(){
  const tot = totals();
  const total = totalAvailable();
  const threshold = total>0 ? total/2 + 0.5 : 0;
  const dec = tot.R + tot.B;
  let status, cls;
  if(tot.matchCount===0){ status="Not started"; cls="muted"; }
  else if(total>0 && tot.R>=threshold){ status=teamName("R")+" won 🏆"; cls="win"; }
  else if(total>0 && tot.B>=threshold){ status=teamName("B")+" won 🏆"; cls="win"; }
  else if(total>0 && dec===total && tot.R===tot.B){
    status = state.defending ? teamName(state.defending)+" retain 🏆" : "Tied · playoff"; cls="win";
  }
  else if(dec>0){ status="In progress"; cls="live"; }
  else { status="Ready"; cls="ready"; }
  return {
    status, cls, R:tot.R, B:tot.B, total,
    rName:teamName("R"), bName:teamName("B"),
    cur:currentRoundNum(), nRounds:state.numRounds,
    players:Object.keys(state.players).length,
  };
}

function showHome(){
  appScreen="home";
  document.getElementById("home").classList.remove("hide");
  document.querySelector("header.board").classList.add("hide");
  document.querySelector(".wrap").classList.add("hide");
  renderHome();
}
function showApp(){
  appScreen="app";
  document.getElementById("home").classList.add("hide");
  document.querySelector("header.board").classList.remove("hide");
  document.querySelector(".wrap").classList.remove("hide");
}

function renderHome(){
  let lib = loadLibrary();
  if(!lib){ lib = { activeId:null, tournaments:[] }; saveLibrary(lib); }
  const listEl = document.getElementById("homeList");
  bindHome();   // wire the New button + card delegation (idempotent) BEFORE any early return
  if(!lib.tournaments.length){
    listEl.innerHTML = `<div class="welcome-card">
      <div class="welcome-title">Welcome to Cup Captain!</div>
      <div class="welcome-text">To get started with setup, click add tournament.</div>
    </div>`;
    return;
  }
  // Newest-saved first.
  const items = lib.tournaments.slice().sort((a,b)=>(b.savedAt||0)-(a.savedAt||0));
  listEl.innerHTML = items.map(t=>{
    const st = migrate(t.state);
    const info = withState(st, ()=>tournamentInfo());
    const when = t.savedAt ? new Date(t.savedAt).toLocaleDateString(undefined,{month:"short",day:"numeric"}) : "";
    return `<div class="tcard" data-open="${escapeHtml(t.id)}">
      <div class="tc-main">
        <div class="tc-name">${escapeHtml(t.name||"Untitled")}</div>
        <div class="tc-meta">
          <span class="tc-vs"><span class="r">${escapeHtml(info.rName)}</span><span class="vs">vs</span><span class="b">${escapeHtml(info.bName)}</span></span>
          <span class="tc-score">${fmtPts(info.R)}–${fmtPts(info.B)}</span>
          <span>Round ${info.cur}/${info.nRounds}</span>
          <span>${info.players} players</span>
          ${when?`<span>saved ${escapeHtml(when)}</span>`:""}
        </div>
      </div>
      <span class="tpill ${info.cls}">${escapeHtml(info.status)}</span>
    </div>`;
  }).join("");

  bindHome();
}

// One delegated click handler on the (stable) #home element. Survives every
// re-render of the list and is robust across environments.
function bindHome(){
  if(homeBound) return;
  homeBound = true;
  const homeEl = document.getElementById("home");
  if(!homeEl) return;
  homeEl.addEventListener("click", e=>{
    if(e.target.closest("#homeNewBtn")){ newTournament(); return; }
    const rn = e.target.closest("[data-rename]");
    if(rn){ renameTournament(rn.dataset.rename); return; }
    const dl = e.target.closest("[data-del]");
    if(dl){ deleteTournament(dl.dataset.del); return; }
    const card = e.target.closest(".tcard");
    if(card && card.dataset.open){ openTournament(card.dataset.open); }
  });
}

function openTournament(id){
  const lib = loadLibrary(); if(!lib) return;
  const t = lib.tournaments.find(x=>x.id===id); if(!t) return;
  state = migrate(t.state);
  state.id = id;
  lib.activeId = id; saveLibrary(lib);
  activeTab = "play"; playAutoHole = true;
  finalizePrompted=new Set(); finalizeDeclined=new Set(); endedAnnounced=new Set();
  saveState();          // writes STORAGE_KEY + refreshes this entry
  showApp();
  render();
  toast("Opened “"+(state.name||"Untitled")+"”");
}

function newTournament(){
  const lib = loadLibrary() || { activeId:null, tournaments:[] };
  // Pick a unique default name (no native prompt — those are blocked in some webviews).
  const existing = new Set(lib.tournaments.map(t=>(t.name||"").trim()));
  let name = "New Tournament", n = 2;
  while(existing.has(name)){ name = "New Tournament "+n; n++; }
  const s = blankState();
  s.name = name;
  lib.tournaments.push(snapshot(s));
  lib.activeId = s.id; saveLibrary(lib);
  openTournament(s.id);
  activeTab = "setup"; render();   // land on Setup to name it and add players
  toast("Tournament created");
}

function renameTournament(id){
  const lib = loadLibrary(); if(!lib) return;
  const t = lib.tournaments.find(x=>x.id===id); if(!t) return;
  const name = prompt("Rename tournament:", t.name||"");
  if(name===null) return;
  t.name = name.trim() || t.name;
  t.state.name = t.name;
  if(state && state.id===id) state.name = t.name;
  saveLibrary(lib);
  renderHome();
}

function deleteTournament(id){
  const lib = loadLibrary(); if(!lib) return;
  const t = lib.tournaments.find(x=>x.id===id); if(!t) return;
  if(!confirm("Delete “"+(t.name||"Untitled")+"”? This permanently removes its players, scores and pairings.")) return;
  lib.tournaments = lib.tournaments.filter(x=>x.id!==id);
  if(lib.activeId===id) lib.activeId = lib.tournaments[0] ? lib.tournaments[0].id : null;
  saveLibrary(lib);
  // If we just deleted the open tournament, drop back to a safe working state.
  if(state && state.id===id){
    if(lib.activeId){ state = migrate(lib.tournaments.find(x=>x.id===lib.activeId).state); state.id=lib.activeId; }
    else { state = blankState(); }
    saveState();
  }
  showHome();
  toast("Deleted");
}

function loadState(){
  let raw=null;
  try{ raw = window.localStorage.getItem(STORAGE_KEY); }
  catch(e){ lsOK=false; }
  if(lsOK===false && memFallback) return memFallback;
  if(raw){
    try{
      const parsed = JSON.parse(raw);
      if(parsed && parsed.rounds && parsed.players) return migrate(parsed);
    }catch(e){/* corrupt -> blank */}
  }
  return blankState();
}

function migrate(s){
  if(!s.id) s.id = newId();
  // Ensure 6 rounds exist; preserve existing data and user-chosen formats.
  if(!Array.isArray(s.rounds) || !s.rounds.length){
    s.rounds = seedRounds();
  } else {
    for(let i=0;i<6;i++){
      if(!s.rounds[i]){ const d=ROUND_DEFS[i]; s.rounds[i]={id:"rnd"+d.n, n:d.n, fmt:d.fmt, ...freshCourse(), matches:[]}; }
      const r=s.rounds[i];
      r.n=i+1; r.id="rnd"+(i+1);
      if(!r.fmt || !FMT_ALLOWANCE[r.fmt]) r.fmt=ROUND_DEFS[i].fmt;
      if(!Array.isArray(r.holes)||r.holes.length!==18) Object.assign(r, freshCourse());
      if(!Array.isArray(r.matches)) r.matches=[];
    }
    s.rounds = s.rounds.slice(0,6);
  }
  s.teamNames=s.teamNames||{R:"",B:""};
  s.teamLetters=s.teamLetters||{R:"",B:""};
  s.addTeam=s.addTeam||"R";
  s.players=s.players||{};
  if(typeof s.useHcp!=="boolean") s.useHcp=true;
  if(typeof s.numRounds!=="number" || s.numRounds<1 || s.numRounds>6) s.numRounds=5;
  if(typeof s.sameCourseAll!=="boolean") s.sameCourseAll=true;
  if(!s.course || !Array.isArray(s.course.holes) || s.course.holes.length!==18) s.course=freshCourse();
  if(!s.skins || typeof s.skins!=="object") s.skins={on:false, buyIn:2000};
  if(typeof s.skins.on!=="boolean") s.skins.on=false;
  if(typeof s.skins.buyIn!=="number") s.skins.buyIn=2000;
  // If same-course is on, mirror the master course onto every round so loaded,
  // imported, or remotely-synced states arrive already in sync.
  if(s.sameCourseAll && s.course && Array.isArray(s.course.holes) && Array.isArray(s.rounds)){
    const m=s.course;
    s.rounds.forEach(r=>{
      r.courseName=m.courseName; r.tees=m.tees; r.cr=m.cr; r.slope=m.slope; r.par=m.par;
      r.holes=(m.holes||[]).map(h=>({par:h.par, si:h.si}));
    });
  }
  return s;
}

function saveState(){
  syncRoundCourses();   // keep round courses mirrored to the master while same-course is on
  try{ window.localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e){ lsOK=false; memFallback=state; }
  if(lsOK===false) memFallback=state;
  refreshLibEntry();    // mirror this tournament into the multi-tournament library
  pushState();   // mirror to the cloud room if sync is connected
}

/* ============================================================
   CLOUD SYNC  (Firebase Realtime Database, optional)
   The whole state object is mirrored under rooms/<code>. Every device in the
   same room reads/writes that node; last write wins. Config + room code live
   only in localStorage (never synced) so they don't loop between devices.
   ============================================================ */
const SYNC_KEY = "rvb_sync";
let fb = { db:null, ref:null, on:false, room:null };
let applyingRemote = false;     // true while applying a remote snapshot (suppresses push)
let lastSyncJSON = "";          // last state JSON pushed or received (echo guard)
let pushTimer = null;

function loadSyncCfg(){ try{ return JSON.parse(localStorage.getItem(SYNC_KEY)||"null"); }catch(e){ return null; } }
function saveSyncCfg(c){ try{ c?localStorage.setItem(SYNC_KEY,JSON.stringify(c)):localStorage.removeItem(SYNC_KEY); }catch(e){} }
function setSyncStatus(msg, cls){
  const el=document.getElementById("syncStatus");
  if(el){ el.textContent=msg; el.className="sync-status "+(cls||""); }
}
// Parse a Firebase config pasted as JSON or as a JS object literal.
function parseFbConfig(text){
  text=(text||"").trim();
  if(!text) return null;
  const m=text.match(/\{[\s\S]*\}/); if(m) text=m[0];
  try{ return JSON.parse(text); }catch(e){}
  try{ return (new Function("return ("+text+")"))(); }catch(e){}
  return null;
}

function connectSync(config, room){
  if(typeof firebase==="undefined"){ setSyncStatus("Firebase unavailable — check your connection.","err"); return false; }
  if(!config || !room){ setSyncStatus("Need a config and a room code.","err"); return false; }
  try{
    if(!firebase.apps.length) firebase.initializeApp(config);
    fb.db = firebase.database();
    if(fb.ref) fb.ref.off();
    fb.room = room.trim();
    fb.ref = fb.db.ref("rooms/"+fb.room);
    fb.on = true;
    saveSyncCfg({config, room:fb.room});
    setSyncStatus("Connecting…","");
    fb.ref.on("value", snap=>{
      const val=snap.val();
      if(val && val.state){
        const js=JSON.stringify(val.state);
        if(js===lastSyncJSON){ setSyncStatus("Synced ✓","ok"); return; } // our own echo
        lastSyncJSON=js;
        applyingRemote=true;
        try{ state=migrate(val.state); saveLocalOnly(); }catch(e){}
        applyingRemote=false;
        render();
        setSyncStatus("Synced ✓","ok");
      }else{
        pushState(true);   // empty room → seed it with this device's data
        setSyncStatus("Synced ✓ (room created)","ok");
      }
    }, err=>{ setSyncStatus("Sync error: "+(err&&err.code||"failed"),"err"); });
    return true;
  }catch(e){ setSyncStatus("Sync error — check the config.","err"); fb.on=false; return false; }
}

function disconnectSync(){
  if(fb.ref){ fb.ref.off(); fb.ref=null; }
  fb.on=false; saveSyncCfg(null); setSyncStatus("Offline (this device only).","");
}

function saveLocalOnly(){
  try{ window.localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e){ lsOK=false; memFallback=state; }
}

function pushState(immediate){
  if(!fb.on || !fb.ref || applyingRemote) return;
  const doPush=()=>{
    const js=JSON.stringify(state);
    lastSyncJSON=js;
    fb.ref.set({ state:JSON.parse(js), ts:Date.now() }).catch(()=>setSyncStatus("Sync write failed.","err"));
  };
  clearTimeout(pushTimer);
  if(immediate) doPush(); else pushTimer=setTimeout(doPush, 350);
}

function initSync(){
  const cfg=loadSyncCfg();
  if(cfg && cfg.config && cfg.room && typeof firebase!=="undefined") connectSync(cfg.config, cfg.room);
}

/* ============================================================
   Team helpers
   ============================================================ */
function teamName(t){ return (state.teamNames[t]||"").trim() || (t==="R"?"West":"East"); }
function teamLetter(t){ const l=(state.teamLetters[t]||"").trim().toUpperCase(); return l.charAt(0) || (t==="R"?"W":"E"); }
function teamCount(t){ return Object.values(state.players).filter(p=>p.team===t).length; }

/* The course a round actually plays: the tournament course when "same course
   for all rounds" is on, otherwise the round's own course. */
function courseOf(round){ return state.sameCourseAll ? state.course : round; }

/* While "use the same course for all rounds" is on, keep every round's own
   course data identical to the tournament (master) course so the rounds never
   drift out of sync — this covers exports, cloud sync, and the moment the
   toggle is later turned off (rounds carry the tournament course forward
   instead of snapping back to a stale template). Only course fields are
   copied; round id, number, format, pairings and scores are left untouched. */
function syncRoundCourses(){
  if(!state || !state.sameCourseAll || !state.course || !Array.isArray(state.rounds)) return;
  const m = state.course;
  state.rounds.forEach(r=>{
    r.courseName = m.courseName;
    r.tees       = m.tees;
    r.cr         = m.cr;
    r.slope      = m.slope;
    r.par        = m.par;
    r.holes      = (m.holes||[]).map(h=>({ par:h.par, si:h.si }));
  });
}

/* Only the first numRounds of the fixed five are in play. */
function activeRounds(){ return state.rounds.slice(0, state.numRounds); }

/* ============================================================
   Handicap engine
   ============================================================ */
function courseHandicap(player, round){
  if(!state.useHcp) return 0;
  if(!player || player.index===null || player.index===undefined || player.index==="") return 0;
  const idx = Number(player.index);
  if(Number.isNaN(idx)) return 0;
  const c = courseOf(round);
  return Math.round(idx*(c.slope/113) + (c.cr - c.par));
}

function scrambleSideHcp(chA, chB){
  const lo = Math.min(chA, chB), hi = Math.max(chA, chB);
  return Math.round(0.35*lo + 0.15*hi);
}
// Formats where the two partners play a single shared ball per side.
function isSharedBall(fmt){ return fmt==="Scramble" || fmt==="Alternate Shot"; }
// Combined side handicap for a shared-ball format.
function sideHcpFor(fmt, chA, chB){
  if(fmt==="Alternate Shot") return Math.round(0.5*(chA+chB));   // Foursomes: 50% combined
  return scrambleSideHcp(chA, chB);                              // Scramble: 35% low + 15% high
}

// Returns the scoring "balls" of a match with their base (allowance-adjusted) course handicap.
// Four-Ball/Aggregate/Singles: one ball per player. Scramble/Alternate Shot: one ball per side.
function matchBalls(round, match){
  const balls=[];
  if(isSharedBall(round.fmt)){
    ["R","B"].forEach(team=>{
      const ids = team==="R"?match.red:match.blue;
      const chs = ids.map(id=>courseHandicap(state.players[id], round));
      const ch = chs.length===2 ? sideHcpFor(round.fmt, chs[0], chs[1]) : (chs[0]||0);
      balls.push({key:team==="R"?"sideR":"sideB", team, players:ids.slice(), baseCH:ch,
        label: ids.map(id=>(state.players[id]||{}).name||"?").join(" / ")});
    });
  } else {
    ["R","B"].forEach(team=>{
      const ids = team==="R"?match.red:match.blue;
      ids.forEach(id=>{
        const p=state.players[id];
        balls.push({key:id, team, players:[id], baseCH:courseHandicap(p,round),
          label:(p||{}).name||"?"});
      });
    });
  }
  return balls;
}

// Off-the-low: playing handicap = baseCH - min(baseCH across all balls in match).
function withPlayingHcps(round, match){
  const balls=matchBalls(round,match);
  if(balls.length===0) return balls;
  const low=Math.min(...balls.map(b=>b.baseCH));
  balls.forEach(b=> b.playHcp = b.baseCH - low);
  return balls;
}

function strokesOnHole(playHcp, si){
  if(playHcp<=0) return 0;
  const full=Math.floor(playHcp/18);
  const rem=playHcp%18;
  return full + (si<=rem ? 1 : 0);
}

/* ============================================================
   Scoring
   ============================================================ */
function ballScore(match, key, hole){
  const arr = match.scores && match.scores[key];
  const v = arr ? arr[hole] : null;
  return (v===null||v===undefined||v==="") ? null : Number(v);
}

// Required balls per side for a format.
function requiredPerSide(fmt){ return fmt==="Singles"||isSharedBall(fmt) ? 1 : 2; }

function sideHoleScore(round, match, balls, team, hole){
  const c = courseOf(round);
  const sideBalls = balls.filter(b=>b.team===team);
  const nets = sideBalls.map(b=>{
    const g = ballScore(match, b.key, hole);
    return g===null ? null : g - strokesOnHole(b.playHcp, c.holes[hole].si);
  });
  if(nets.some(n=>n===null)) return null; // not all required balls in
  if(round.fmt==="Aggregate") return nets.reduce((a,b)=>a+b,0);
  // Four-Ball: best (lowest) net; Scramble/Singles: the single net
  return Math.min(...nets);
}

function holeResult(round, match, balls, hole){
  const rs = sideHoleScore(round, match, balls, "R", hole);
  const bs = sideHoleScore(round, match, balls, "B", hole);
  if(rs===null || bs===null) return null;
  if(rs<bs) return "R";
  if(bs<rs) return "B";
  return "H";
}

function matchStatus(round, match){
  const balls=withPlayingHcps(round, match);
  let standing=0, played=0, closeHole=null;
  const results=new Array(18).fill(null);
  for(let h=0; h<18; h++){
    if(closeHole!==null){ continue; } // remaining handled below as dead
    const res=holeResult(round, match, balls, h);
    if(res===null){ results[h]=null; continue; }
    results[h]=res;
    standing += res==="R"?1:res==="B"?-1:0;
    played += 1;
    const remaining = 18 - played;
    if(Math.abs(standing) > remaining){ closeHole=h; }
  }
  const finished = (closeHole!==null) || (played===18 && played>0 && allHolesScored(round,match,balls));
  return {balls, standing, played, closeHole, finished, results};
}

function allHolesScored(round, match, balls){
  for(let h=0;h<18;h++){ if(holeResult(round,match,balls,h)===null) return false; }
  return true;
}

function statusText(round, match, st){
  const {standing, played, closeHole, finished}=st;
  const lead = Math.abs(standing);
  const leader = standing>0?"R":standing<0?"B":null;
  if(finished){
    if(closeHole!==null){
      const remaining = 17 - closeHole; // holes left after the closing hole
      if(remaining>0) return {cls:leader==="R"?"r":"b", text:`${teamName(leader)} win ${lead}&${remaining}`};
      return {cls:leader==="R"?"r":"b", text:`${teamName(leader)} win ${lead} UP`};
    }
    if(lead===0) return {cls:"h", text:"Halved"};
    return {cls:leader==="R"?"r":"b", text:`${teamName(leader)} win ${lead} UP`};
  }
  if(played===0) return {cls:"h", text:"Not started"};
  const remaining = 18 - played;
  if(lead===0) return {cls:"live", text:`All Square · thru ${played}`};
  const dormie = (lead===remaining) ? " · Dormie" : "";
  return {cls:leader==="R"?"r":"b", text:`${teamName(leader)} ${lead} UP · thru ${played}${dormie}`};
}

// Decided points for a finished match.
function matchPoints(st){
  if(!st.finished) return null;
  if(st.standing>0) return {R:1,B:0};
  if(st.standing<0) return {R:0,B:1};
  return {R:0.5,B:0.5};
}

// Projected: decided -> result; in-progress (>=1 hole played) -> leader (½/½ if AS); unstarted -> excluded.
function matchProjected(st){
  if(st.finished) return matchPoints(st);
  if(st.played===0) return null;
  if(st.standing>0) return {R:1,B:0};
  if(st.standing<0) return {R:0,B:1};
  return {R:0.5,B:0.5};
}

function allMatches(){
  const out=[];
  activeRounds().forEach(r=> r.matches.forEach(m=> out.push({round:r,match:m})));
  return out;
}

/* A side's base handicap total (before off-the-low). Used for the "(N)" the
   leaderboard shows next to each pair: the strokes that side gives/gets vs its
   opponent. Four-Ball/Aggregate sum both players; Scramble uses the 35/15
   combined side handicap; Singles is the single player. */
function sideTotalFor(round, match, team){
  const ids = team==="R" ? (match.red||[]) : (match.blue||[]);
  if(isSharedBall(round.fmt)){
    const chs = ids.filter(Boolean).map(id=>courseHandicap(state.players[id], round));
    return chs.length===2 ? sideHcpFor(round.fmt, chs[0], chs[1]) : (chs[0]||0);
  }
  return ids.filter(Boolean).reduce((s,id)=>s+courseHandicap(state.players[id],round),0);
}
// Net strokes this side receives versus the opponent (0 for the lower side).
function sideStrokes(round, match, team){
  const own = sideTotalFor(round, match, team);
  const opp = sideTotalFor(round, match, team==="R"?"B":"R");
  return Math.max(0, own - opp);
}

// Running match standing label after each resolved hole, leader's perspective.
function runningStandings(st){
  // returns array[18] of {txt, lead:'R'|'B'|null, dead:bool}
  const out=[]; let standing=0;
  for(let h=0;h<18;h++){
    const dead = st.closeHole!==null && h>st.closeHole;
    const res = st.results[h];
    if(dead || res===null){ out.push({txt:"-", lead:null, dead}); continue; }
    standing += res==="R"?1:res==="B"?-1:0;
    if(standing===0) out.push({txt:"AS", lead:null, dead:false});
    else out.push({txt:Math.abs(standing)+"UP", lead:standing>0?"R":"B", dead:false});
  }
  return out;
}

// Short display name: "Dustin Tiger" -> "D. Tiger".
function shortName(id){
  const p=state.players[id]; if(!p) return "—";
  const parts=(p.name||"").trim().split(/\s+/);
  if(parts.length<2) return p.name||"—";
  return parts[0].charAt(0).toUpperCase()+". "+parts.slice(1).join(" ");
}


function totals(){
  let R=0,B=0,pR=0,pB=0,matchCount=0;
  allMatches().forEach(({round,match})=>{
    matchCount++;
    const st=matchStatus(round,match);
    const dec=matchPoints(st);
    if(dec){R+=dec.R;B+=dec.B;}
    const proj=matchProjected(st);
    if(proj){pR+=proj.R;pB+=proj.B;}
  });
  return {R,B,pR,pB,matchCount};
}

// Points a round contributes when fully played, based on team sizes and format.
// Team formats pair two players a side (matches = teamSize/2); Singles is one per player.
// Uses the smaller team so the count reflects head-to-head matches actually possible.
function expectedRoundPoints(round){
  const rc=teamCount("R"), bc=teamCount("B");
  if(round.fmt==="Singles") return Math.min(rc,bc);
  return Math.min(Math.floor(rc/2), Math.floor(bc/2));
}
function totalAvailable(){ return activeRounds().reduce((s,r)=>s+expectedRoundPoints(r),0); }

// A round has at least one scoreable match (both sides have players assigned).
function roundHasPlayMatches(round){
  return round.matches.some(m=>(m.red||[]).some(Boolean) && (m.blue||[]).some(Boolean));
}
// A round is "fully set up" when it has its full set of pairings and every slot is filled.
function roundFullySetUp(round){
  const exp=expectedRoundPoints(round);
  if(exp<=0 || round.matches.length!==exp) return false;
  const per = round.fmt==="Singles"?1:2;
  return round.matches.every(m=>(m.red||[]).filter(Boolean).length===per && (m.blue||[]).filter(Boolean).length===per);
}
// A round is "fully scored" when every one of its matches has finished
// (decided early or all 18 holes played).
function roundFullyScored(round){
  if(!round || !round.matches.length) return false;
  return round.matches.every(m=>matchStatus(round,m).finished);
}
// Current round advances to a round once its pairings are set AND the previous
// round has all its scores entered (round 1 has no previous-round requirement).
function computedCurrentRound(){
  const rounds=activeRounds();
  let cur=1;
  rounds.forEach((r,i)=>{
    const prevDone = i===0 ? true : roundFullyScored(rounds[i-1]);
    if(roundFullySetUp(r) && prevDone) cur=r.n;
  });
  return cur;
}
// The current round: manual override if set & valid, otherwise computed.
function currentRoundNum(){
  const n=state.currentRound;
  if(typeof n==="number" && n>=1 && n<=state.numRounds) return n;
  return computedCurrentRound();
}
// On entering Leaderboard/Skins, expand only the current round.
function initRoundExpand(){
  const cur=currentRoundNum();
  lbRoundOpen={}; skinsOpen={}; expandedMatch=null;
  activeRounds().forEach(r=>{ const open=(r.n===cur); lbRoundOpen[r.id]=open; skinsOpen[r.id]=open; });
}

/* ============================================================
   Rendering — Header
   ============================================================ */
function fmtPts(n){
  const whole=Math.floor(n);
  const half=n-whole>=0.5;
  if(whole===0 && half) return "½";
  return half ? whole+"½" : String(whole);
}

function renderHeader(){
  const t=totals();
  document.getElementById("boardTitle").innerHTML =
    `<span class="r">${escapeHtml(teamName("R")).toUpperCase()}</span>`+
    `<span class="vs">VS</span>`+
    `<span class="b">${escapeHtml(teamName("B")).toUpperCase()}</span>`;
  document.getElementById("tnR").textContent=teamName("R");
  document.getElementById("tnB").textContent=teamName("B");
  document.getElementById("ptsR").textContent=fmtPts(t.R);
  document.getElementById("ptsB").textContent=fmtPts(t.B);
  document.getElementById("projR").textContent="proj "+fmtPts(t.pR);
  document.getElementById("projB").textContent="proj "+fmtPts(t.pB);

  const total=totalAvailable();
  const threshold = total>0 ? total/2 + 0.5 : 0;
  document.getElementById("toWin").textContent = total>0 ? fmtPts(threshold) : "—";
  document.getElementById("ofN").textContent = "of "+total;

  // share bar from decided points
  const dec=t.R+t.B;
  const rPct = dec>0 ? (t.R/dec*100) : 50;
  document.getElementById("barR").style.width=rPct+"%";
  document.getElementById("barB").style.width=(100-rPct)+"%";

  // clinch line
  const cl=document.getElementById("clinch");
  cl.className="clinch";
  if(t.matchCount===0){ cl.textContent="Add pairings in Setup to begin."; return; }
  if(t.R>=threshold){ cl.classList.add("win"); cl.innerHTML=`<span class="seg-r">${escapeHtml(teamName("R"))}</span> clinch the Cup! 🏆`; return; }
  if(t.B>=threshold){ cl.classList.add("win"); cl.innerHTML=`<span class="seg-b">${escapeHtml(teamName("B"))}</span> clinch the Cup! 🏆`; return; }
  // tie with every available point decided
  if(dec===total && t.R===t.B){
    if(state.defending){ cl.classList.add("win"); cl.innerHTML=`Tied ${fmtPts(t.R)}–${fmtPts(t.B)} · <span class="seg-${state.defending.toLowerCase()}">${escapeHtml(teamName(state.defending))}</span> retain the Cup`; }
    else { cl.classList.add("win"); cl.textContent=`Tied ${fmtPts(t.R)}–${fmtPts(t.B)} · Playoff required`; }
    return;
  }
  cl.innerHTML=`First to ${fmtPts(threshold)} wins · projected `+
    `<span class="seg-r">${fmtPts(t.pR)}</span> – <span class="seg-b">${fmtPts(t.pB)}</span>`;
}

function bindData(){
  // Save & sync
  $("exportBtn").addEventListener("click",exportJSON);
  $("importBtn").addEventListener("click",()=>$("importFile").click());
  $("importFile").addEventListener("change",importJSON);
  $("resetBtn").addEventListener("click",()=>{
    if(confirm("Reset this tournament? This clears its players, scores and pairings.")){
      const keepId=state.id, keepName=state.name;
      state=blankState(); state.id=keepId; state.name=keepName;
      saveState(); render(); toast("Reset complete");
    }
  });

  // Live sync
  const sConnect=$("syncConnect");
  if(sConnect) sConnect.addEventListener("click",()=>{
    const cfg=parseFbConfig(($("syncCfg")||{}).value);
    const room=(($("syncRoom")||{}).value||"").trim();
    if(!cfg){ setSyncStatus("Couldn't read that config — paste the whole { … } object.","err"); return; }

  if(sDisc) sDisc.addEventListener("click",()=>{ disconnectSync(); toast("Disconnected"); renderData(); });
}
