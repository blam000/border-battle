/* ============================================================
   GIANT SKINS TAB  (individual net-skins side game)
   ============================================================ */
function fmtMoney(cents){ return "$"+(cents/100).toFixed(2); }
function fmtMoneySigned(cents){ return (cents<0?"-$":"+$")+(Math.abs(cents)/100).toFixed(2); }

// Strokes a player gets on a hole using FULL course handicap (100%), per the giant-skins spec.
// Positive handicap: strokes on the hardest holes; plus (negative) handicap: strokes given back
// from the easiest holes (returned as a negative number).
function giantStrokesOnHole(H, si){
  if(H===0) return 0;
  if(H>0){ const rem=H%18; return Math.floor(H/18) + ((rem>0 && si<=rem)?1:0); }
  const A=-H, rem=A%18;
  const give = Math.floor(A/18) + ((rem>0 && (19-si)<=rem)?1:0);
  return -give;
}

function giantSkins(round){
  const c=courseOf(round);
  if(isSharedBall(round.fmt)) return {na:"This format records one ball per side, so there are no individual scores for skins."};
  const ids=[];
  round.matches.forEach(m=>{ (m.red||[]).concat(m.blue||[]).forEach(id=>{ if(id&&state.players[id]&&!ids.includes(id)) ids.push(id); }); });
  if(!ids.length) return {na:"No players in this round yet."};
  const scoreOf={}, ch={};
  ids.forEach(id=>{
    const m=round.matches.find(mm=>(mm.red||[]).includes(id)||(mm.blue||[]).includes(id));
    scoreOf[id]=(m&&m.scores&&m.scores[id])?m.scores[id]:Array(18).fill(null);
    ch[id]=courseHandicap(state.players[id], round);
  });
  const buyIn=state.skins.buyIn||0;
  const pot=ids.length*buyIn;

  // Determine the outright winner of each hole (strictly lowest net; ties win nothing).
  const holes=[]; const skinOrder=[]; let decidedCount=0;
  for(let h=0;h<18;h++){
    const has = id=>{ const v=scoreOf[id][h]; return v!==null&&v!==undefined&&v!==""; };
    // Every player in the round must have a score on this hole before a skin is awarded.
    if(!ids.every(has)){ holes.push({h, decided:false}); continue; }
    const scored=ids;
    decidedCount++;
    let best=Infinity; const net={};
    scored.forEach(id=>{ net[id]=Number(scoreOf[id][h]) - giantStrokesOnHole(ch[id], c.holes[h].si); if(net[id]<best) best=net[id]; });
    const low=scored.filter(id=>net[id]===best);
    if(low.length===1){ holes.push({h, decided:true, won:true, winner:low[0], net:best}); skinOrder.push(low[0]); }
    else { holes.push({h, decided:true, won:false, net:best, tied:low.length}); }
  }

  // Pot is divided by the number of skins actually won; remainder cents to the first skins.
  const totalSkins=skinOrder.length;
  const base = totalSkins ? Math.floor(pot/totalSkins) : 0;
  const rem  = totalSkins ? pot%totalSkins : 0;
  const win={}, skins={}; ids.forEach(id=>{ win[id]=0; skins[id]=0; });
  let awarded=0;
  skinOrder.forEach((id,idx)=>{ const v=base+(idx<rem?1:0); win[id]+=v; skins[id]++; awarded+=v; });
  const skinValue = totalSkins ? pot/totalSkins : 0;

  return {c, ids, ch, win, skins, pot, holes, totalSkins, skinValue, awarded, decidedCount, buyIn};
}

function renderSkins(){
  let html="";
  let any=false;
  activeRounds().slice().reverse().forEach(r=>{
    if(!r.matches.length) return;
    any=true;
    const res=giantSkins(r);
    const open = skinsOpen[r.id] !== false;
    const sum = res.na ? "—" : `${res.totalSkins} skin${res.totalSkins===1?"":"s"} · <span class="money">${fmtMoney(res.pot)}</span>`;
    html+=`<div class="card skn-card">
      <button class="skn-head" data-sktoggle="${r.id}">
        <span class="skn-rn">R${r.n}</span><span class="skn-hfmt">${escapeHtml(r.fmt)}</span>
        <span class="skn-sum">${sum}</span><span class="skn-chev">${open?"▾":"▸"}</span>
      </button>`;
    if(!open){ html+=`</div>`; return; }
    if(res.na){ html+=`<div class="sub" style="margin-top:10px">${escapeHtml(res.na)}</div></div>`; return; }
    const c=res.c;
    const valTxt = res.totalSkins ? `<span class="money">${fmtMoney(Math.round(res.skinValue))}</span>/skin` : "skin value TBD";
    html+=`<div class="sub" style="margin-top:10px">${escapeHtml(c.courseName)}${c.tees?` · ${escapeHtml(c.tees)}`:""} · ${res.ids.length} players · pot <span class="money">${fmtMoney(res.pot)}</span> · ${res.totalSkins} skin${res.totalSkins===1?"":"s"} won · ${valTxt}</div>`;

    // leaderboard sorted by winnings
    const rows=res.ids.map(id=>({id, ch:res.ch[id], sk:res.skins[id], won:res.win[id]}))
      .sort((a,b)=> b.won-a.won || b.sk-a.sk);
    html+=`<div class="sc-scroll" style="margin-bottom:10px"><table class="skn"><thead><tr>
      <th style="text-align:left">Player</th><th>CH</th><th>Skins</th><th>Won</th></tr></thead><tbody>`;
    rows.forEach(row=>{
      const p=state.players[row.id];
      html+=`<tr class="${row.sk>0?"":"skn-zero"}"><td style="text-align:left">${escapeHtml(p.name)}</td>
        <td>${state.useHcp?row.ch:0}</td>
        <td>${row.sk>0?`<span class="skn-ct">${row.sk}</span>`:"-"}</td>
        <td>${row.won>0?`<span class="money">${fmtMoney(row.won)}</span>`:"-"}</td></tr>`;
    });
    html+=`</tbody></table></div>`;

    // per-hole breakdown
    const decided=res.holes.filter(h=>h.decided);
    if(decided.length){
      html+=`<div class="skn-holes">`;
      decided.forEach(hr=>{
        if(hr.won){
          const nm=state.players[hr.winner].name.split(" ")[0];
          html+=`<div class="skn-hrow"><span class="skn-h">H${hr.h+1}</span>
            <span class="skn-w">${escapeHtml(nm)} <span class="skn-net">(net ${hr.net})</span></span>
            <span class="skn-pay">1 skin</span></div>`;
        } else {
          html+=`<div class="skn-hrow tied"><span class="skn-h">H${hr.h+1}</span>
            <span class="skn-w">Tied <span class="skn-net">(net ${hr.net} · ${hr.tied} players)</span></span>
            <span class="skn-pay">no skin</span></div>`;
        }
      });
      html+=`</div>`;
      const pending=18-res.decidedCount;
      html+=`<div class="sub" style="margin-top:8px">${res.totalSkins?`Pot <span class="money">${fmtMoney(res.pot)}</span> ÷ ${res.totalSkins} skin${res.totalSkins===1?"":"s"} = <span class="money">${fmtMoney(Math.round(res.skinValue))}</span> each`:"No skins won yet"}${pending?` · ${pending} hole${pending>1?"s":""} pending`:""}</div>`;
    } else {
      html+=`<div class="sub">No scores entered for this round yet.</div>`;
    }
    html+=`</div>`;
  });
  if(!any) html=`<div class="card"><h2>Giant Skins</h2><div class="sub">Add pairings and enter scores; each round's skins results will show here.</div></div>`;
  view.innerHTML=html;
  view.querySelectorAll("[data-sktoggle]").forEach(b=>b.addEventListener("click",e=>{
    const id=e.currentTarget.dataset.sktoggle;
    skinsOpen[id] = (skinsOpen[id]===false);   // default open -> toggle closed/open
    renderSkins();
  }));
}

/* ============================================================
   LEDGER TAB
   ============================================================ */
function renderLedger(){
  let html="";
  let any=false;
  activeRounds().forEach(r=>{
    if(!r.matches.length) return;
    any=true;
    let rR=0,rB=0;
    let rows="";
    r.matches.forEach(m=>{
      const st=matchStatus(r,m);
      const stTxt=statusText(r,m,st);
      rows+=`<div class="led-m"><span>${matchVsLabel(r,m)}</span><span class="lst">${escapeHtml(stTxt.text)}</span></div>`;
      const dec=matchPoints(st);
      if(dec){rR+=dec.R;rB+=dec.B;}
    });
    html+=`<div class="led-round">
      <div class="led-rh"><span class="num">${r.n}</span><strong>${r.fmt}</strong>
        <span class="tot"><span style="color:#ff8d97">${fmtPts(rR)}</span> – <span style="color:#8fb4ff">${fmtPts(rB)}</span></span></div>
      ${rows}
    </div>`;
  });
  if(!any) html=`<div class="card"><h2>Ledger</h2><div class="sub">Points by round and match will appear here once matches are added.</div></div>`;
  else html=`<div class="card"><h2>Points Ledger</h2>${html}</div>`;
  view.innerHTML=html;
}

/* ============================================================
   Export / Import
   ============================================================ */
function exportJSON(){
  const clean=JSON.parse(JSON.stringify(state));
  clean.rounds.forEach(r=>delete r._editHoles);
  if(clean.course) delete clean.course._editHoles;
  const blob=new Blob([JSON.stringify(clean,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  const fn=(state.name||"border-battle").trim().replace(/[^a-z0-9]+/gi,"-").toLowerCase()||"border-battle";
  a.href=URL.createObjectURL(blob); a.download=fn+".json";
  document.body.appendChild(a); a.click(); a.remove();
  toast("Exported");
}

function importJSON(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const parsed=JSON.parse(reader.result);
      if(!parsed || !parsed.players || !parsed.rounds) throw new Error("missing fields");
      state=migrate(parsed); saveState(); render(); toast("Imported");
    }catch(err){ toast("Invalid file"); }
  };
  reader.readAsText(file);
  e.target.value="";
}

/* ============================================================
   Toast & tabs
   ============================================================ */
let toastTimer=null;
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),1600);
}

document.querySelectorAll(".tabs button").forEach(b=>{
  b.addEventListener("click",()=>{
    activeTab=b.dataset.tab;
    if(activeTab==="leaderboard"||activeTab==="skins") initRoundExpand();
    document.querySelectorAll(".tabs button").forEach(x=>x.classList.toggle("active",x===b));
    render();
  });
});

/* ============================================================
   Boot
   ============================================================ */
state=loadState();
saveState();
render();
</script>
